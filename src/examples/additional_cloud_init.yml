# Additional cloud-init configuration for stateless node provisioning.
#
# Structure:
#   common:    Applied to ALL nodes (common cloud-init group)
#   groups:    Per-functional-group overrides (keyed by functional group name)
#
# ALLOWED keys per section (config and final stage only):
#   write_files  - Write files to nodes (list of file entries)
#   runcmd       - Run commands at final stage (list of commands)
#
# PROHIBITED keys (validation will fail if present):
#   bootcmd, network, network-config, packages
#   These are platform-managed and must not be overridden by users.
#
# Merge behavior:
#   Platform-defined defaults always take precedence (merge_how: no_replace).
#   User entries are appended to platform lists (write_files, runcmd).
#   Group-specific entries are merged AFTER common entries.

# Common cloud-init applied to ALL nodes
# Example:
#   common:
#     write_files:
#       - path: /etc/motd
#         content: "Welcome to the HPC cluster\n"
#         permissions: '0644'
#     runcmd:
#       - echo "Custom node setup complete" >> /var/log/custom_setup.log
common: {}

# Per-functional-group cloud-init overrides
# Group names must match functional groups defined in pxe_mapping_file.csv
# Example:
#   groups:
#     slurm_node_x86_64:
#       runcmd:
#         - echo "Slurm node setup" >> /var/log/custom.log
#     os_x86_64:
#       write_files:
#         - path: /etc/profile.d/cluster.sh
#           content: |
#             export CLUSTER_NAME=mycluster
#           permissions: '0644'
groups: {}
