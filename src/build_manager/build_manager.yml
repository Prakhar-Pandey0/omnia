---
# build_manager.yml — Top-level entry point for the build_manager domain.
# Reads repo_status.yml from repo_manager output for Pulp URLs.
# Deploys MinIO + Registry, then builds OS images for x86_64 and aarch64.
#
# Usage:
#   cd src/build_manager
#   ansible-playbook build_manager.yml                              # Full run (all steps)
#   ansible-playbook build_manager.yml --tags x86_64                # x86_64 only (+ always steps)
#   ansible-playbook build_manager.yml --tags aarch64               # aarch64 only (+ always steps)
#   ansible-playbook build_manager.yml --tags prepare               # Deploy MinIO + Registry only
#   ansible-playbook build_manager.yml --skip-tags aarch64          # Skip aarch64
#
# Tags:
#   always   — Steps 0-4 (upgrade check, credentials, input dir, pre-check, config load)
#   prepare  — Step 5: Deploy MinIO + Registry
#   x86_64   — Step 6: Build x86_64 images
#   aarch64  — Step 7: Build aarch64 images
#   output   — Step 8: Write build_status.yml

# Step 0: Check if upgrade is in progress
- name: Check if upgrade is in progress
  ansible.builtin.import_playbook: ../playbooks/utils/upgrade_checkup.yml
  tags: always

# Step 1: Credential collection (build_manager tag)
- name: Invoke get_config_credentials.yml
  ansible.builtin.import_playbook: ../playbooks/utils/credential_utility/get_config_credentials.yml
  vars:
    omnia_run_tags: ["build_manager"]
  tags: always

# Step 2: Resolve input project directory
- name: Include input project directory
  ansible.builtin.import_playbook: ../playbooks/utils/include_input_dir.yml
  vars:
    openchami_vars_suppport: true
    omnia_metadata_support: true
  tags: always

# Step 3: PRE-CHECK — Read repo_status.yml from repo_manager output
# This loads rpm_repos, certificates, and content base URLs into facts.
- name: Pre-check repo_manager status and load RPM repo URLs
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  vars:
    _repo_status_path: "{{ repo_manager_output | default(output_project_dir | default('/opt/omnia/output/project_default') + '/repo_manager/repo_status.yml') }}"
  tasks:
    - name: Check if repo_status.yml exists
      ansible.builtin.stat:
        path: "{{ _repo_status_path }}"
      register: repo_status_file

    - name: Load repo_status.yml from repo_manager output
      ansible.builtin.include_vars:
        file: "{{ _repo_status_path }}"
      when: repo_status_file.stat.exists

    - name: Fail if repo_manager has not completed
      ansible.builtin.fail:
        msg: >
          repo_status.yml not found at {{ _repo_status_path }} or overall_status != 'synced'.
          Run repo_manager first: cd ../repo_manager && ansible-playbook repo_manager.yml
      when: >
        not repo_status_file.stat.exists or
        overall_status | default('') != 'synced'

    - name: Build repo lists from repo_manager output
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: >-
          [{% for k, v in (rpm_repos.x86_64 | default({})).items() %}
          {"name": "{{ k }}", "base_url": "{{ v }}", "gpg": ""}{{ "," if not loop.last else "" }}
          {% endfor %}]
        repo_manager_repos_aarch64: >-
          [{% for k, v in (rpm_repos.aarch64 | default({})).items() %}
          {"name": "{{ k }}", "base_url": "{{ v }}", "gpg": ""}{{ "," if not loop.last else "" }}
          {% endfor %}]
        cacheable: true

    - name: Display loaded RPM repo URLs for build_manager consumption
      ansible.builtin.debug:
        msg:
          - "Repo manager status: {{ overall_status }}"
          - "x86_64 repos: {{ repo_manager_repos_x86_64 | length }} loaded"
          - "aarch64 repos: {{ repo_manager_repos_aarch64 | length }} loaded"
          - "x86_64 baseos: {{ rpm_repos.x86_64.baseos | default('not set') }}"
          - "aarch64 baseos: {{ rpm_repos.aarch64.baseos | default('not set') }}"
        verbosity: 1

# Step 4: Load build_manager_config.yml (with legacy fallback)
- name: Load build_manager configuration
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Check for domain-specific build_manager_config.yml
      ansible.builtin.stat:
        path: "{{ input_project_dir }}/build_manager/build_manager_config.yml"
      register: bm_config_file

    - name: Load build_manager_config.yml
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/build_manager/build_manager_config.yml"
      when: bm_config_file.stat.exists

    - name: Fallback — load legacy storage_config.yml
      block:
        - name: Include storage_config.yml file
          ansible.builtin.include_vars:
            file: "{{ input_project_dir }}/storage_config.yml"
          no_log: true
      rescue:
        - name: Set default storage backend if storage_config.yml not found
          ansible.builtin.set_fact:
            s3_configurations:
              provider: "minio"
      when: not bm_config_file.stat.exists

    - name: Fallback — load legacy build_stream_config.yml for aarch64 host
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/build_stream_config.yml"
      failed_when: false
      when: not bm_config_file.stat.exists

# Step 5: Deploy MinIO + Registry (idempotent)
- name: Prepare build infrastructure (MinIO + Registry)
  ansible.builtin.import_playbook: playbooks/prepare_build_manager.yml
  tags:
    - prepare

# Step 6: Build x86_64 images
- name: Build x86_64 images
  ansible.builtin.import_playbook: playbooks/build_image_x86_64.yml
  tags:
    - x86_64
    - build_image

# Step 7: Build aarch64 images
# NOTE: The aarch64 playbook has its own internal checks for ARM host availability.
# Tag filtering allows skipping via: --skip-tags aarch64
- name: Build aarch64 images
  ansible.builtin.import_playbook: playbooks/build_image_aarch64.yml
  tags:
    - aarch64
    - build_aarch_image

# Step 8: Write build_status.yml output
# Output: {{ output_project_dir }}/build_status.yml (NFS-shared)
# Includes per-functional-group image details with S3 paths for kernel, initrd, rootfs.
- name: Write build_status.yml output
  hosts: localhost
  connection: local
  gather_facts: true
  tags:
    - output
    - x86_64
    - aarch64
  vars:
    _output_base: "{{ output_project_dir | default('/opt/omnia/output/project_default') }}"
    _output_domain: "{{ _output_base }}/build_manager"
    _omnia_version: "{{ omnia_version | default('2.3.0.0') }}"
  tasks:
    - name: Ensure output directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ _output_base }}"
        - "{{ _output_domain }}"

    - name: Build the status data structure
      ansible.builtin.set_fact:
        build_status_data:
          overall_status: "completed"
          s3_endpoint_url: "{{ s3_endpoint | default('') }}"
          s3_bucket: "boot-images"
          build_arch_list: "{{ build_arch_completed | default(['x86_64']) }}"
          functional_group_images: "{{ build_completed_images | default([]) }}"

    - name: Write build_status.yml (latest — always overwritten)
      ansible.builtin.copy:
        content: "{{ build_status_data | to_nice_yaml(indent=2) }}"
        dest: "{{ _output_base }}/build_status.yml"
        mode: "0644"

    - name: Write versioned build_status copy
      ansible.builtin.copy:
        content: "{{ build_status_data | to_nice_yaml(indent=2) }}"
        dest: "{{ _output_domain }}/build_status_{{ _omnia_version }}_{{ ansible_date_time.date | regex_replace('-', '') }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.yml"
        mode: "0644"

    - name: Display build status output locations
      ansible.builtin.debug:
        msg:
          - "Latest: {{ _output_base }}/build_status.yml"
          - "Versioned: {{ _output_domain }}/build_status_{{ _omnia_version }}_{{ ansible_date_time.date | regex_replace('-', '') }}.yml"
