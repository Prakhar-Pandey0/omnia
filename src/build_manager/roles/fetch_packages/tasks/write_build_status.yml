---
# Writes build_status.yml to {{ output_project_dir }}/
# This output file is consumed by the provision domain for BSS template
# rendering (S3 paths for kernel, initrd, rootfs per functional group).
#
# Expected build_completed_images structure (populated by image_creation role):
#   - functional_group: "compute_x86_64"
#     arch: "x86_64"
#     kernel: "s3://boot-images/<group>/vmlinuz-<version>"
#     initrd: "s3://boot-images/<group>/initramfs-<version>.img"
#     rootfs: "s3://boot-images/<group>/rootfs-<version>.squashfs"
#     status: "success"

- name: Set output paths
  ansible.builtin.set_fact:
    _output_base: "{{ output_project_dir | default('/opt/omnia/output/project_default') }}"
    _output_domain: "{{ output_project_dir | default('/opt/omnia/output/project_default') }}/build_manager"
    _omnia_version: "{{ omnia_version | default('2.3.0.0') }}"

- name: Ensure output directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ _output_base }}"
    - "{{ _output_domain }}"

- name: Build the status data structure
  ansible.builtin.set_fact:
    build_status_data:
      overall_status: "completed"
      s3_endpoint_url: "{{ s3_endpoint | default('') }}"
      s3_bucket: "boot-images"
      build_arch_list: "{{ build_arch_completed | default([build_arch | default('x86_64')]) }}"
      functional_group_images: "{{ build_completed_images | default([]) }}"

- name: Write build_status.yml (latest)
  ansible.builtin.copy:
    content: "{{ build_status_data | to_nice_yaml(indent=2) }}"
    dest: "{{ _output_base }}/build_status.yml"
    mode: "0644"

- name: Write versioned build_status copy
  ansible.builtin.copy:
    content: "{{ build_status_data | to_nice_yaml(indent=2) }}"
    dest: "{{ _output_domain }}/build_status_{{ _omnia_version }}_{{ ansible_date_time.date | default(lookup('pipe', 'date +%Y%m%d')) | regex_replace('-', '') }}.yml"
    mode: "0644"

- name: Display build status output location
  ansible.builtin.debug:
    msg: "Build status written to {{ _output_base }}/build_status.yml"
