---
minio_port: 9000
minio_console_port: 9001
minio_data_dir: "/opt/omnia/minio/data"
minio_image: "quay.io/minio/minio:latest"
minio_access_key: "{{ hostvars['localhost']['s3_access_id'] | default('admin', true) }}"
minio_secret_key: "{{ hostvars['localhost']['s3_secret_key'] }}"

# Fixed S3 bucket names — NOT user-modifiable
s3_boot_images_bucket: "boot-images"
s3_efi_images_bucket: "efi-images"
