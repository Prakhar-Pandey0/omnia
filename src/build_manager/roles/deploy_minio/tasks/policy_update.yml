---
# policy_update.yml — Set S3 bucket policies for boot-images and efi buckets.

- name: Create boot-images bucket if not exists
  ansible.builtin.command:
    cmd: >
      podman exec minio mc mb --ignore-existing local/boot-images
  changed_when: false

- name: Create efi-images bucket if not exists
  ansible.builtin.command:
    cmd: >
      podman exec minio mc mb --ignore-existing local/efi-images
  changed_when: false

- name: Render boot-images public-read policy
  ansible.builtin.template:
    src: s3/s3-public-read-boot.json.j2
    dest: /tmp/s3-public-read-boot.json
    mode: "0644"

- name: Apply boot-images public-read policy
  ansible.builtin.command:
    cmd: >
      podman exec minio mc anonymous set-json /tmp/s3-public-read-boot.json local/boot-images
  changed_when: true

- name: Render efi-images public-read policy
  ansible.builtin.template:
    src: s3/s3-public-read-efi.json.j2
    dest: /tmp/s3-public-read-efi.json
    mode: "0644"

- name: Apply efi-images public-read policy
  ansible.builtin.command:
    cmd: >
      podman exec minio mc anonymous set-json /tmp/s3-public-read-efi.json local/efi-images
  changed_when: true
