---
# deploy_minio/tasks/main.yml — Deploy MinIO S3 as a Quadlet container service.
# Extracted from prepare_oim/roles/deploy_containers/openchami/tasks/configs/minio.yml

- name: Check if MinIO is already running
  ansible.builtin.systemd:
    name: minio
  register: minio_service_status
  failed_when: false

- name: Skip MinIO deploy if already running
  ansible.builtin.debug:
    msg: "MinIO service is already running — skipping deploy (idempotent)"
  when: minio_service_status.status.ActiveState | default('') == 'active'

- name: Deploy MinIO Quadlet service
  when: minio_service_status.status.ActiveState | default('') != 'active'
  block:
    - name: Create MinIO data directory
      ansible.builtin.file:
        path: "{{ minio_data_dir }}"
        state: directory
        mode: "0755"

    - name: Render MinIO Quadlet service file
      ansible.builtin.template:
        src: minio/minio.service.j2
        dest: /etc/containers/systemd/minio.container
        mode: "0644"
      notify: Reload systemd daemon

    - name: Flush handlers to reload systemd
      ansible.builtin.meta: flush_handlers

    - name: Start MinIO service
      ansible.builtin.systemd:
        name: minio
        state: started
        enabled: true

    - name: Wait for MinIO to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ minio_port }}/minio/health/live"
        method: GET
        status_code: 200
      register: minio_health
      retries: 10
      delay: 5
      until: minio_health.status == 200

- name: Apply S3 bucket policies
  ansible.builtin.include_tasks: policy_update.yml
