---
# Variables and error messages for build_manager input validation

# File paths used by validation tasks
input_project_dir: "{{ hostvars['localhost']['input_project_dir'] | default('/opt/omnia/input/project_default') }}"
software_config_file_path: "{{ input_project_dir }}/software_config.json"
functional_groups_file_path: "{{ input_project_dir }}/functional_groups_config.yml"

# Fixed S3 bucket names — NOT user-modifiable
s3_boot_images_bucket: "boot-images"
s3_efi_images_bucket: "efi-images"

# Validation error messages

validate_s3_provider_fail_msg: >
  Invalid or missing s3_configurations.provider in build_manager_config.yml (or storage_config.yml).
  Allowed values: 'minio' or 'powerscale'.
  Please set s3_configurations.provider in
  {{ input_project_dir }}/build_manager/build_manager_config.yml

validate_s3_bucket_fail_msg: >
  S3 bucket name is invalid. NOTE: bucket names are FIXED constants
  (boot-images and efi-images) and cannot be changed by the user.

validate_software_config_fail_msg: >
  software_config.json not found at {{ software_config_file_path }}.
  This file is required for build_image. Ensure it exists in the input directory.

validate_fg_config_fail_msg: >
  functional_groups_config.yml not found at {{ functional_groups_file_path }}.
  This file is required for image building. Ensure it is generated by
  running the generate_functional_groups utility or providing it in input/.

validate_aarch64_host_fail_msg: >
  aarch64_inventory_host_ip is empty but aarch64 build was requested.
  Please set aarch64_inventory_host_ip in build_manager_config.yml
  with the IP address of the ARM admin build host.

validate_repo_status_fail_msg: >
  repo_status.yml pre-check failed. overall_status is not 'synced'.
  Run repo_manager first:
    cd ../repo_manager && ansible-playbook repo_manager.yml
