# build_credentials.yml — build_manager domain credential reference.
#
# Credentials are managed by the shared credential utility at:
#   src/playbooks/utils/credential_utility/
#
# The build_manager domain uses tag: "build_manager" (in omnia_run_tags)
# which prompts for the following credentials:
#
# ┌───────────────────┬───────────────────┬──────────────────────────────────────┐
# │ Credential        │ Type              │ When Prompted                        │
# ├───────────────────┼───────────────────┼──────────────────────────────────────┤
# │ s3_secret_key     │ mandatory         │ Always (MinIO/PowerScale password)   │
# │ s3_access_id      │ conditional       │ Only if provider == 'powerscale'     │
# │ provision_password│ mandatory         │ Always (SSH to ARM build host)       │
# └───────────────────┴───────────────────┴──────────────────────────────────────┘
#
# NOTE: S3 credentials and provision_password are stored EXCLUSIVELY in the
# build_manager credential file. They are NOT in omnia_config_credentials.yml.
# prepare_oim no longer prompts for S3 creds — build_manager owns them.
#
# Vault-encrypted storage:
#   {{ input_project_dir }}/build_manager_credentials.yml
#   Vault key: {{ input_project_dir }}/.build_manager_credentials_key
#
# Credential definition:
#   src/playbooks/utils/credential_utility/roles/update_config/vars/main.yml
#   → omnia_credentials.build_manager
#
# This file is a reference only. No values need to be set here.
