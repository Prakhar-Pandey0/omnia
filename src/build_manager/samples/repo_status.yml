# ============================================================================
# SAMPLE: repo_status.yml — repo_manager output contract
# ============================================================================
# Location (NFS):
#   /opt/omnia/output/repo_manager/repo_status.yml
#
# Producer: repo_manager domain (repo_manager.yml)
# Consumer: build_manager domain (build_manager.yml Step 3)
#
# build_manager pre-check validates:
#   1. File exists at repo_manager_output path
#   2. overall_status == "synced"
#   3. rpm_repos contains valid URLs for the target architectures
# ============================================================================

overall_status: "synced"

# ---------------------------------------------------------------------------
# RPM Repository URLs (Pulp-served)
# ---------------------------------------------------------------------------
# These are the Pulp-proxied repo URLs that build_manager uses to inject
# into kickstart/image-creator templates. Each arch has its own set.
# build_manager converts these into rhel_arch_repos list for image templates.
rpm_repos:
  x86_64:
    baseos: "https://oim.example.com:8443/pulp/content/omnia/rhel-10-for-x86_64-baseos-rpms/"
    appstream: "https://oim.example.com:8443/pulp/content/omnia/rhel-10-for-x86_64-appstream-rpms/"
    codeready_builder: "https://oim.example.com:8443/pulp/content/omnia/codeready-builder-for-rhel-10-x86_64-rpms/"
    epel: "https://oim.example.com:8443/pulp/content/omnia/epel-10-x86_64/"
    omnia: "https://oim.example.com:8443/pulp/content/omnia/omnia-rpms-x86_64/"
  aarch64:
    baseos: "https://oim.example.com:8443/pulp/content/omnia/rhel-10-for-aarch64-baseos-rpms/"
    appstream: "https://oim.example.com:8443/pulp/content/omnia/rhel-10-for-aarch64-appstream-rpms/"
    codeready_builder: "https://oim.example.com:8443/pulp/content/omnia/codeready-builder-for-rhel-10-aarch64-rpms/"
    epel: "https://oim.example.com:8443/pulp/content/omnia/epel-10-aarch64/"
    omnia: "https://oim.example.com:8443/pulp/content/omnia/omnia-rpms-aarch64/"
