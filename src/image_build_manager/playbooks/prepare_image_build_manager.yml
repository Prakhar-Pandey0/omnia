---
# prepare_image_build_manager.yml — Deploy MinIO (S3) + local container registry.
# Idempotent — safe to run multiple times.
#
# Standalone usage:
#   cd src/image_build_manager/playbooks
#   ansible-playbook prepare_image_build_manager.yml
#
# When run standalone, credentials and input dir are loaded here.
# When imported from image_build_manager.yml, those steps run in the parent (tags: always).

# Standalone: load credentials via credential utility
- name: Invoke credential utility for prepare_image_build_manager (standalone)
  ansible.builtin.import_playbook: ../../playbooks/utils/credential_utility/get_config_credentials.yml
  vars:
    omnia_run_tags: ["image_build_manager"]
  tags: always

- name: Include input project directory (standalone)
  when: not project_dir_status | default(false) | bool
  ansible.builtin.import_playbook: ../../playbooks/utils/include_input_dir.yml
  vars:
    openchami_vars_suppport: true
    omnia_metadata_support: true
  tags: always

- name: Create oim group
  ansible.builtin.import_playbook: ../../playbooks/utils/create_container_group.yml
  vars:
    oim_group: true
  tags: always

- name: Deploy MinIO and Registry on OIM
  hosts: oim
  connection: ssh
  gather_facts: true
  tasks:
    - name: Deploy MinIO S3 storage
      ansible.builtin.include_role:
        name: deploy_minio

    - name: Deploy local container registry
      ansible.builtin.include_role:
        name: deploy_registry
