---
# Standalone credential flow for image_build_manager.
# Can be used independently of the central credential_utility.
#
# Usage:
#   cd src/image_build_manager
#   ansible-playbook playbooks/image_build_credentials.yml
#
# This playbook:
#   1. Loads the input project directory
#   2. Loads image_build_config.yml (for s3_configurations)
#   3. Validates, creates, and prompts for image build credentials
#   4. Credentials are stored encrypted at:
#      {input_project_dir}/image_build_manager/image_build_credentials.yml

- name: Standalone setup for credentials
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run image_build_setup role (standalone only)
      ansible.builtin.include_role:
        name: image_build_setup
      when: not (image_build_setup_done | default(false) | bool)

- name: Image build credential management
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Load image_build_config.yml for storage provider info
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/image_build_manager/image_build_config.yml"
      failed_when: false

    - name: Run image_build_credentials role
      ansible.builtin.include_role:
        name: image_build_credentials
