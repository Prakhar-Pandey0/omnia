---
# cleanup_image_build_manager.yml — Cleanup MinIO, registry, and build artifacts.
#
# Usage:
#   cd src/image_build_manager/playbooks
#   ansible-playbook cleanup_image_build_manager.yml                              # Full cleanup (includes credentials)
#   ansible-playbook cleanup_image_build_manager.yml --tags minio                 # MinIO only
#   ansible-playbook cleanup_image_build_manager.yml --tags registry              # Registry only
#   ansible-playbook cleanup_image_build_manager.yml --skip-tags credentials      # Skip credential removal
#   ansible-playbook cleanup_image_build_manager.yml --skip-tags minio            # Skip MinIO cleanup
#
# When imported from image_build_manager.yml, image_build_setup is already done.
# When run standalone, image_build_setup handles upgrade guard, input dir, oim group.

# Standalone: run image_build_setup
- name: Standalone setup for cleanup
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run image_build_setup role (standalone only)
      ansible.builtin.include_role:
        name: image_build_setup
      when: not (image_build_setup_done | default(false) | bool)

# Load image_build_config.yml to get s3_configurations
- name: Load image_build_manager configuration
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Load image_build_config.yml
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/image_build_manager/image_build_config.yml"
      failed_when: false

# Execute cleanup on OIM host (includes credential removal by default)
- name: Cleanup image_build_manager services # noqa:role-name[path]
  hosts: oim
  connection: ssh
  gather_facts: false
  roles:
    - cleanup_build_artifacts

# Display post-cleanup notes
- name: Show cleanup instructions
  hosts: oim
  connection: ssh
  gather_facts: false
  tasks:
    - name: Display image_build_manager post-cleanup notes
      ansible.builtin.include_role:
        name: cleanup_build_artifacts
        tasks_from: cleanup_note.yml
