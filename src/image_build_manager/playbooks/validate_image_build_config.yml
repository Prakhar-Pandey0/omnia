---
# validate_image_build_config.yml — Standalone image_build_manager validation.
#
# Runs L1 (JSON schema) and L2 (cross-field logic) validation on:
#   - image_build_config.yml
#   - image_build_credentials.yml (if present and decrypted)
#
# Usage:
#   cd src/image_build_manager
#   ansible-playbook playbooks/validate_image_build_config.yml
#
# When run standalone, image_build_setup handles upgrade guard, input dir, oim group.
# When imported from image_build_manager.yml (image_build_setup_done=true), setup is skipped.

# Standalone: run image_build_setup
- name: Standalone setup for validation
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run image_build_setup role (standalone only)
      ansible.builtin.include_role:
        name: image_build_setup
      when: not (image_build_setup_done | default(false) | bool)

# Run image_build-specific validation
- name: Image build configuration validation
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - validate_image_build_input
