---

- name: Standalone setup and set build architecture for x86_64
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run image_build_setup role (standalone only)
      ansible.builtin.include_role:
        name: image_build_setup
      when: not (image_build_setup_done | default(false) | bool)

    - name: Run image_build_credentials role (standalone only)
      ansible.builtin.include_role:
        name: image_build_credentials
      when: not (image_build_setup_done | default(false) | bool)

    - name: Run input validation (standalone only)
      ansible.builtin.include_role:
        name: validate_image_build_input
      when: not (image_build_setup_done | default(false) | bool)

    - name: Set build architecture
      ansible.builtin.set_fact:
        build_arch: "x86_64"
        cacheable: true

- name: Pre-check repo_manager status and load RPM repo URLs
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    _repo_status_path: "{{ repo_manager_output_path | default('') | ternary(repo_manager_output_path, output_project_dir + '/repo_manager/repo_status.yml') }}"
  tasks:
    - name: Check if repo_status.yml exists
      ansible.builtin.stat:
        path: "{{ _repo_status_path }}"
      register: repo_status_file

    - name: Load repo_status.yml from repo_manager output
      ansible.builtin.include_vars:
        file: "{{ _repo_status_path }}"
      when: repo_status_file.stat.exists

    - name: Fail if repo_manager has not completed
      ansible.builtin.fail:
        msg: >
          repo_status.yml not found at {{ _repo_status_path }} or overall_status != 'success'.
          Run repo_manager first: cd ../repo_manager && ansible-playbook repo_manager.yml
      when: >
        repo_manager_output_path | default('') | length > 0 and
        (not repo_status_file.stat.exists or overall_status | default('') != 'success')

    - name: Set repo_manager facts from repo_status.yml
      ansible.builtin.set_fact:
        pulp_port: "{{ repo_manager.port | default(2225) }}"
        pulp_cert_oim_path: "{{ repo_manager.certificates.server_crt | default('') | regex_replace('^/opt/omnia/', oim_shared_path + '/omnia/') }}"
        cacheable: true
      when:
        - repo_manager_output_path | default('') | length > 0
        - repo_manager is defined

    - name: Build repo lists from repo_manager output
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: []
      when:
        - repo_manager_output_path | default('') | length > 0
        - rpm_repos is defined

    - name: Build x86_64 repo list from rpm_repos
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: "{{ repo_manager_repos_x86_64 + [{'name': item.key, 'base_url': item.value, 'gpg': ''}] }}"
      loop: "{{ (rpm_repos.x86_64 | default({})) | dict2items }}"
      loop_control:
        loop_var: item
      when:
        - repo_manager_output_path | default('') | length > 0
        - rpm_repos is defined

    - name: Build x86_64 repo list from user_repos
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: "{{ repo_manager_repos_x86_64 + [{'name': item.key, 'base_url': item.value, 'gpg': ''}] }}"
      loop: "{{ (user_repos.x86_64 | default({})) | dict2items }}"
      loop_control:
        loop_var: item
      when:
        - repo_manager_output_path | default('') | length > 0
        - user_repos is defined

    - name: Make repo list cacheable
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: "{{ repo_manager_repos_x86_64 }}"
        cacheable: true
      when:
        - repo_manager_output_path | default('') | length > 0
        - rpm_repos is defined

- name: Load image_build_manager configuration for x86_64
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Load image_build_config.yml
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/image_build_manager/image_build_config.yml"

    - name: Set build_stream variables from extra_vars
      ansible.builtin.set_fact:
        build_stream_job_id: "{{ job_id | default('') }}"
        build_stream_image_key: "{{ image_key | default('') }}"
        build_stream_functional_groups: "{{ functional_groups | default([]) }}"
        enable_build_stream: "{{ enable_build_stream | default(false) | bool }}"

    - name: Debug - Show build_stream variables
      ansible.builtin.debug:
        msg:
          - "build_stream_job_id: {{ build_stream_job_id }}"
          - "build_stream_image_key: {{ build_stream_image_key }}"
          - "build_stream_functional_groups: {{ build_stream_functional_groups }}"
          - "enable_build_stream: {{ enable_build_stream }}"
        verbosity: 2

    - name: Fetch build_stream prerequisites
      ansible.builtin.include_role:
        name: fetch_packages
        tasks_from: build_stream_prerequisite.yml
      vars:
        job_id: "{{ build_stream_job_id }}"
        image_key: "{{ build_stream_image_key }}"
        functional_groups: "{{ build_stream_functional_groups }}"
      when: enable_build_stream | default(false) | bool

- name: Validate image_build_manager inputs for x86_64
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run image_build_manager input validation
      ansible.builtin.include_role:
        name: validate_build_config

- name: Generate and verify x86_64 functional groups
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Generate functional groups from mapping.csv
      ansible.builtin.include_role:
        name: image_build_functional_groups
      when: not (enable_build_stream | default(false) | bool)

    - name: Fetch x86_64 functional_groups
      ansible.builtin.include_role:
        name: fetch_packages
        tasks_from: check_functional_group.yml
      when: not (enable_build_stream | default(false) | bool)

- name: Fetch packages for x86_64
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - fetch_packages

- name: OpenCHAMI build image for x86_64
  hosts: oim
  connection: ssh
  gather_facts: false
  roles:
    - role: image_creation
      vars:
        build_arch: "{{ hostvars['localhost']['build_arch'] }}"
        s3_configurations: "{{ hostvars['localhost']['s3_configurations'] }}"

- name: Build x86_64 image completion
  hosts: localhost
  connection: local
  tasks:
    - name: Build Image completion
      ansible.builtin.include_role:
        name: fetch_packages
        tasks_from: build_image_completion.yml
