---
# validate_image_build_input — L1 schema + L2 logic validation for image_build_manager.
#
# Validates:
#   - image_build_config.yml (required)
#   - image_build_credentials.yml (optional — may be encrypted/absent on first run)
#
# Runs as a standalone role or embedded in image_build_manager.yml flow.

- name: Display validation start
  ansible.builtin.debug:
    msg: "{{ image_build_validation_start_msg }}"

# Pre-check: ensure image_build_config.yml exists
- name: Check image_build_config.yml exists
  ansible.builtin.stat:
    path: "{{ input_project_dir }}/image_build_manager/image_build_config.yml"
  register: image_build_config_stat

- name: Fail if image_build_config.yml is missing
  ansible.builtin.fail:
    msg: "{{ image_build_config_missing_msg }}"
  when: not image_build_config_stat.stat.exists

# Run the validate_image_build_config module (L1 + L2)
- name: Run image_build configuration validation
  validate_image_build_config:
    input_project_dir: "{{ input_project_dir }}"
    schema_dir: "{{ image_build_schema_dir }}"
  register: image_build_validation_result

# Report results
- name: Display validation log path
  ansible.builtin.debug:
    msg: "Validation log: {{ image_build_validation_result.log_file }}"

- name: Display valid files
  ansible.builtin.debug:
    msg: "Valid: {{ image_build_validation_result.valid_files }}"
  when: image_build_validation_result.valid_files | length > 0

- name: Display validation errors
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ image_build_validation_result.errors }}"
  when: image_build_validation_result.validation_failed

- name: Fail on validation errors
  ansible.builtin.fail:
    msg: "{{ image_build_validation_fail_msg }} Errors: {{ image_build_validation_result.errors }}"
  when: image_build_validation_result.validation_failed

- name: Validation passed
  ansible.builtin.debug:
    msg: "{{ image_build_validation_pass_msg }}"
  when: not image_build_validation_result.validation_failed
