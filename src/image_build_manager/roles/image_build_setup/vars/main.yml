---

# --- Upgrade guard ---
upgrade_lock_path: /opt/omnia/.data/upgrade_in_progress.lock
upgrade_in_progress_msg: >-
  Upgrade is not completed fully.
  Please run upgrade.yml to complete upgrade before running any other playbook using the below command:
  "ansible-playbook /omnia/src/playbooks/upgrade/upgrade.yml"
  If you don't require input files to be migrated, reconfigure the default input files, remove the lock file using the following command
  "rm /opt/omnia/.data/upgrade_in_progress.lock" and then proceed.

# --- Input project directory ---
omnia_input_dir: /opt/omnia/input
omnia_output_dir: /opt/omnia/output
omnia_input_config_file: "{{ omnia_input_dir }}/default.yml"
omnia_metadata_file_path: "/opt/omnia/.data/oim_metadata.yml"
omnia_input_config_syntax_fail_msg: >-
  Unable to load the Omnia project configuration file at {{ omnia_input_config_file }}.
  Please ensure the file exists and has valid YAML syntax before re-running the playbook.
project_dir_not_exist_fail_msg: >-
  The project directory at {{ input_project_dir }} does not exist.
  Please ensure the directory exists before re-running the playbook.

# --- Common vars (inlined from common/vars/common_vars.yml) ---
clone_retry: "5"
clone_delay: "10"
fail_retry: "5"
fail_delay: "10"
dir_permissions_755: "0755"
file_permissions_755: "0755"
file_permissions_644: "0644"
file_permissions_600: "0600"
file_permissions_400: "0400"
job_retry: "240"
job_delay: "30"

# --- OIM group ---
oim_host_port: "22"
oim_host_group: "oim"

# --- Tag validation ---
# Supported tags for image_build_manager.yml
supported_tags:
  - prepare
  - build
  - cleanup
  - validate
  - upgrade
  - rollback

# Tags that skip credential prompting
skip_credential_tags:
  - cleanup
  - validate

# Invalid tag combinations (mutually exclusive)
invalid_tag_combinations:
  - [prepare, cleanup]
  - [build, cleanup]
  - [prepare, upgrade]
  - [build, upgrade]
  - [cleanup, upgrade]
  - [prepare, rollback]
  - [build, rollback]
  - [cleanup, rollback]
  - [upgrade, rollback]

# Tag validation messages
tag_validation_fail_msg: |
  Invalid tag usage detected.
  
  Supported tags: {{ supported_tags | join(', ') }}
  
  Invalid tags provided: {{ invalid_tags | join(', ') }}
  
  Please use only supported tags.

tag_combination_fail_msg: |
  Invalid tag combination detected: {{ ansible_run_tags | join(', ') }}
  
  The following tag combinations are not allowed:
  {% for combo in invalid_tag_combinations %}
  - {{ combo | join(' + ') }}
  {% endfor %}
  
  Please run with only ONE tag at a time (or no tags for default flow).
