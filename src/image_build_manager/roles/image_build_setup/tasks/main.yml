---
# image_build_setup — Self-contained setup for image_build_manager.
# Replaces: upgrade_checkup.yml + include_input_dir.yml + create_container_group.yml
#
# What it does:
#   1. Guard: block if upgrade is in progress
#   2. Load omnia project config (input/output dirs)
#   3. Load OIM metadata
#   4. Create oim inventory group
#   5. Set image_build_main_flow and skip_subscription_check facts

# --- Step 1: Upgrade guard ---
- name: Check upgrade lock file
  ansible.builtin.stat:
    path: "{{ upgrade_lock_path }}"
  register: upgrade_lock

- name: Block playbook while upgrade is in progress
  ansible.builtin.fail:
    msg: "{{ upgrade_in_progress_msg }}"
  when:
    - upgrade_lock.stat.exists
    - not (upgrade_mode | default(false) | bool)

# --- Step 2: Load omnia project config ---
- name: Load omnia project config file
  block:
    - name: Include omnia project config file
      ansible.builtin.include_vars: "{{ omnia_input_config_file }}"
      register: include_omnia_config
  rescue:
    - name: Failed to include omnia project config file
      ansible.builtin.fail:
        msg: "{{ omnia_input_config_syntax_fail_msg }} Error: {{ include_omnia_config.message }}"

- name: Set input_project_dir and output_project_dir
  ansible.builtin.set_fact:
    input_project_dir: "{{ omnia_input_dir }}/{{ project_name }}"
    output_project_dir: "{{ omnia_output_dir }}/{{ project_name }}"
    cacheable: true

- name: Verify the project directory exists
  ansible.builtin.stat:
    path: "{{ input_project_dir }}"
  register: verify_project_dir

- name: Fail if project directory does not exist
  ansible.builtin.fail:
    msg: "{{ project_dir_not_exist_fail_msg }}"
  when: not verify_project_dir.stat

# --- Step 3: Load OIM metadata ---
- name: Include oim metadata vars
  ansible.builtin.include_vars: "{{ omnia_metadata_file_path }}"

# --- Step 4: Create oim inventory group ---
- name: Create {{ oim_host_group }} group # noqa: name[template]
  ansible.builtin.add_host:
    hostname: "{{ oim_host_group }}"
    ansible_host: "localhost"
    ansible_port: "{{ oim_host_port }}"
    groups: "{{ oim_host_group }}"

# --- Step 5: Set image build guard facts ---
- name: Set image_build_manager guard facts
  ansible.builtin.set_fact:
    image_build_main_flow: true
    skip_subscription_check: true
    omnia_run_tags: "{{ omnia_run_tags | default(['image_build_manager']) }}"
    image_build_setup_done: true
    cacheable: true
