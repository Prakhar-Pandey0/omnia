---
# cleanup_credentials.yml — Remove image_build_credentials.yml and its vault key.

- name: Remove image_build_credentials.yml
  ansible.builtin.file:
    path: "{{ image_build_credentials_file }}"
    state: absent
  delegate_to: localhost
  connection: local

- name: Remove image_build_credentials vault key
  ansible.builtin.file:
    path: "{{ image_build_credentials_key }}"
    state: absent
  delegate_to: localhost
  connection: local
