---
# cleanup_omnia_target.yml — Remove minio.service and registry.service from omnia.target.

- name: Check if omnia.target exists
  ansible.builtin.stat:
    path: "{{ omnia_target_path }}"
  register: omnia_target_check

- name: Remove image_build_manager services from omnia.target
  when: omnia_target_check.stat.exists
  block:
    - name: Remove minio.service from omnia.target Requires line
      ansible.builtin.replace:
        path: "{{ omnia_target_path }}"
        regexp: '\s*minio\.service'
        replace: ''
      register: minio_target_removed

    - name: Remove registry.service from omnia.target Requires line
      ansible.builtin.replace:
        path: "{{ omnia_target_path }}"
        regexp: '\s*registry\.service'
        replace: ''
      register: registry_target_removed

    - name: Reload systemd after target update
      ansible.builtin.systemd:
        daemon_reload: true
      when: minio_target_removed.changed or registry_target_removed.changed
