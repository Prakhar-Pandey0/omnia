---
# cleanup_image_build_manager/tasks/main.yml — Cleanup MinIO, registry, and build artifacts.

- name: Display cleanup start
  ansible.builtin.debug:
    msg: "{{ cleanup_started_msg }}"

- name: Cleanup MinIO container and data
  ansible.builtin.include_tasks: cleanup_minio.yml
  tags: minio

- name: Cleanup registry container and data
  ansible.builtin.include_tasks: cleanup_registry.yml
  tags: registry

- name: Cleanup build output files
  ansible.builtin.include_tasks: cleanup_build_output.yml
  tags: output

- name: Remove image_build_manager entries from omnia.target
  ansible.builtin.include_tasks: cleanup_omnia_target.yml
  tags: omnia_target

- name: Cleanup s3cmd configuration
  ansible.builtin.include_tasks: cleanup_s3cmd.yml
  tags: s3cmd

- name: Cleanup image_build_manager credentials
  ansible.builtin.include_tasks: cleanup_credentials.yml
  tags: credentials
