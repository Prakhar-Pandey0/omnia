---
# cleanup_minio.yml — Stop and remove MinIO container, Quadlet unit, data directories.
# Skipped when s3_configurations.provider == 'powerscale'.

- name: Skip MinIO cleanup for PowerScale provider
  ansible.builtin.debug:
    msg: "{{ minio_skip_msg }}"
  when: s3_provider == 'powerscale'

- name: Cleanup MinIO (minio provider only)
  when: s3_provider != 'powerscale'
  block:
    - name: Check if MinIO service exists
      ansible.builtin.systemd:
        name: "{{ minio_service_name }}"
      register: minio_service_check
      failed_when: false

    - name: Stop and disable MinIO service
      ansible.builtin.systemd:
        name: "{{ minio_service_name }}"
        state: stopped
        enabled: false
      when: minio_service_check.status.ActiveState | default('') != 'inactive'
      failed_when: false

    - name: Remove MinIO Quadlet service file
      ansible.builtin.file:
        path: "{{ minio_quadlet_file }}"
        state: absent

    - name: Reload systemd after removing MinIO Quadlet
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Remove MinIO container image
      ansible.builtin.command: podman rmi --force minio/minio
      failed_when: false
      changed_when: true

    - name: Remove MinIO data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ minio_cleanup_directories }}"

    - name: Remove MinIO firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: disabled
      loop: "{{ minio_firewall_ports }}"
      failed_when: false

    - name: Reload firewall after MinIO port removal
      ansible.builtin.command: firewall-cmd --reload
      failed_when: false
      changed_when: true
