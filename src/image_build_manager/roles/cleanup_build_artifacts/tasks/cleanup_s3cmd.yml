---
# cleanup_s3cmd.yml — Remove s3cmd configuration file.
# s3cmd is installed by deploy_minio for bucket operations.

- name: Remove s3cmd configuration
  ansible.builtin.file:
    path: "{{ s3cmd_config }}"
    state: absent
  when: s3_provider != 'powerscale'

- name: Remove image build workdir
  ansible.builtin.file:
    path: "{{ image_build_work_dir }}"
    state: absent
