---
# cleanup_registry.yml — Stop and remove local container registry, Quadlet unit, data directories.

- name: Check if registry service exists
  ansible.builtin.systemd:
    name: "{{ registry_service_name }}"
  register: registry_service_check
  failed_when: false

- name: Stop and disable registry service
  ansible.builtin.systemd:
    name: "{{ registry_service_name }}"
    state: stopped
    enabled: false
  when: registry_service_check.status.ActiveState | default('') != 'inactive'
  failed_when: false

- name: Remove registry Quadlet service file
  ansible.builtin.file:
    path: "{{ registry_quadlet_file }}"
    state: absent

- name: Reload systemd after removing registry Quadlet
  ansible.builtin.systemd:
    daemon_reload: true

- name: Remove registry container image
  ansible.builtin.command: podman rmi --force registry:2
  failed_when: false
  changed_when: true

- name: Remove registry data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ registry_cleanup_directories }}"

- name: Remove registry firewall ports
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: disabled
  loop: "{{ registry_firewall_ports }}"
  failed_when: false

- name: Reload firewall after registry port removal
  ansible.builtin.command: firewall-cmd --reload
  failed_when: false
  changed_when: true
