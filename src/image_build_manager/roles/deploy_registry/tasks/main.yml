---
# deploy_registry/tasks/main.yml — Deploy local container registry as a Quadlet service.
# Extracted from prepare_oim/roles/deploy_containers/openchami/tasks/configs/registry.yml

- name: Check if registry is already running
  ansible.builtin.systemd:
    name: registry
  register: registry_service_status
  failed_when: false

- name: Skip registry deploy if already running
  ansible.builtin.debug:
    msg: "Registry service is already running on port {{ registry_port }} — skipping deploy (idempotent)"
  when: registry_service_status.status.ActiveState | default('') == 'active'

- name: Deploy registry Quadlet service
  when: registry_service_status.status.ActiveState | default('') != 'active'
  block:
    - name: Create registry storage directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ registry_storage_dir }}"
        - "{{ data_oci_dir }}"

    - name: Render registry Quadlet service file
      ansible.builtin.template:
        src: registry/registry.service.j2
        dest: /etc/containers/systemd/registry.container
        mode: "0644"
      notify: Reload systemd daemon

    - name: Flush handlers to reload systemd
      ansible.builtin.meta: flush_handlers

    - name: Enable and start registry service
      ansible.builtin.systemd_service:
        name: registry
        state: started
        enabled: true

    - name: Verify registry container is running
      containers.podman.podman_container_info:
        name: registry
      register: registry_container_status
      retries: "{{ max_retries }}"
      delay: "{{ delay_count }}"
      until:
        - registry_container_status.containers | length > 0
        - registry_container_status.containers[0].State.Status == 'running'

    - name: Wait for registry health endpoint to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ registry_port }}/v2/"
        method: GET
        status_code: 200
      register: registry_health
      retries: 10
      delay: 3
      until: registry_health.status == 200
