---

- name: Include prepare pulp image task (x86_64 only)
  ansible.builtin.include_tasks: prepare_pulp_image.yml
  when: build_arch == 'x86_64'

- name: Include metadata vars
  ansible.builtin.include_vars: "{{ omnia_metadata_file }}"
  register: include_metadata
  no_log: true

- name: Include global variables from common folder
  ansible.builtin.include_vars: "{{ role_path }}/../../../common/vars/openchami_image_cmd.yml"
  register: ochami_image_global_vars

- name: Build image common tasks for {{ build_arch }}
  ansible.builtin.include_tasks: "build_image_common_{{ build_arch }}.yml"

- name: Invoking {{ build_arch }} build base image playbook
  ansible.builtin.include_tasks: "build_base_image_{{ build_arch }}.yml"
  tags: base_image

- name: Invoking {{ build_arch }} build rhel compute image playbooks
  ansible.builtin.include_tasks: "build_compute_image_{{ build_arch }}.yml"
  tags: compute_image

- name: Set S3 bucket ACLs for PowerScale backend
  ansible.builtin.include_tasks: set_s3_acl.yml
  when:
    - s3_configurations is defined
    - s3_configurations.provider is defined
    - s3_configurations.provider | lower == 'powerscale'
  tags: s3_acl

- name: Record built images for build_status output
  ansible.builtin.set_fact:
    _new_images: []
    build_arch_completed: "{{ (hostvars[inventory_hostname]['build_arch_completed'] | default([])) + [build_arch] }}"

- name: Build image list entries
  vars:
    _fg_k8s_sfx: "{{ (item.key is match('service_kube_')) | ternary('_k8s_' + hostvars['localhost']['service_k8s_version'] | default(''), '') }}"
    _image_name: "rhel-{{ item.key }}{{ omnia_suffix }}{{ _fg_k8s_sfx }}"
  ansible.builtin.set_fact:
    _new_images: "{{ _new_images + [{
      'functional_group': item.key,
      'kernel': 'boot-images/efi-images/' + item.key + '/' + _image_name + '/vmlinuz',
      'initrd': 'boot-images/efi-images/' + item.key + '/' + _image_name + '/initramfs.img',
      'image': 'boot-images/' + item.key + '/' + _image_name
    }] }}"
  loop: "{{ compute_images_dict | dict2items }}"

- name: Merge with existing build_completed_images
  ansible.builtin.set_fact:
    build_completed_images: "{{ (hostvars[inventory_hostname]['build_completed_images'] | default({}))
      | combine({build_arch: (hostvars[inventory_hostname]['build_completed_images'] | default({}))[build_arch] | default([]) + _new_images}) }}"
    cacheable: true
