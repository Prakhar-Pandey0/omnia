---
# Architecture-agnostic variables — build_arch is set by the calling playbook
# Image names derived from build_arch
pulp_image_name: "dellhpcomniaaisolution/image-build-el10:1.2"
local_tag: "{{ build_arch }}-image-builder/ochami"
rhel_arch_base_image_name: "rhel-{{ build_arch }}-base"

pull_image_retries: "5"
pull_image_delay: "10"
omnia_version: "{{ hostvars['localhost']['omnia_version'] | default('2.2.0.0') }}"
input_project_dir: "{{ hostvars['localhost']['input_project_dir'] }}"
omnia_metadata_file: "/opt/omnia/.data/oim_metadata.yml"
dir_permissions_644: "0644"
dir_permissions_755: "0755"
oim_shared_path: "{{ hostvars['localhost']['oim_shared_path'] }}"
pulp_cert_host_path: "{{ oim_shared_path }}/omnia/pulp/settings/certs/pulp_webserver.crt"
#pulp_cert_host_path: "{{ hostvars['localhost']['pulp_cert_host_path'] }}"
job_retry: "240"
job_delay: "30"
job_async: "7200"
pulp_webserver_cert_path: "{{ oim_shared_path }}/omnia/pulp/settings/certs/pulp_webserver.crt"
#pulp_webserver_cert_path: "{{ hostvars['localhost']['pulp_webserver_cert_path'] }}"
anchors_path: "/etc/pki/ca-trust/source/anchors/pulp_webserver.crt"
openchami_work_dir: "{{ oim_shared_path }}/omnia/openchami/workdir"
ochami_mounts:
  - --user 0 --privileged
  - -v {{ oim_shared_path }}/omnia/pulp/settings/certs/pulp_webserver.crt:/etc/pki/ca-trust/source/anchors/pulp_webserver.crt:z
#  - -v {{ pulp_cert_host_path }}:/etc/pki/ca-trust/source/anchors/pulp_webserver.crt:z
  - -v {{ openchami_work_dir }}/images/{{ rhel_arch_base_image_name }}-{{ rhel_tag }}.yaml:/home/builder/config.yaml:z
ochami_compute_mounts:
  - --user 0 --privileged
  - -v {{ oim_shared_path }}/omnia/pulp/settings/certs/pulp_webserver.crt:/etc/pki/ca-trust/source/anchors/pulp_webserver.crt:z
#  - -v {{ pulp_cert_host_path }}:/etc/pki/ca-trust/source/anchors/pulp_webserver.crt:z
  - -v {{ openchami_work_dir }}/images/{{ rhel_base_compute_image_name }}-{{ rhel_tag }}.yaml:/home/builder/config.yaml:z

ochami_image:
  - --entrypoint /bin/bash
  - "localhost/{{ local_tag }}"
ochami_base_command:
  - -c 'update-ca-trust extract && image-build --config /home/builder/config.yaml --log-level DEBUG'

# build_base_image.yml
openchami_log_dir: "{{ oim_shared_path }}/omnia/log/openchami"
openchami_base_image_log_path: "{{ oim_shared_path }}/omnia/log/openchami/{{ build_arch }}_base_image.log"
# build_base_image.yml - image-build config template
openchami_base_image_config_template: "{{ role_path }}/templates/images/rhel-base-config.yaml.j2"
base_image_failure_msg: |
  Base {{ build_arch }} image build job failed or timed out.
  Check logs at path {{ openchami_base_image_log_path }} on OIM host for details.
compute_image_failure_msg: |
  {{ build_arch }} compute image build job did not complete successfully.
  Check logs at {{ openchami_log_dir }} on OIM host for respective functional group for more details.

# build_compute_image.yml - image-build config template
openchami_compute_image_config_template: "{{ role_path }}/templates/images/rhel-compute-config.yaml.j2"


# preflight_selinux_check.yml
selinux_module_name: "omnia-crun-bpf"
selinux_policy_dir: "/etc/selinux/targeted/custom"
podman_verify_fail_msg: >-
  Podman cannot start containers on this node.
  Ensure the node was rebooted after the kernel update and that the
  omnia-crun-bpf SELinux module loaded successfully
  (semodule -lfull | grep omnia-crun-bpf).
selinux_install_warn_msg: >-
  WARNING: Failed to install omnia-crun-bpf SELinux policy module.
  Build will continue but may fail if the eBPF device filter issue is present.
  Check SELinux policy tools and audit log on this node.
