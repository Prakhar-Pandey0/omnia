---

- name: Fail if s3_configurations not loaded
  ansible.builtin.fail:
    msg: "s3_configurations is not defined. Ensure image_build_config.yml is loaded before this role."
  when: s3_configurations is not defined

- name: Set facts for aarch64 image templates vars
  ansible.builtin.set_fact:
    rhel_tag: "{{ hostvars['localhost']['rhel_tag'] }}"
    oim_node_name: "{{ hostvars['localhost']['oim_node_name'] }}"
    domain_name: "{{ hostvars['localhost']['domain_name'] }}"
    rhel_arch_repos: "{{ hostvars['localhost']['rhel_arch_repos'] }}"
    base_image_packages: "{{ hostvars['localhost']['base_image_packages'] }}"
    compute_images_dict: "{{ hostvars['localhost']['compute_images_dict'] }}"

- name: Normalize build stream inputs for base image
  ansible.builtin.set_fact:
    enable_build_stream: "{{ enable_build_stream | default(false) | bool }}"
    build_stream_job_id: "{{ build_stream_job_id | default('') }}"
    image_key: "{{ image_key | default('') }}"
    base_image_suffix: ""
    compute_image_suffix: ""
    aarch64_build_host: "{{ groups['admin_aarch64'][0] }}"

- name: Set omnia and k8s image naming suffixes
  ansible.builtin.set_fact:
    omnia_suffix: "_omnia_{{ omnia_version }}"
    k8s_suffix: "_k8s_{{ hostvars['localhost']['service_k8s_version'] | default('') }}"

- name: Set s3_access and s3_secret
  ansible.builtin.set_fact:
    s3_access: "{{ hostvars['localhost']['image_build_creds']['s3_access_id'] | default(hostvars['localhost']['s3_access_id'], true) | default('admin', true) }}"
    s3_secret: "{{ hostvars['localhost']['image_build_creds']['s3_secret_key'] | default(hostvars['localhost']['s3_secret_key'], true) | default('') }}"
  no_log: true

- name: Set s3_endpoint
  ansible.builtin.set_fact:
    s3_endpoint: >-
      {{ s3_configurations.endpoint_url
         if s3_configurations.provider == 'powerscale'
         else 'http://' + hostvars['localhost']['admin_nic_ip'] + ':9000' }}

- name: Set AWS checksum env vars for PowerScale S3 provider
  ansible.builtin.set_fact:
    aws_checksum_env: >-
      {{ '-e AWS_REQUEST_CHECKSUM_CALCULATION=when_required
      -e AWS_RESPONSE_CHECKSUM_VALIDATION=when_required'
      if s3_configurations.provider == 'powerscale' else '' }}

- name: Verify Podman can run containers
  ansible.builtin.command:
    cmd: podman run --rm localhost/{{ local_tag }} echo ok
  register: _podman_verify
  changed_when: false
  failed_when: false
  delegate_to: "{{ aarch64_build_host }}"
  connection: ssh

- name: Fail if Podman container runtime is broken
  ansible.builtin.fail:
    msg: "{{ podman_verify_fail_msg }} Error: {{ _podman_verify.stderr | default('unknown') }}"
  when: _podman_verify.rc != 0
