---
# image_build_manager.yml — Top-level entry point for the image_build_manager domain.
# Reads repo_status.yml from repo_manager output for Pulp URLs.
# Deploys MinIO + Registry, then builds OS images for x86_64 and aarch64.
#
# Usage (run ONE tag at a time — no comma-separated tags):
#   cd src/image_build_manager
#   ansible-playbook image_build_manager.yml                        # Default: prepare + build
#   ansible-playbook image_build_manager.yml --tags prepare         # Deploy MinIO + Registry only
#   ansible-playbook image_build_manager.yml --tags build           # Build images only (skip prepare)
#   ansible-playbook image_build_manager.yml --tags cleanup         # Cleanup MinIO, registry, artifacts
#   ansible-playbook image_build_manager.yml --tags upgrade         # Upgrade flow (placeholder)
#   ansible-playbook image_build_manager.yml --tags rollback        # Rollback flow (placeholder)
#
# Tags (mutually exclusive — pick ONE):
#   (none)   — Default flow: always + prepare + build
#   prepare  — Deploy MinIO + Registry
#   build    — Build OS images (x86_64 + aarch64) + write build_status
#   cleanup  — Remove MinIO, registry, build artifacts, omnia.target entries
#   upgrade  — Upgrade flow (placeholder — Omnia 3.0)
#   rollback — Rollback flow (placeholder — Omnia 3.0)
#
# Internal steps (always):
#   Step 0: Upgrade check
#   Step 1: Input project directory
#   Step 2: Credential collection (self-contained image_build_credentials)
#   Step 3: Load image_build_config.yml
#   Step 4: Pre-check repo_status.yml

# Step 0: Self-contained setup — upgrade guard, input dir, oim group, guard facts
- name: Image build manager setup
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  roles:
    - image_build_setup

# Step 1: Image build input validation (domain-specific L1 schema + L2 logic)
- name: Validate image build configuration
  ansible.builtin.import_playbook: playbooks/validate_image_build_config.yml
  tags:
    - always
    - validate

# Step 2: Credential collection (self-contained image_build_credentials)
- name: Image build credential management
  ansible.builtin.import_playbook: playbooks/image_build_credentials.yml
  tags: always


# Step 3: Load image_build_config.yml
- name: Load image_build_manager configuration
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Load image_build_config.yml
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/image_build_manager/image_build_config.yml"

    - name: Set s3_endpoint from config
      ansible.builtin.set_fact:
        s3_endpoint: >-
          {{ s3_configurations.endpoint_url
             if s3_configurations.endpoint_url | default('') | length > 0
             else ('http://' + admin_nic_ip + ':9000'
                   if s3_configurations.provider | default('minio') == 'minio'
                   else '') }}
        cacheable: true

# Step 4: PRE-CHECK — Read repo_status.yml from repo_manager output
# This loads rpm_repos, certificates, and content base URLs into facts.
- name: Pre-check repo_manager status and load RPM repo URLs
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  vars:
    _repo_status_path: "{{ repo_manager_output_path | default('') | ternary(repo_manager_output_path, output_project_dir + '/repo_manager/repo_status.yml') }}"
  tasks:
    - name: Check if repo_status.yml exists
      ansible.builtin.stat:
        path: "{{ _repo_status_path }}"
      register: repo_status_file

    - name: Load repo_status.yml from repo_manager output
      ansible.builtin.include_vars:
        file: "{{ _repo_status_path }}"
      when: repo_status_file.stat.exists

    - name: Fail if repo_manager has not completed
      ansible.builtin.fail:
        msg: >
          repo_status.yml not found at {{ _repo_status_path }} or overall_status != 'success'.
          Run repo_manager first: cd ../repo_manager && ansible-playbook repo_manager.yml
      when: >
        repo_manager_output_path | default('') | length > 0 and
        (not repo_status_file.stat.exists or overall_status | default('') != 'success')

    - name: Validate repo_status.yml has required repo_manager section
      ansible.builtin.assert:
        that:
          - repo_manager is defined
          - repo_manager.certificates is defined
          - repo_manager.certificates.server_crt is defined
          - repo_manager.certificates.server_crt | length > 0
          - repo_manager.port is defined
        fail_msg: >
          repo_status.yml is missing required 'repo_manager' section.
          Ensure repo_manager produces repo_manager.certificates.server_crt
          and repo_manager.port in {{ _repo_status_path }}.
        quiet: true
      when: repo_manager_output_path | default('') | length > 0

    - name: Set repo_manager facts from repo_status.yml
      ansible.builtin.set_fact:
        pulp_port: "{{ repo_manager.port }}"
        pulp_cert_oim_path: "{{ repo_manager.certificates.server_crt | regex_replace('^/opt/omnia/', oim_shared_path + '/omnia/') }}"
        cacheable: true
      when:
        - repo_manager_output_path | default('') | length > 0
        - repo_manager is defined

    - name: Build repo lists from repo_manager output
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: []
        repo_manager_repos_aarch64: []
        rpm_repos_aarch64: "{{ rpm_repos.aarch64 | default({}) }}"
      when:
        - repo_manager_output_path | default('') | length > 0
        - rpm_repos is defined

    - name: Build x86_64 repo list from rpm_repos
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: "{{ repo_manager_repos_x86_64 + [{'name': item.key, 'base_url': item.value, 'gpg': ''}] }}"
      loop: "{{ (rpm_repos.x86_64 | default({})) | dict2items }}"
      loop_control:
        loop_var: item
      when:
        - repo_manager_output_path | default('') | length > 0
        - rpm_repos is defined

    - name: Build x86_64 repo list from user_repos
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: "{{ repo_manager_repos_x86_64 + [{'name': item.key, 'base_url': item.value, 'gpg': ''}] }}"
      loop: "{{ (user_repos.x86_64 | default({})) | dict2items }}"
      loop_control:
        loop_var: item
      when:
        - repo_manager_output_path | default('') | length > 0
        - user_repos is defined

    - name: Build aarch64 repo list from rpm_repos
      ansible.builtin.set_fact:
        repo_manager_repos_aarch64: "{{ repo_manager_repos_aarch64 + [{'name': item.key, 'base_url': item.value, 'gpg': ''}] }}"
      loop: "{{ (rpm_repos.aarch64 | default({})) | dict2items }}"
      loop_control:
        loop_var: item
      when:
        - repo_manager_output_path | default('') | length > 0
        - rpm_repos is defined

    - name: Build aarch64 repo list from user_repos
      ansible.builtin.set_fact:
        repo_manager_repos_aarch64: "{{ repo_manager_repos_aarch64 + [{'name': item.key, 'base_url': item.value, 'gpg': ''}] }}"
      loop: "{{ (user_repos.aarch64 | default({})) | dict2items }}"
      loop_control:
        loop_var: item
      when:
        - repo_manager_output_path | default('') | length > 0
        - user_repos is defined

    - name: Make repo lists cacheable
      ansible.builtin.set_fact:
        repo_manager_repos_x86_64: "{{ repo_manager_repos_x86_64 }}"
        repo_manager_repos_aarch64: "{{ repo_manager_repos_aarch64 }}"
        cacheable: true
      when:
        - repo_manager_output_path | default('') | length > 0
        - rpm_repos is defined

    - name: Display loaded repo_manager data for image_build_manager
      ansible.builtin.debug:
        msg:
          - "Repo manager status: {{ overall_status }}"
          - "Pulp cert: {{ pulp_cert_oim_path | default('not set') }}"
          - "x86_64 repos: {{ repo_manager_repos_x86_64 | length }} loaded"
          - "aarch64 repos: {{ repo_manager_repos_aarch64 | length }} loaded"
        verbosity: 1
      when: repo_manager_output_path | default('') | length > 0


# =========================================================================
# FLOW: prepare — Deploy MinIO + Registry (idempotent)
# =========================================================================
- name: Prepare build infrastructure (MinIO + Registry)
  ansible.builtin.import_playbook: playbooks/prepare_image_build_manager.yml
  tags:
    - prepare
    - build

# =========================================================================
# FLOW: build — Build OS images and write build_status.yml
# =========================================================================
# Step 6: Build x86_64 images
- name: Build x86_64 images
  ansible.builtin.import_playbook: playbooks/build_image_x86_64.yml
  tags:
    - x86_64
    - build

# Step 7: Build aarch64 images
# NOTE: The aarch64 playbook has its own internal checks for ARM host availability.
- name: Build aarch64 images
  ansible.builtin.import_playbook: playbooks/build_image_aarch64.yml
  when: hostvars['localhost']['aarch64_inventory_host_ip'] | default('') | length > 0
  tags:
    - aarch64
    - build

# Step 8: Write build_status.yml output
# Output: {{ output_project_dir }}/build_status.yml (NFS-shared)
# Includes per-functional-group image details with S3 paths for kernel, initrd, image.
- name: Write build_status.yml output
  hosts: localhost
  connection: local
  gather_facts: true
  tags:
    - x86_64
    - aarch64
    - build
  tasks:
    - name: Write build status
      ansible.builtin.include_role:
        name: image_creation
        tasks_from: write_build_status.yml

# =========================================================================
# FLOW: cleanup — Remove MinIO, registry, build artifacts (opt-in only)
# =========================================================================
- name: Cleanup image_build_manager
  ansible.builtin.import_playbook: playbooks/cleanup_image_build_manager.yml
  tags:
    - never
    - cleanup

# =========================================================================
# FLOW: upgrade — Upgrade flow placeholder (opt-in only)
# =========================================================================
- name: Upgrade image_build_manager
  ansible.builtin.import_playbook: playbooks/upgrade_image_build_manager.yml
  tags:
    - never
    - upgrade

# =========================================================================
# FLOW: rollback — Rollback flow placeholder (opt-in only)
# =========================================================================
- name: Rollback image_build_manager
  ansible.builtin.import_playbook: playbooks/rollback_image_build_manager.yml
  tags:
    - never
    - rollback
