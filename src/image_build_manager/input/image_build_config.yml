---
# image_build_config.yml — consolidated configuration for the image_build_manager domain.
#
# This file is the per-domain input configuration for image_build_manager.
#
# Location (NFS):
#   /opt/omnia/input/project_default/image_build_manager/image_build_config.yml

# ---------------------------------------------------------------------------
# S3 Storage Backend
# ---------------------------------------------------------------------------
# S3 provider: "minio" (deployed by image_build_manager) or "powerscale" (external).
# endpoint_url: S3-compatible endpoint (auto-set for MinIO after deploy_minio).
# NOTE: S3 bucket names are FIXED constants — do NOT change them:
#   boot-images  — OS boot images (kernel, initramfs, rootfs)
#   efi-images   — EFI boot artifacts
s3_configurations:
  provider: "minio"          # minio | powerscale
  endpoint_url: ""           # e.g. "https://oim.example.com:9000" (auto-detected for minio)

# ---------------------------------------------------------------------------
# Repo Manager Output (upstream dependency)
# ---------------------------------------------------------------------------
# image_build_manager reads the repo_manager output file to obtain Pulp RPM repo URLs,
# certificate paths, and content base URLs. Run repo_manager before image_build_manager.
#
# The repo_status.yml provides:
#   - rpm_repos.x86_64.baseos, appstream, codeready_builder, epel, ...
#   - rpm_repos.aarch64.baseos, appstream, codeready_builder, epel, ...
#
# image_build_manager pre-check validates this file exists and overall_status == 'synced'.
# Leave empty to use default: /opt/omnia/output/<project>/repo_manager/repo_status.yml
repo_manager_output_path: ""

# ---------------------------------------------------------------------------
# ARM Build Host (aarch64)
# ---------------------------------------------------------------------------
# IP address of the ARM admin node for aarch64 image builds.
# Leave empty to skip aarch64 builds entirely.
# This IP is validated (reachability, SSH, architecture check) before use.
aarch64_inventory_host_ip: ""

# SSH user for connecting to the ARM build host (default: root)
aarch64_ssh_user: "root"

# ---------------------------------------------------------------------------
# Build Image Settings
# ---------------------------------------------------------------------------
build_image:
  job_async: 7200            # Max async wait for image build (seconds)
  job_retry: 240             # Max retries for async status check
  job_delay: 30              # Delay between async status checks (seconds)
