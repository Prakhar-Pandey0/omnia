---
# Discovery Domain Entrypoint
# ===========================
# Self-contained discovery playbook.
#
# Inputs:  /opt/omnia/input/project_default/discovery/
#   - discovery_config.yml
#   - network_spec.yml
#
# Outputs: /opt/omnia/output/project_default/discovery/
#   - bmc_pxe_mapping_file.csv
#   - bmc_discovery_report.csv
#
# Usage:
#   ansible-playbook discovery.yml -e "discovery_mechanism=ome"
#   ansible-playbook discovery.yml -e "discovery_mechanism=magellan"

- name: Ensure discovery Python dependencies
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Install required Python packages
      ansible.builtin.pip:
        name:
          - toml
        state: present
      register: pip_result
      changed_when: pip_result.changed

- name: Initialize discovery domain paths
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Set discovery domain input and output directories
      ansible.builtin.set_fact:
        discovery_project_name: "{{ project_name | default('project_default') }}"
        cacheable: true

    - name: Set discovery input/output paths
      ansible.builtin.set_fact:
        discovery_input_dir: "/opt/omnia/input/{{ discovery_project_name }}/discovery"
        discovery_output_dir: "/opt/omnia/output/{{ discovery_project_name }}/discovery"
        input_project_dir: "/opt/omnia/input/{{ discovery_project_name }}"
        cacheable: true

    - name: Verify discovery input directory exists
      ansible.builtin.stat:
        path: "{{ discovery_input_dir }}"
      register: discovery_input_stat

    - name: Fail if discovery input directory does not exist
      ansible.builtin.fail:
        msg: >-
          Discovery input directory '{{ discovery_input_dir }}' does not exist.
          Please create it and populate with discovery_config.yml and network_spec.yml.
      when: not discovery_input_stat.stat.exists

    - name: Ensure discovery output directory exists
      ansible.builtin.file:
        path: "{{ discovery_output_dir }}"
        state: directory
        mode: '0755'

- name: Set discovery validation tags
  hosts: localhost
  connection: local
  tasks:
    - name: Set dynamic run tags for discovery validation
      ansible.builtin.set_fact:
        omnia_run_tags: "{{ (ansible_run_tags | default([]) | list + ['discovery']) | unique }}"
        cacheable: true

- name: Load discovery configuration
  hosts: localhost
  connection: local
  tasks:
    - name: Include discovery config file
      ansible.builtin.include_vars:
        file: "{{ discovery_input_dir }}/discovery_config.yml"
      failed_when: false

    - name: Set enable_bmc_discovery for credential utility
      ansible.builtin.set_fact:
        enable_bmc_discovery: "{{ true if (discovery_mechanism | default('')) == 'ome' else (enable_bmc_discovery | default(false) | bool) }}"
        cacheable: true

- name: Invoke validate_config.yml to perform L1 and L2 validations with discovery tag
  ansible.builtin.import_playbook: ../playbooks/input_validation/validate_config.yml
  vars:
    skip_subscription_check: true
  tags: always

- name: Invoke get_config_credentials.yml
  ansible.builtin.import_playbook: ../playbooks/utils/credential_utility/get_config_credentials.yml

- name: BMC Discovery Playbook
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    discovery_mechanism: ""
    supported_mechanisms:
      - ome
      - magellan

  pre_tasks:
    - name: Display usage information when no discovery_mechanism is specified
      when: discovery_mechanism == ""
      block:
        - name: Fail when no discovery_mechanism specified
          ansible.builtin.fail:
            msg:
              - "============================================================"
              - "ERROR: discovery_mechanism is required but not provided."
              - ""
              - "Usage: ansible-playbook discovery.yml"
              - "       -e discovery_mechanism=<mechanism>"
              - ""
              - "Supported discovery mechanisms:"
              - "  - ome      : Dell OpenManage Enterprise (OME)"
              - "  - magellan : Magellan (upcoming, not yet supported)"
              - ""
              - "Examples:"
              - "  ansible-playbook discovery.yml -e discovery_mechanism=ome"
              - "  ansible-playbook discovery.yml -e discovery_mechanism=magellan"
              - "============================================================"

    - name: Validate discovery_mechanism parameter
      ansible.builtin.fail:
        msg: |
          Invalid discovery_mechanism '{{ discovery_mechanism }}' specified.
          Supported mechanisms are: {{ supported_mechanisms | join(', ') }}.
          Usage: ansible-playbook discovery.yml -e discovery_mechanism=ome
      when: discovery_mechanism not in supported_mechanisms

  tasks:
    - name: Handle Magellan discovery mechanism
      when: discovery_mechanism == 'magellan'
      block:
        - name: Display Magellan not supported message
          ansible.builtin.debug:
            msg:
              - "============================================================"
              - "NOTICE: Magellan Discovery"
              - "============================================================"
              - "This is an upcoming functionality and is not yet supported."
              - "Please use 'ome' as the discovery_mechanism for now."
              - "============================================================"
        - name: End play for magellan
          ansible.builtin.meta: end_play

    - name: Validate OME inputs before discovery
      when: discovery_mechanism == 'ome'
      block:
        - name: Fail when ome_ip is not configured
          ansible.builtin.fail:
            msg: >-
              ome_ip must be provided in discovery_config.yml when using OME discovery.
              Please set 'enable_bmc_discovery: true' and provide a valid 'ome_ip' in
              {{ discovery_input_dir }}/discovery_config.yml.
          when: ome_ip | default('') | length == 0

        - name: Include OME discovery role
          ansible.builtin.include_role:
            name: ome_discovery
