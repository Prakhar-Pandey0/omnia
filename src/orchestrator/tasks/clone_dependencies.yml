# Clone shared dependencies into the orchestrator directory.

# ──────────────────────────────────────────────────────────────
# TODO: Uncomment the git clone below once common is a separate
#       repository, and remove the temporary copy block beneath.
# ──────────────────────────────────────────────────────────────
# - name: Clone omnia-common repository
#   ansible.builtin.git:
#     repo: "https://github.com/dell/omnia-common.git"
#     dest: "{{ playbook_dir }}/common"
#     version: "{{ omnia_common_version | default('main') }}"
#     force: true

# ──────────────────────────────────────────────────────────────
# TEMPORARY: Copy from mono-repo sibling directory.
# Remove this block once common becomes a separate repository
# and the git clone above is enabled.
# ──────────────────────────────────────────────────────────────
- name: Copy common from mono-repo (temporary until common is a separate repo)
  ansible.builtin.command:
    cmd: >-
      rsync -a --delete
      {{ playbook_dir }}/../common/
      {{ playbook_dir }}/common/
  changed_when: true
