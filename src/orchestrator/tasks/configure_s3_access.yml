---
# Configure S3 access on the OIM for boot image storage.
#
# Reads S3 configuration from image_build_manager's build_status.yml output.
# The build_status.yml provides:
#   - s3_configurations.endpoint_url  (S3 endpoint used by image_build_manager)
#   - s3_configurations.bucket        (S3 bucket containing boot images)
#
# This task bridges build_status.yml into facts used by:
#   1. s3_configurations  (dict with endpoint_url + bucket)
#      → used by BSS template (bss.yaml.j2) to construct PXE boot HTTP URLs

- name: Load orchestrator config for build_status path
  ansible.builtin.include_vars:
    file: "{{ hostvars['localhost']['input_project_dir'] }}/orchestrator_config.yml"
    name: _orch_config
  failed_when: false

- name: Set image_build_manager output path
  ansible.builtin.set_fact:
    _build_status_path: "{{ _orch_config.image_build_manager_output_path | default('/opt/omnia/output/project_default/image_build_manager/build_status.yml') }}"

- name: Verify build_status.yml exists
  ansible.builtin.stat:
    path: "{{ _build_status_path }}"
  register: _build_status_stat
  delegate_to: localhost

- name: Fail if build_status.yml is missing
  ansible.builtin.fail:
    msg: >-
      image_build_manager output not found at '{{ _build_status_path }}'.
      Run image_build_manager before orchestrator to generate build_status.yml.
      Or set image_build_manager_output_path in orchestrator_config.yml.
  when: not _build_status_stat.stat.exists

- name: Load build_status.yml from image_build_manager output
  ansible.builtin.include_vars:
    file: "{{ _build_status_path }}"
    name: _build_status
  delegate_to: localhost

- name: Validate build_status overall_status
  ansible.builtin.fail:
    msg: >-
      image_build_manager build_status.yml reports overall_status='{{ _build_status.overall_status | default("unknown") }}'.
      Expected 'success'. Fix image builds before running orchestrator.
  when: (_build_status.overall_status | default('')) != 'success'

# -------------------------------------------------------------------
# Bridge: set s3_configurations fact from build_status.yml
# -------------------------------------------------------------------
- name: Set s3_configurations from build_status
  ansible.builtin.set_fact:
    s3_configurations:
      endpoint_url: "{{ _build_status.s3_configurations.endpoint_url }}"
      bucket: "{{ _build_status.s3_configurations.bucket | default('boot-images') }}"
    build_status: "{{ _build_status }}"

- name: Display S3 configuration from build_status
  ansible.builtin.debug:
    msg: "S3 endpoint: {{ s3_configurations.endpoint_url }}, bucket: {{ s3_configurations.bucket }}"
