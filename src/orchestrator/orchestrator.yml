---
# Orchestrator Domain Entrypoint
# ==============================
# Replaces the former provision.yml. Owns:
#   - OpenCHAMI deployment and configuration
#   - PXE boot orchestration
#   - Image deployment
#   - Lifecycle orchestration (k8s, slurm, telemetry, etc.)
#
# Inputs:  /opt/omnia/input/project_default/orchestrator/
#   - orchestrator_config.yml
#   - network_spec.yml
#   - pxe_mapping_file.csv  (external contract from discovery)
#
# Outputs: /opt/omnia/output/project_default/orchestrator/
#
# Usage:
#   ansible-playbook orchestrator.yml

- name: Clone shared dependencies (common)
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Sync common/ into orchestrator (future git clone)
      ansible.builtin.include_tasks: tasks/clone_dependencies.yml

- name: Check if upgrade is in progress
  ansible.builtin.import_playbook: ../playbooks/utils/upgrade_checkup.yml

- name: Include input project directory
  when: not project_dir_status | default(false) | bool
  ansible.builtin.import_playbook: ../playbooks/utils/include_input_dir.yml
  vars:
    openchami_vars_suppport: true
    omnia_metadata_support: true

- name: Scope input directory to orchestrator subdirectory
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Save original project-level input dir
      ansible.builtin.set_fact:
        omnia_project_input_dir: "{{ input_project_dir }}"
        cacheable: true

    - name: Override input_project_dir to orchestrator subdirectory
      ansible.builtin.set_fact:
        input_project_dir: "{{ input_project_dir }}/orchestrator"
        project_name: "orchestrator"
        orchestrator_config_file: "orchestrator_config.yml"
        orchestrator_output_dir: "/opt/omnia/output/{{ project_name | default('project_default') }}/orchestrator"
        project_dir_status: true
        cacheable: true

    - name: Verify orchestrator input directory exists
      ansible.builtin.stat:
        path: "{{ input_project_dir }}"
      register: orchestrator_input_stat

    - name: Fail if orchestrator input directory does not exist
      ansible.builtin.fail:
        msg: >-
          Orchestrator input directory '{{ input_project_dir }}' does not exist.
          Please create it and populate with orchestrator_config.yml, network_spec.yml,
          and pxe_mapping_file.csv (from discovery output).
      when: not orchestrator_input_stat.stat.exists

    - name: Ensure orchestrator output directory exists
      ansible.builtin.file:
        path: "{{ orchestrator_output_dir }}"
        state: directory
        mode: '0755'

- name: Load orchestrator settings
  hosts: localhost
  connection: local
  tags: always
  tasks:
    - name: Load orchestrator config for image_build_manager output path
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/orchestrator_config.yml"
        name: _orch_config
      failed_when: false

    - name: Set image_build_manager_output_path on localhost
      ansible.builtin.set_fact:
        image_build_manager_output_path: "{{ _orch_config.image_build_manager_output_path | default('/opt/omnia/output/project_default/image_build_manager/build_status.yml') }}"
        cacheable: true

- name: Create oim group
  ansible.builtin.import_playbook: ../playbooks/utils/create_container_group.yml
  vars:
    oim_group: true
  tags: always

- name: Generate functional groups configuration
  ansible.builtin.import_playbook: ../playbooks/utils/generate_functional_groups.yml
  tags: always

- name: Set_fact for fetch omnia config credentials
  hosts: localhost
  connection: local
  tasks:
    - name: Set dynamic run tags for orchestrator validation
      when: not config_file_status | default(false) | bool
      ansible.builtin.set_fact:
        omnia_run_tags: "{{ ['orchestrator'] }}"
        oim_group_status: true
        cacheable: true

    - name: Pre-load software_config from project root for shared validation plays
      when: not config_file_status | default(false) | bool
      block:
        - name: Validate software_config.json syntax
          ansible.builtin.command: "jq . {{ omnia_project_input_dir }}/software_config.json"
          register: _sw_json_check
          changed_when: false
          failed_when: false
          no_log: true

        - name: Load software_config from project root
          ansible.builtin.set_fact:
            software_config: "{{ lookup('file', omnia_project_input_dir + '/software_config.json') | from_json }}"
            cluster_os_version: "{{ (lookup('file', omnia_project_input_dir + '/software_config.json') | from_json).cluster_os_version }}"
            cluster_os_type: "{{ (lookup('file', omnia_project_input_dir + '/software_config.json') | from_json).cluster_os_type }}"
            cacheable: true
          when: _sw_json_check.rc == 0

- name: Invoke validate_config.yml to perform L1 and L2 validations
  when: not config_file_status | default(false) | bool
  ansible.builtin.import_playbook: ../playbooks/input_validation/validate_config.yml

- name: Invoke get_config_credentials.yml
  when: not config_file_status | default(false) | bool
  ansible.builtin.import_playbook: ../playbooks/utils/credential_utility/get_config_credentials.yml

- name: Validate orchestrator parameters
  hosts: localhost
  connection: local
  roles:
    - orchestrator_validations

- name: Validate OIM timezone
  hosts: oim
  connection: ssh
  tasks:
    - name: Validate OIM timezone has not changed
      ansible.builtin.include_role:
        name: orchestrator_validations
        tasks_from: validate_oim_timezone.yml

- name: Build cluster host lists from PXE mapping
  hosts: localhost
  connection: local
  roles:
    - passwordless_ssh

- name: Configure OIM SSH from cluster host lists
  hosts: oim
  connection: ssh
  roles:
    - passwordless_ssh

- name: Configure S3 access for boot image storage
  hosts: oim
  connection: ssh
  gather_facts: false
  tasks:
    - name: Configure s3cmd and set S3 facts from orchestrator config
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/configure_s3_access.yml"

- name: Deploy OpenCHAMI containers on OIM
  hosts: oim
  connection: ssh
  gather_facts: false
  tags: openchami
  tasks:
    - name: Deploy OpenCHAMI
      ansible.builtin.include_role:
        name: deploy_openchami

- name: Validate orchestrator parameters on OIM
  hosts: oim
  connection: ssh
  tasks:
    - name: Validate OpenLDAP container is running
      ansible.builtin.include_role:
        name: orchestrator_validations
        tasks_from: validate_openldap_container.yml
      when: hostvars['localhost']['openldap_support']

    - name: Image validation
      ansible.builtin.include_role:
        name: orchestrator_validations
        tasks_from: validate_image.yml
      with_items: "{{ hostvars['localhost']['functional_groups'] | map(attribute='name') | list }}"

- name: Configure auth for openchami
  hosts: oim
  connection: ssh
  tasks:
    - name: Openchami cluster authentication
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/openchami_auth.yml"
      vars:
        oim_node_name: "{{ hostvars['localhost']['oim_node_name'] }}"

- name: Configure omnia_core DNS resolution for CoreDNS
  hosts: localhost
  connection: local
  tasks:
    - name: Configure omnia_core resolv.conf for CoreDNS (when dns_enabled)
      when: dns_enabled | default(false) | bool
      block:
        - name: Prepend CoreDNS as primary nameserver in omnia_core /etc/resolv.conf
          ansible.builtin.shell: |
            set -o pipefail
            tmpfile=$(mktemp)

            # Merge cluster domain into existing search line (preserve existing domains)
            existing_search=$(grep '^search' /etc/resolv.conf 2>/dev/null | head -n1 | sed 's/^search //')
            if echo " ${existing_search} " | grep -qw '{{ domain_name }}'; then
              echo "search ${existing_search}" > "$tmpfile"
            else
              echo "search {{ domain_name }} ${existing_search}" > "$tmpfile"
            fi

            # Prepend CoreDNS as primary nameserver
            echo "nameserver {{ admin_nic_ip }}" >> "$tmpfile"

            # Keep existing nameservers and options (skip search lines and CoreDNS duplicate)
            grep -v '^search' /etc/resolv.conf 2>/dev/null | \
              grep -Fxv "nameserver {{ admin_nic_ip }}" | \
              grep -v '^$' >> "$tmpfile" || true

            # Deduplicate while preserving order
            awk '!seen[$0]++' "$tmpfile" > /etc/resolv.conf
            rm -f "$tmpfile"
          changed_when: true

- name: Orchestrate nodes, configure bss and cloud-init
  hosts: oim
  connection: ssh
  pre_tasks:
    - name: Load dns_enabled from orchestrator_config.yml on OIM
      ansible.builtin.include_vars:
        file: "{{ hostvars['localhost']['input_project_dir'] }}/orchestrator_config.yml"
        name: _orchestrator_config_oim

    - name: Configure OIM DNS resolution for CoreDNS (when dns_enabled)
      when: _orchestrator_config_oim.dns_enabled | default(false) | bool
      block:
        - name: Remove immutable flag from /etc/resolv.conf if present
          ansible.builtin.command: chattr -i /etc/resolv.conf
          changed_when: true
          failed_when: false

        - name: Prepend coresmd as primary nameserver in OIM /etc/resolv.conf
          ansible.builtin.shell: |
            set -o pipefail
            tmpfile=$(mktemp)

            # Merge cluster domain into existing search line (preserve existing domains)
            existing_search=$(grep '^search' /etc/resolv.conf 2>/dev/null | head -n1 | sed 's/^search //')
            if echo " ${existing_search} " | grep -qw '{{ hostvars["localhost"]["domain_name"] }}'; then
              echo "search ${existing_search}" > "$tmpfile"
            else
              echo "search {{ hostvars['localhost']['domain_name'] }} ${existing_search}" > "$tmpfile"
            fi

            # Prepend coresmd as primary nameserver
            echo "nameserver {{ hostvars['localhost']['admin_nic_ip'] }}" >> "$tmpfile"

            # Keep existing nameservers and options (skip search lines and coresmd duplicate)
            grep -v '^search' /etc/resolv.conf 2>/dev/null | \
              grep -Fxv "nameserver {{ hostvars['localhost']['admin_nic_ip'] }}" | \
              grep -v '^$' >> "$tmpfile" || true

            # Deduplicate while preserving order
            awk '!seen[$0]++' "$tmpfile" > /etc/resolv.conf
            rm -f "$tmpfile"
          changed_when: true

        - name: Prevent NetworkManager from overwriting resolv.conf
          ansible.builtin.command: chattr +i /etc/resolv.conf
          changed_when: true
          failed_when: false

    - name: Orchestrate nodes
      ansible.builtin.include_role:
        name: configure_ochami
        tasks_from: orchestration_mapping_nodes.yml
      when: not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)

    - name: Read nodes.yaml and derive Omnia node facts
      ansible.builtin.include_role:
        name: passwordless_ssh
        tasks_from: read_nodes_yaml.yml
  roles:
    - mount_config
    - k8s_config
    - slurm_config
    - openldap
    - telemetry
    - configure_ochami
