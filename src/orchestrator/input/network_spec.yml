---

# Orchestrator-owned network specification.
# This is an independent copy for the orchestrator domain.
# The discovery domain maintains its own separate copy.
#
# The orchestrator uses the full network spec for PXE boot,
# DHCP configuration, and host networking setup.

Networks:
- admin_network:
    oim_nic_name: "eno1"
    subnet: "172.16.0.0"
    netmask_bits: "24"
    primary_oim_admin_ip: "172.16.107.254"
    primary_oim_bmc_ip: ""
    router: "172.16.107.254"
    dynamic_range: "172.16.107.201-172.16.107.250"
    dns: []
    ntp_servers: []
    additional_subnets: []

- ib_network:
    subnet: "192.168.0.0"
    netmask_bits: "24"
    dns: []
