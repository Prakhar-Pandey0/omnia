---

- name: Include orchestrator_config.yml
  block:
    - name: Include orchestrator_config.yml file
      ansible.builtin.include_vars: "{{ orchestrator_config }}"
      register: include_orchestrator_config
      no_log: true
      tags: init
  rescue:
    - name: Failed to include orchestrator_config.yml
      ansible.builtin.fail:
        msg: "{{ orchestrator_config_syntax_fail_msg }} Error: {{ include_orchestrator_config.message }}"

- name: Include network_spec.yml
  block:
    - name: Include network_spec file
      ansible.builtin.include_vars: "{{ network_spec }}"
      register: include_network_spec
      no_log: true
  rescue:
    - name: Failed to include network_spec.yml
      ansible.builtin.fail:
        msg: "{{ network_spec_syntax_fail_msg }} Error: {{ include_network_spec.message }}"

- name: Verify s3_configurations is set from configure_s3_access
  ansible.builtin.assert:
    that:
      - s3_configurations is defined
      - s3_configurations.endpoint_url is defined
    fail_msg: >-
      s3_configurations not set. Ensure the 'Configure S3 access' play
      runs before deploy_openchami. Check image_build_manager_output_path in orchestrator_config.yml.

- name: Parse network_spec data
  ansible.builtin.set_fact:
    network_data: "{{ network_data | default({}) | combine({item.key: item.value}) }}"
  with_dict: "{{ Networks }}"

- name: Set admin network nic and ip from network_spec
  ansible.builtin.set_fact:
    admin_nic_ip: "{{ network_data.admin_network.primary_oim_admin_ip }}"
    admin_nic: "{{ network_data.admin_network.oim_nic_name }}"
    admin_netmask_bits: "{{ network_data.admin_network.netmask_bits }}"

- name: Create openchami directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "{{ dir_permissions_755 }}"
  with_items:
    - "{{ openchami_share_dir }}"
    - "{{ openchami_log_dir }}"
  delegate_to: localhost
  connection: local

- name: Load the openchami configs vars
  ansible.builtin.template:
    src: "{{ openchami_config_vars_template }}"
    dest: "{{ openchami_config_vars_path }}"
    mode: "{{ file_permissions_644 }}"
  delegate_to: localhost
  connection: local

- name: Set openchami cluster configuration facts
  ansible.builtin.set_fact:
    cluster_name: "{{ oim_node_name }}"
    cluster_domain: "{{ domain_name }}"
    cluster_boot_ip: "{{ admin_nic_ip }}"
    cluster_boot_interface: "{{ admin_nic }}"
    cluster_shortname: "nid"
    cluster_nidlength: 3

- name: Set openchami network configuration facts
  ansible.builtin.set_fact:
    coredhcp_dhcp_pool: >-
      {{ network_data.admin_network.dynamic_range | split('-') | first }}
      {{ network_data.admin_network.dynamic_range | split('-') | last }}
    coredhcp_netmask: >-
      {{ (admin_nic_ip + '/' + network_data.admin_network.netmask_bits) | ansible.utils.ipaddr('netmask') }}
    coredhcp_router: "{{ network_data.admin_network.router }}"
    coredhcp_lease_duration: "{{ default_lease_time }}s"

- name: Set multi-subnet coredhcp facts
  ansible.builtin.set_fact:
    additional_subnets: "{{ network_data.admin_network.additional_subnets | default([]) }}"

- name: Configure static routes for additional subnets
  when: network_data.admin_network.additional_subnets | default([]) | length > 0
  block:
    - name: Determine admin network gateway
      ansible.builtin.set_fact:
        admin_gateway: "{{ network_data.admin_network.subnet | ansible.utils.ipmath(1) }}"

    - name: Check existing routes on admin NIC
      ansible.builtin.command: nmcli -g ipv4.routes connection show {{ admin_nic }}
      register: existing_routes
      changed_when: false

    - name: Add persistent routes for additional subnets via NetworkManager
      ansible.builtin.command: >-
        nmcli connection modify {{ admin_nic }}
        +ipv4.routes "{{ item.subnet }}/{{ item.netmask_bits }} {{ admin_gateway }}"
      loop: "{{ network_data.admin_network.additional_subnets }}"
      when: (item.subnet + '/' + item.netmask_bits) not in existing_routes.stdout
      changed_when: true

    - name: Apply route changes to admin NIC
      ansible.builtin.command: nmcli device reapply {{ admin_nic }}
      changed_when: true

- name: Override DNS forwarders from network_spec if configured
  ansible.builtin.set_fact:
    dns_forwarders: "{{ network_data.admin_network.dns }}"
  when: (network_data.admin_network.dns | default([])) | length > 0

- name: Deploy openchami configs
  block:
    - name: Install and configure openchami
      ansible.builtin.include_tasks: configs/main.yml
  rescue:
    - name: Openchami installation failed
      ansible.builtin.fail:
        msg: "{{ openchami_install_fail_msg }}"

- name: Set openchami SELinux context for Local flow
  ansible.builtin.command: chcon -R system_u:object_r:container_file_t:s0 "{{ hostvars['localhost']['oim_shared_path'] }}/omnia/openchami"
  changed_when: true
  failed_when: false
  when: hostvars['localhost']['omnia_share_option'] == 'Local'

- name: Set openchami SELinux context for NFS internal flow
  ansible.builtin.command: chcon -R system_u:object_r:container_file_t:s0 "{{ hostvars['localhost']['nfs_server_share_path'] }}/omnia/openchami"
  changed_when: true
  failed_when: false
  when: (hostvars['localhost']['omnia_share_option'] == 'NFS' and hostvars['localhost']['nfs_type'] | default('') == 'internal')
