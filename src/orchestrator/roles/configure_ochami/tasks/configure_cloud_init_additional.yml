---
# Renders and sets additional cloud-init groups (common + per-functional-group).
# Common group is applied to ALL nodes; per-FG groups target specific functional groups.
# Uses merge_how with no_replace so platform defaults always take precedence.

# --- Common additional cloud-init group ---
- name: Delete ci group configuration - {{ additional_cloud_init_common_group_name }}
  ansible.builtin.command: >-
    /usr/bin/ochami cloud-init group delete --no-confirm
    -f yaml -d @{{ cloud_init_dir }}/ci-group-{{ additional_cloud_init_common_group_name }}.yaml
  changed_when: true
  failed_when: false
  when:
    - additional_cloud_init_common_enabled | default(false) | bool
    - not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)

- name: Render ci group template - {{ additional_cloud_init_common_group_name }}
  ansible.builtin.template:
    src: "{{ ci_group_additional_template }}"
    dest: "{{ cloud_init_dir }}/ci-group-{{ additional_cloud_init_common_group_name }}.yaml"
    mode: "{{ hostvars['localhost']['file_permissions_644'] }}"
  vars:
    ci_additional_group_name: "{{ additional_cloud_init_common_group_name }}"
    ci_additional_data: "{{ additional_cloud_init_common_data }}"
  when: additional_cloud_init_common_enabled | default(false) | bool

- name: Set ci group configuration - {{ additional_cloud_init_common_group_name }}
  ansible.builtin.command: >-
    /usr/bin/ochami cloud-init group set
    -f yaml -d @{{ cloud_init_dir }}/ci-group-{{ additional_cloud_init_common_group_name }}.yaml
  changed_when: true
  when:
    - additional_cloud_init_common_enabled | default(false) | bool
    - not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)

- name: Verify ci group - {{ additional_cloud_init_common_group_name }}
  ansible.builtin.command: >-
    /usr/bin/ochami cloud-init group get config {{ additional_cloud_init_common_group_name }}
  changed_when: false
  register: _ci_common_additional_output
  when:
    - additional_cloud_init_common_enabled | default(false) | bool
    - not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)

- name: Verify ci group output - {{ additional_cloud_init_common_group_name }}
  ansible.builtin.debug:
    msg: "{{ _ci_common_additional_output.stdout_lines }}"
    verbosity: 2
  when:
    - additional_cloud_init_common_enabled | default(false) | bool
    - not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)

# --- Per-functional-group additional cloud-init groups ---
- name: Configure per-FG additional cloud-init groups
  ansible.builtin.include_tasks: configure_cloud_init_additional_fg.yml
  vars:
    _ci_fg_name: "{{ item }}"
  with_items: "{{ additional_cloud_init_fg_names | default([]) }}"
  when: additional_cloud_init_groups_enabled | default(false) | bool
