---
# BuildStream Domain — Top-Level Entry Playbook
# Usage: cd src/build_stream && ansible-playbook build_stream.yml
#
# This playbook orchestrates the full BuildStream domain:
#   1. Credential retrieval (filtered to build_stream tags)
#   2. Postgres + GitLab + BSM deployment (prepare_build_stream)
#   3. GitLab CI/CD configuration (setup_gitlab)
#   4. Output: build_stream_status.yml
#
# Input contract:  see INPUT_CONTRACT.md
# Output contract: see OUTPUT_CONTRACT.md

- name: Load BuildStream credential tags
  ansible.builtin.import_playbook: ../playbooks/utils/credential_utility/get_config_credentials.yml
  vars:
    omnia_run_tags:
      - build_stream
      - gitlab
    build_stream_config_dir: "build_stream"

- name: Prepare BuildStream infrastructure (Postgres + GitLab + BSM)
  ansible.builtin.import_playbook: playbooks/prepare_build_stream.yml

- name: Configure GitLab CI/CD
  ansible.builtin.import_playbook: playbooks/setup_gitlab.yml
