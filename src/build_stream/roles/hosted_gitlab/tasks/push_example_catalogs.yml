---
- name: Ensure examples directory exists on GitLab host
  ansible.builtin.file:
    path: "{{ gitlab_hosted_payload_dir }}/examples"
    state: directory
    mode: '0755'

- name: Find all example catalog files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../../examples/catalog"
    patterns: "*.json"
    recurse: false
  register: example_catalog_files
  delegate_to: localhost

- name: Push example catalog files to GitLab repository
  ansible.builtin.include_tasks: push_single_example_catalog.yml
  loop: "{{ example_catalog_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  vars:
    catalog_file_path: "{{ item.path }}"
    catalog_file_name: "{{ item.path | basename }}"
