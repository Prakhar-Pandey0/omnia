---
# Migrate Pulp repository / remote / distribution names from the old format
# (<arch>_<RepoName>) to the new format (<arch>_<os>_<os_version>_<RepoName>).
#
# This task is idempotent: if every name already follows the new convention the
# module reports "0 renamed, N skipped" and makes no changes.
#
# A post-migration cleanup pass deletes any stale old-format entities that
# survived the rename (e.g. partial failures).  Old entities are only removed
# when the corresponding new-format entity already exists, to avoid data loss.

- name: Run Pulp repository name migration
  pulp_repo_name_migration:
    cluster_os_type: "{{ cluster_os_type }}"
    cluster_os_version: "{{ cluster_os_version }}"
    base_path: "{{ base_path }}/{{ cluster_os_type }}/{{ cluster_os_version }}"
    dry_run: false
    log_dir: "{{ base_path }}/{{ cluster_os_type }}/{{ cluster_os_version }}"
  register: migration_result

- name: Display migration result
  ansible.builtin.debug:
    msg: "{{ migration_result.msg }}"
