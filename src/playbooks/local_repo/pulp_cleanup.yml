---
# Pulp Cleanup Playbook - Clean Architecture
#
# Usage:
#   # Repository cleanup (use full repo name format: <arch>_<os>_<version>_<name>)
#   ansible-playbook pulp_cleanup.yml -e "cleanup_repos=x86_64_rhel_10.0_epel,aarch64_rhel_10.0_epel"
#   ansible-playbook pulp_cleanup.yml -e "cleanup_repos=x86_64_rhel_10.0_appstream"
#   ansible-playbook pulp_cleanup.yml -e "cleanup_containers=registry.k8s.io/pause,docker.io/library/nginx"
#   ansible-playbook pulp_cleanup.yml -e "cleanup_files=git,chart-0.48.0"
#   ansible-playbook pulp_cleanup.yml -e "cleanup_repos=x86_64_rhel_10.0_epel -e cleanup_containers=docker.io/library/nginx -e force=true"
#
#   # Cleanup ALL artifacts of a type:
#   ansible-playbook pulp_cleanup.yml -e "cleanup_repos=all"
#   ansible-playbook pulp_cleanup.yml -e "cleanup_containers=all"
#   ansible-playbook pulp_cleanup.yml -e "cleanup_files=all"
#   ansible-playbook pulp_cleanup.yml -e "cleanup_repos=all" -e "cleanup_containers=all" -e "cleanup_files=all"
#
#   # Examples: x86_64_rhel_10.0_epel, aarch64_rhel_10.0_epel, x86_64_rhel_10.0_appstream, aarch64_rhel_10.0_baseos
#   # Note: Repository names follow the format <arch>_<os_type>_<os_version>_<name>

- name: Pulp Cleanup
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    # Step 0: Load software_config to determine OS type and version
    - name: Load software_config.json
      ansible.builtin.include_vars:
        file: "/opt/omnia/input/project_default/software_config.json"
        name: software_config

    - name: Set OS type and version facts
      ansible.builtin.set_fact:
        cluster_os_type: "{{ software_config.cluster_os_type }}"
        cluster_os_version: "{{ software_config.cluster_os_version }}"

    # Step 1: Input Validation
    - name: Set cleanup input presence flag
      ansible.builtin.set_fact:
        has_cleanup_input: "{{ (cleanup_repos | default([]) | length > 0) or
          (cleanup_containers | default([]) | length > 0) or
          (cleanup_files | default([]) | length > 0) }}"

    - name: Validate input - at least one cleanup type must be specified
      ansible.builtin.assert:
        that:
          - has_cleanup_input | bool
        fail_msg: |
          No cleanup items specified. Please provide at least one of:
            cleanup_repos: ['repo1', 'repo2']
            cleanup_containers: ['container1', 'container2']
            cleanup_files: ['file1', 'file2']

    # Step 2: User Confirmation
    - name: Parse cleanup lists - repos
      ansible.builtin.set_fact:
        repo_list: >-
          {{ cleanup_repos.split(',') | map('trim') | select | list
          if (cleanup_repos is defined and cleanup_repos is string)
          else (cleanup_repos | default([])) }}

    - name: Parse cleanup lists - containers
      ansible.builtin.set_fact:
        container_list: >-
          {{ cleanup_containers.split(',') | map('trim') | select | list
          if (cleanup_containers is defined and cleanup_containers is string)
          else (cleanup_containers | default([])) }}

    - name: Parse cleanup lists - files
      ansible.builtin.set_fact:
        file_list: >-
          {{ cleanup_files.split(',') | map('trim') | select | list
          if (cleanup_files is defined and cleanup_files is string)
          else (cleanup_files | default([])) }}

    - name: Display cleanup summary
      ansible.builtin.debug:
        msg:
          - "========== CLEANUP SUMMARY =========="
          - "Repositories : {{ (repo_list | default([]) | join(', ')) if repo_list | default([]) | length > 0 else 'None' }}"
          - "Containers   : {{ (container_list | default([]) | join(', ')) if container_list | default([]) | length > 0 else 'None' }}"
          - "Files        : {{ (file_list | default([]) | join(', ')) if file_list | default([]) | length > 0 else 'None' }}"
          - "====================================="

    - name: Set force skip confirmation flag
      ansible.builtin.set_fact:
        force_skip_confirmation: "{{ force | default(false) | bool or skip_approval | default(false) | bool }}"

    - name: Get user confirmation
      ansible.builtin.pause:
        prompt: |

          WARNING: This will permanently delete the specified artifacts.
          This action cannot be undone.
          Type 'yes' to continue or 'no' to abort
        echo: true
      register: user_input
      when: not force_skip_confirmation | bool

    - name: Set user confirmed flag
      ansible.builtin.set_fact:
        user_confirmed: "{{ (user_input.user_input | default('') | lower) == 'yes' }}"

    - name: Display cancellation message
      ansible.builtin.debug:
        msg: "Cleanup cancelled by user. Exiting."
      when:
        - not force_skip_confirmation | bool
        - not user_confirmed

    - name: Abort if not confirmed
      ansible.builtin.meta: end_play
      when:
        - not force_skip_confirmation | bool
        - not user_confirmed

  tasks:
    # Step 3: Call Python Module
    - name: Execute cleanup ( This task might take sometime )
      pulp_cleanup:
        cleanup_repos: "{{ repo_list | default([]) }}"
        cleanup_containers: "{{ container_list | default([]) }}"
        cleanup_files: "{{ file_list | default([]) }}"
        base_path: "{{ base_path | default('/opt/omnia/log/local_repo') }}"
        repo_store_path: "{{ repo_store_path | default('/opt/omnia') }}"
        cluster_os_type: "{{ cluster_os_type }}"
        cluster_os_version: "{{ cluster_os_version }}"
      register: cleanup_result

  post_tasks:
    # Step 4: Display Results
    - name: Display cleanup results
      ansible.builtin.debug:
        msg: "{{ cleanup_result.pretty_table_lines }}"

    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "================================================CLEANUP COMPLETED==========================================================="
          - "Total: {{ cleanup_result.total }}, Success: {{ cleanup_result.success_count }}, Failed: {{ cleanup_result.failed_count }}"
          - "Status file: {{ cleanup_result.status_file }}"
          - "NOTE: If the deleted artifact is required by any software, you must rerun local_repo.yml to sync the artifact(s) again."
          - "If the artifact(s) is not synced in local repo, subsequent playbooks having dependency may fail"
          - "============================================================================================================================"
