---

- name: Check if image_build_credentials file exists
  ansible.builtin.stat:
    path: "{{ image_build_credentials_filename }}"
  register: bm_credentials_file_status

- name: Fetch image_build credentials
  when: bm_credentials_file_status.stat.exists
  block:
    - name: Check image_build_credentials.yml file is encrypted
      ansible.builtin.command: cat {{ image_build_credentials_filename }}
      changed_when: false
      register: bm_file_content
      no_log: true

    - name: Decrypt image_build_credentials.yml
      ansible.builtin.command: >-
        ansible-vault decrypt {{ image_build_credentials_filename }}
        --vault-password-file {{ image_build_credentials_vault_path }}
      changed_when: false
      when: ansible_vault_search_key in bm_file_content.stdout

    - name: Include image_build_credentials.yml
      block:
        - name: Include image_build_credentials.yml
          ansible.builtin.include_vars: "{{ image_build_credentials_filename }}"
          register: include_bm_credentials
          no_log: true
      rescue:
        - name: Failed to include image_build_credentials.yml
          ansible.builtin.fail:
            msg: "{{ image_build_credentials_syntax_fail_msg }} Error: {{ include_bm_credentials.message }}"

    - name: Encrypt image_build_credentials.yml
      ansible.builtin.command: >-
        ansible-vault encrypt {{ image_build_credentials_filename }}
        --vault-password-file {{ image_build_credentials_vault_path }}
      changed_when: false
      when: ansible_vault_search_key in bm_file_content.stdout

    - name: Update image_build_credentials.yml permission
      ansible.builtin.file:
        path: "{{ image_build_credentials_filename }}"
        mode: "{{ file_permission }}"
