# S3 BUCKET CLEANUP (Must run BEFORE OpenCHAMI package removal)

- name: Check if s3cmd is available
  ansible.builtin.command: which s3cmd
  register: s3cmd_check
  changed_when: false
  failed_when: false

- name: List existing S3 buckets
  ansible.builtin.command: s3cmd ls
  register: s3_bucket_output
  changed_when: false
  failed_when: false
  when: s3cmd_check.rc == 0

- name: Remove all S3 boot-images contents
  ansible.builtin.command: s3cmd del --recursive --force s3://boot-images/
  register: s3_boot_cleanup
  changed_when: s3_boot_cleanup.rc == 0
  failed_when: false
  when:
    - s3cmd_check.rc == 0
    - s3_bucket_output.stdout is defined
    - "'s3://boot-images' in s3_bucket_output.stdout"

- name: Remove S3 boot-images bucket
  ansible.builtin.command: s3cmd rb s3://boot-images/
  register: s3_boot_bucket_delete
  changed_when: s3_boot_bucket_delete.rc == 0
  failed_when: false
  when:
    - s3cmd_check.rc == 0
    - s3_bucket_output.stdout is defined
    - "'s3://boot-images' in s3_bucket_output.stdout"

- name: Remove all S3 efi contents
  ansible.builtin.command: s3cmd del --recursive --force s3://efi/
  register: s3_efi_cleanup
  changed_when: s3_efi_cleanup.rc == 0
  failed_when: false
  when:
    - s3cmd_check.rc == 0
    - s3_bucket_output.stdout is defined
    - "'s3://efi' in s3_bucket_output.stdout"

- name: Remove S3 efi bucket
  ansible.builtin.command: s3cmd rb s3://efi/
  register: s3_efi_bucket_delete
  changed_when: s3_efi_bucket_delete.rc == 0
  failed_when: false
  when:
    - s3cmd_check.rc == 0
    - s3_bucket_output.stdout is defined
    - "'s3://efi' in s3_bucket_output.stdout"

- name: Display S3 cleanup result
  ansible.builtin.debug:
    msg: >-
      S3 cleanup: boot-images={{ "deleted" if (s3_boot_bucket_delete.changed | default(false))
      else "skipped" }}, efi={{ "deleted" if (s3_efi_bucket_delete.changed | default(false))
      else "skipped" }}
  when: s3cmd_check.rc == 0

# OPENCHAMI PACKAGE AND SERVICE CLEANUP

- name: Remove OpenChami packages
  ansible.builtin.dnf:
    name: "{{ openchami_packages }}"
    state: absent

- name: Stop openchami.target systemd unit
  ansible.builtin.systemd:
    name: openchami.target
    state: stopped
    enabled: false
    daemon_reload: true
  failed_when: false

- name: Remove container systemd files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ systemd_files }}"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Remove OpenChami containers
  containers.podman.podman_container:
    name: "{{ item }}"
    state: absent
    force_delete: true
  loop: "{{ openchami_containers }}"
  failed_when: false

- name: Remove OpenChami volumes
  containers.podman.podman_volume:
    name: "{{ item }}"
    state: absent
  loop: "{{ openchami_volumes }}"
  failed_when: false

- name: Remove OpenChami secrets
  containers.podman.podman_secret:
    name: "{{ item }}"
    state: absent
  loop: "{{ openchami_secrets }}"
  failed_when: false

- name: Remove TCP firewall ports
  ansible.builtin.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: disabled
    immediate: true
  loop: "{{ tcp_ports }}"

- name: Remove UDP firewall ports
  ansible.builtin.firewalld:
    port: "{{ item }}/udp"
    permanent: true
    state: disabled
    immediate: true
  loop: "{{ udp_ports }}"

- name: Remove podman interfaces from trusted zone
  ansible.builtin.firewalld:
    interface: "{{ item }}"
    zone: trusted
    permanent: true
    state: disabled
    immediate: true
  loop: "{{ podman_interfaces }}"

- name: Remove regctl config and binary
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ regctl_files }}"

- name: Remove OpenChami config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ config_dirs }}"

- name: Stop and disable openchami services # noqa: command-instead-of-module
  ansible.builtin.command: systemctl stop {{ item }}
  changed_when: false
  loop: "{{ openchami_services }}"
  failed_when: false
