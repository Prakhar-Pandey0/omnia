---

- name: Read omnia_config for slurm cluster configuration
  ansible.builtin.include_vars:
    file: "{{ hostvars['localhost']['input_project_dir'] }}/omnia_config.yml"

- name: Fail if slurm cluster not configured
  ansible.builtin.fail:
    msg: "Slurm cluster not configured in omnia_config.yml. Please configure slurm_cluster first."
  when: slurm_cluster is not defined or slurm_cluster | length == 0

- name: Build cleanup storage list for each cluster
  ansible.builtin.set_fact:
    cleanup_storage_list: []

- name: Determine storage mounts to clean for each cluster
  ansible.builtin.set_fact:
    cleanup_storage_list: >-
      {{ cleanup_storage_list + [
        {
          'cluster_name': cluster_item.cluster_name,
          'nfs_storage': cluster_item.nfs_storage_name,
          'vast_storage': cluster_item.vast_storage_name | default(cluster_item.nfs_storage_name),
          'nfs_mount_point': (mounts | selectattr('name', 'equalto', cluster_item.nfs_storage_name)
                              | first | default({})).mount_point,
          'vast_mount_point': (mounts | selectattr('name', 'equalto',
                               cluster_item.vast_storage_name | default(cluster_item.nfs_storage_name))
                               | first | default({})).mount_point,
          'has_separate_vast': cluster_item.vast_storage_name is defined
                               and cluster_item.vast_storage_name
                               and cluster_item.vast_storage_name != cluster_item.nfs_storage_name
        }
      ] }}
  loop: "{{ slurm_cluster }}"
  loop_control:
    loop_var: cluster_item

- name: Build unique storage mount entries for cleanup
  ansible.builtin.set_fact:
    unique_storage_mounts: []

- name: Collect unique storage mounts with directory types
  ansible.builtin.set_fact:
    unique_storage_mounts: >-
      {{ unique_storage_mounts + [
        {
          'mount_point': item.nfs_mount_point,
          'storage_name': item.nfs_storage,
          'dir_type': 'nfs',
          'directories': ['slurm', 'ctld_track', 'openldap', 'slurm_backups']
                          + (['apps', 'scratch', 'projects', 'slurm/hpc_tools']
                             if not item.has_separate_vast else [])
        }
      ] if item.nfs_mount_point not in unique_storage_mounts
         | map(attribute='mount_point') | list else unique_storage_mounts }}
  loop: "{{ cleanup_storage_list }}"
  loop_control:
    label: "{{ item.cluster_name }}"

- name: Add separate VAST storage mounts
  ansible.builtin.set_fact:
    unique_storage_mounts: >-
      {{ unique_storage_mounts + [
        {
          'mount_point': item.vast_mount_point,
          'storage_name': item.vast_storage,
          'dir_type': 'vast',
          'directories': ['apps', 'scratch', 'projects', 'slurm/hpc_tools']
        }
      ] if item.has_separate_vast and item.vast_mount_point not in unique_storage_mounts | map(attribute='mount_point') | list else unique_storage_mounts }}
  loop: "{{ cleanup_storage_list }}"
  loop_control:
    label: "{{ item.cluster_name }}"

- name: Skip slurm cleanup if no mounts found
  ansible.builtin.debug:
    msg: >
      Slurm storage mounts not found in storage_config.yml.
      Skipping slurm cleanup. If you want to clean slurm directories, please configure
      the storage mounts in storage_config.yml.
  when: unique_storage_mounts | length == 0

- name: Slurm cleanup tasks
  when: unique_storage_mounts | length > 0
  block:
    - name: Build all cleanup paths
      ansible.builtin.set_fact:
        all_cleanup_paths: []

    - name: Build cleanup paths for each storage mount
      ansible.builtin.set_fact:
        all_cleanup_paths: >-
          {{ all_cleanup_paths + (storage_item.directories | map('regex_replace', '^', storage_item.mount_point + '/') | list) }}
      loop: "{{ unique_storage_mounts }}"
      loop_control:
        loop_var: storage_item
        label: "{{ storage_item.storage_name }}"

    - name: Check if any slurm-related directories exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: slurm_dirs_stat
      failed_when: false
      ignore_errors: true
      loop: "{{ all_cleanup_paths }}"

    - name: Set cleanup needed flag
      ansible.builtin.set_fact:
        cleanup_needed: "{{ slurm_dirs_stat.results | selectattr('stat', 'defined') | selectattr('stat.exists') | list | length > 0 }}"

    - name: Skip slurm cleanup if no directories exist
      ansible.builtin.debug:
        msg: "No Slurm-related directories found, skipping slurm cleanup"
      when: not cleanup_needed | default(false)

    - name: Display slurm cleanup information
      ansible.builtin.debug:
        msg: |
          WARNING: This will delete Slurm-related directories from NFS shares:
          {% for storage in unique_storage_mounts %}
          Storage: {{ storage.storage_name }} ({{ storage.mount_point }})
          Type: {{ storage.dir_type | upper }}
          {% for dir in storage.directories %}
          - {{ storage.mount_point }}/{{ dir }}{% if dir == 'slurm_backups' %} (PRESERVED - will not be deleted){% endif %}
          {% endfor %}
          {% endfor %}

          CRITICAL WARNING: Deleting NFS shared data will affect ALL nodes!
          - Ensure Slurm services are stopped on all compute nodes
          - Ensure compute nodes are not accessing these directories
          - This may cause stale file handles on running nodes
          - Only proceed if you understand the impact on your cluster

          Note: slurm_backups directories will be preserved.
          If you need Slurm configuration backup, use the separate utility:
          ansible-playbook utils/slurm_config_util.yml --tags config_backup

          This action is destructive and cannot be undone.
      when: cleanup_needed | default(false)

    - name: Prompt for slurm cleanup confirmation
      ansible.builtin.pause:
        prompt: "I understand this will delete NFS data affecting all nodes. Type {{ slurm_cleanup_confirm_token }} to continue"
      register: cleanup_confirm
      when: not (skip_approval | default(false) | bool)

    - name: Fail if cleanup not confirmed
      ansible.builtin.fail:
        msg: "Slurm cleanup aborted"
      when:
        - not (skip_approval | default(false) | bool)
        - cleanup_confirm.user_input | lower != slurm_cleanup_confirm_token | lower

    - name: Delete slurm directories (excluding slurm_backups)
      ansible.builtin.file:
        path: "{{ item.item }}"
        state: absent
      register: slurm_cleanup_result
      ignore_errors: true
      when:
        - cleanup_needed | default(false)
        - item.stat is defined
        - item.stat.exists
        - not item.item | regex_search('slurm_backups$')
      loop: "{{ slurm_dirs_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Display slurm cleanup completion message
      ansible.builtin.debug:
        msg: |
          Slurm-related cleanup completed.
          {% for storage in unique_storage_mounts %}
          Storage: {{ storage.storage_name }} ({{ storage.mount_point }})
          Type: {{ storage.dir_type | upper }}
          {% for dir in storage.directories %}
          {% set full_path = storage.mount_point + '/' + dir %}
          {% set dir_deleted = slurm_cleanup_result.results | selectattr('item', 'equalto', full_path)
                             | selectattr('changed') | list %}
          {% set dir_exists = slurm_cleanup_result.results | selectattr('item', 'equalto', full_path)
                             | selectattr('stat', 'defined') | selectattr('stat.exists') | list %}
          {% if dir == 'slurm_backups' %}
          -> Preserved: {{ full_path }}
          {% elif dir_deleted %}
          -> Deleted: {{ full_path }}
          {% elif dir_exists %}
          -> Already absent: {{ full_path }}
          {% endif %}
          {% endfor %}
          {% endfor %}
      when: cleanup_needed | default(false)
