---
# ── Stage 8b: Restart network pods to clear stale processes ──────────
# After rollback, some container processes (BIRD from calico, speaker
# from metallb) may survive kubelet stop and prevent new pods from
# starting. This stage restarts those pods to ensure clean state.

- name: Skip restart_network_pods if already completed
  ansible.builtin.debug:
    msg: "restart_network_pods already completed — skipping."
  when: (rollback_status.stages.restart_network_pods.status | default('pending')) == 'completed'

- name: Restart network pods
  when: (rollback_status.stages.restart_network_pods.status | default('pending')) != 'completed'
  block:
    - name: Mark restart_network_pods in_progress
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        status_update:
          stages:
            restart_network_pods:
              status: in_progress
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    # ── Kill orphaned host-level processes on all nodes ─────────────
    # Defense-in-depth: even though stop_cluster.yml kills stale
    # processes, this stage may run on resume after a partial failure
    # where stop_cluster already completed. Kill any surviving BIRD,
    # kube-vip, or speaker processes that escaped container cleanup.
    - name: Kill stale host processes before pod restart (BIRD, kube-vip, speaker)
      ansible.builtin.shell:
        cmd: |
          killed=""
          for proc in bird bird6 kube-vip speaker; do
            if pids=$(pgrep -x "$proc" 2>/dev/null); then
              kill -9 $pids 2>/dev/null || true
              killed="$killed $proc"
            fi
          done
          for _ in _; do
            if pids=$(pgrep -f "runsv bird" 2>/dev/null); then
              kill -9 $pids 2>/dev/null || true
              killed="$killed runsv-bird"
            fi
          done
          echo "${killed:-none}"
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      changed_when: "'none' not in _kill_stale_net.stdout"
      failed_when: false
      register: _kill_stale_net
      loop: "{{ all_rollback_nodes }}"
      loop_control:
        label: "{{ item }}"

    - name: Report stale processes killed during network restart
      ansible.builtin.debug:
        msg: "Stale processes killed on {{ item.item }}: {{ item.stdout | trim }}"
      loop: "{{ _kill_stale_net.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: "'none' not in item.stdout"

    # ── Restart calico-node pods ────────────────────────────────────
    - name: Delete calico-node pods to clear stale BIRD processes
      ansible.builtin.command:
        cmd: kubectl --server=https://{{ first_cp_ip }}:6443 delete pod -n kube-system -l k8s-app=calico-node --force --grace-period=0
      delegate_to: "{{ groups_cp_first | first }}"
      changed_when: true
      failed_when: false

    # ── Restart metallb speaker pods ────────────────────────────────
    - name: Delete metallb speaker pods to clear stale speaker processes
      ansible.builtin.command:
        cmd: kubectl --server=https://{{ first_cp_ip }}:6443 delete pod -n metallb-system -l component=speaker --force --grace-period=0
      delegate_to: "{{ groups_cp_first | first }}"
      changed_when: true
      failed_when: false

    # ── Restart kubelet on all nodes to clear stale pod state ──────
    # After force-deleting calico-node pods, the kubelet may retain
    # stale references to the old pods (projected volume mounts,
    # service account tokens). This prevents new replacement pods
    # from starting — they stay Pending indefinitely. Restarting
    # kubelet clears the stale pod cache and allows the DaemonSet
    # controller's new pods to be started cleanly.
    - name: Restart kubelet on all nodes to clear stale pod state
      ansible.builtin.systemd_service:
        name: kubelet
        state: restarted
      delegate_to: "{{ item }}"
      changed_when: true
      loop: "{{ all_rollback_nodes }}"
      loop_control:
        label: "{{ item }}"

    # ── Brief wait for DaemonSet controller to recreate pods ───────
    - name: Wait for DaemonSet controller to schedule new pods
      ansible.builtin.pause:
        seconds: 30

    # ── Delete any non-Running kube-system pods to unblock the poll ──
    # This runs BEFORE the strict poll so stuck/Pending pods from
    # prior failures are cleaned up and recreated, rather than
    # letting the poll exhaust all retries and fail.
    - name: Get non-Running kube-system pods (pre-cleanup)
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          kubectl --server=https://{{ first_cp_ip }}:6443
          get pods -n kube-system
          -o jsonpath='{range .items[?(@.status.phase!="Running")]}{.metadata.name}{"\n"}{end}'
          | grep -v -E '^$'
      args:
        executable: /bin/bash
      delegate_to: "{{ groups_cp_first | first }}"
      register: _non_running_pods
      changed_when: false
      failed_when: false

    - name: Delete non-Running kube-system pods to force recreation
      ansible.builtin.command:
        cmd: >-
          kubectl --server=https://{{ first_cp_ip }}:6443
          delete pod -n kube-system {{ item }} --force --grace-period=0
      delegate_to: "{{ groups_cp_first | first }}"
      loop: "{{ _non_running_pods.stdout_lines | default([]) }}"
      when:
        - _non_running_pods.stdout_lines | default([]) | length > 0
      changed_when: true
      failed_when: false

    # ── Poll and verify all kube-system pods are Running ────────────
    - name: Poll for all kube-system pods to be Running
      ansible.builtin.command:
        cmd: >-
          kubectl --server=https://{{ first_cp_ip }}:6443
          get pods -n kube-system
          -o jsonpath='{range .items[*]}{.metadata.name}:{.status.phase}{"\n"}{end}'
      delegate_to: "{{ groups_cp_first | first }}"
      register: _kube_system_pods
      changed_when: false
      retries: 30
      delay: 10
      until:
        - _kube_system_pods.rc == 0
        - _kube_system_pods.stdout_lines | reject('search', ':Running$|:Succeeded$') | list | length == 0

    # ── Verify calico-node pods are ready ───────────────────────────
    - name: Verify calico-node pods are ready
      ansible.builtin.command:
        cmd: >-
          kubectl --server=https://{{ first_cp_ip }}:6443
          get pods -n kube-system -l k8s-app=calico-node
          -o jsonpath='{range .items[*]}{.metadata.name}:{.status.phase}:{range .status.conditions[?(@.type=="Ready")]}{.status}{end}{"\n"}{end}'
      delegate_to: "{{ groups_cp_first | first }}"
      register: _calico_status
      changed_when: false
      retries: 30
      delay: 10
      until:
        - _calico_status.rc == 0
        - _calico_status.stdout_lines | select('search', ':Running:True$') | list | length == (all_rollback_nodes | length)

    # ── Verify metallb speaker pods are ready ───────────────────────
    - name: Verify metallb speaker pods are ready
      ansible.builtin.command:
        cmd: >-
          kubectl --server=https://{{ first_cp_ip }}:6443
          get pods -n metallb-system -l component=speaker
          -o jsonpath='{range .items[*]}{.metadata.name}:{.status.phase}:{range .status.conditions[?(@.type=="Ready")]}{.status}{end}{"\n"}{end}'
      delegate_to: "{{ groups_cp_first | first }}"
      register: _speaker_status
      changed_when: false
      retries: 30
      delay: 10
      until:
        - _speaker_status.rc == 0
        - _speaker_status.stdout_lines | select('search', ':Running:True$') | list | length == (all_rollback_nodes | length)

    - name: Mark restart_network_pods completed
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        status_update:
          stages:
            restart_network_pods:
              status: completed
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Display restart_network_pods completion
      ansible.builtin.debug:
        msg: "Network pods (calico-node, metallb speaker) restarted successfully. All pods ready."
