---
# Downgrade K8s and CRI-O packages on a single node.
# Called with loop_var: _node  and vars: _packages, _crio_package

- name: Skip if downgrade_packages already done for {{ _node }}
  ansible.builtin.debug:
    msg: "downgrade_packages already completed on {{ _node }} — skipping."
  when: >-
    (rollback_status.nodes[_node].steps.downgrade_packages.status | default('pending'))
    == 'completed'

- name: Downgrade packages on {{ _node }}
  when: >-
    (rollback_status.nodes[_node].steps.downgrade_packages.status | default('pending'))
    != 'completed'
  block:
    # ── Downgrade K8s packages (kubeadm, kubelet, kubectl) ─────────
    - name: Downgrade K8s packages on {{ _node }}
      ansible.builtin.dnf:
        name: "{{ _packages }}"
        state: present
        allow_downgrade: true
        disable_gpg_check: true
      delegate_to: "{{ _node }}"
      register: _k8s_downgrade_result

    # ── Downgrade CRI-O ────────────────────────────────────────────
    - name: Downgrade CRI-O on {{ _node }}
      ansible.builtin.dnf:
        name: "{{ _crio_package }}"
        state: present
        allow_downgrade: true
        disable_gpg_check: true
      delegate_to: "{{ _node }}"
      register: _crio_downgrade_result

    # ── Verify installed versions ──────────────────────────────────
    - name: Collect package facts on {{ _node }}
      ansible.builtin.package_facts:
        manager: auto
      delegate_to: "{{ _node }}"
      register: _kubelet_version
      changed_when: false

    - name: Fail if kubelet version mismatch on {{ _node }}
      ansible.builtin.fail:
        msg: >-
          kubelet version mismatch on {{ _node }}: expected {{ k8s_rollback_version }},
          got {{ _kubelet_version.ansible_facts.packages.kubelet[0].version | default('unknown') }}
      when: (_kubelet_version.ansible_facts.packages.kubelet[0].version | default('')) != k8s_rollback_version

    # ── Update per-node status ─────────────────────────────────────
    - name: Mark downgrade_packages completed for {{ _node }}
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        node_name: "{{ _node }}"
        node_status_update:
          steps:
            downgrade_packages:
              status: completed
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"
              error:

    - name: Display downgrade result for {{ _node }}
      ansible.builtin.debug:
        msg: >-
          Packages downgraded on {{ _node }}:
          kubelet={{ _kubelet_version.ansible_facts.packages.kubelet[0].version | default('unknown') }},
          cri-o={{ k8s_rollback_version }}
