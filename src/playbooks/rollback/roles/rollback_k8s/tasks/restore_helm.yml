---
# ── Restore Helm binary to rollback target version ───────────────────
# Copies the rollback-target Helm binary from the NFS share path
# (helm/linux-amd64/) to /usr/local/bin/helm on all control plane nodes.

- name: Set Helm binary path for rollback version
  ansible.builtin.set_fact:
    helm_binary_path: "{{ k8s_client_mount_path }}/helm/linux-amd64/helm"

- name: Check if rollback Helm binary exists on NFS
  ansible.builtin.stat:
    path: "{{ helm_binary_path }}"
  delegate_to: "{{ first_cp_node }}"
  register: helm_binary_stat

- name: Copy Helm binary from NFS to /usr/local/bin on all control planes
  ansible.builtin.copy:
    src: "{{ helm_binary_path }}"
    dest: /usr/local/bin/helm
    mode: "0755"
    remote_src: true
  delegate_to: "{{ item }}"
  loop: "{{ all_cp_nodes }}"
  loop_control:
    label: "{{ item }}"
  when: helm_binary_stat.stat.exists

- name: Verify restored Helm version on all control planes
  ansible.builtin.command:
    cmd: helm version --short
  delegate_to: "{{ item }}"
  register: helm_version_check
  changed_when: false
  loop: "{{ all_cp_nodes }}"
  loop_control:
    label: "{{ item }}"
  when: helm_binary_stat.stat.exists

- name: Display restored Helm version on all control planes
  ansible.builtin.debug:
    msg: "Helm restored on {{ item.item }}: {{ item.stdout }}"
  loop: "{{ helm_version_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - helm_binary_stat.stat.exists
    - item.stdout is defined

- name: Warn if rollback Helm binary not found on NFS
  ansible.builtin.debug:
    msg: "WARNING: Helm binary not found at {{ helm_binary_path }} — skipping Helm restore."
  when: not helm_binary_stat.stat.exists
