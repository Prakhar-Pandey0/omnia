---
# ── Stage 7a: Downgrade packages on all workers ───────────────────
# Workers need kubeadm, kubelet, and cri-o.
# kubectl is optional on workers but we skip it (not installed by upgrade).

- name: Skip downgrade_workers if already completed
  ansible.builtin.debug:
    msg: "downgrade_workers already completed — skipping."
  when: (rollback_status.stages.downgrade_workers.status | default('pending')) == 'completed'

- name: Downgrade worker packages
  when: (rollback_status.stages.downgrade_workers.status | default('pending')) != 'completed'
  block:
    - name: Mark downgrade_workers in_progress
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        status_update:
          stages:
            downgrade_workers:
              status: in_progress
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Downgrade packages on each worker
      ansible.builtin.include_tasks: downgrade_packages_single_node.yml
      loop: "{{ all_worker_nodes }}"
      loop_control:
        loop_var: _node
        label: "{{ _node }}"
      vars:
        _node_role: worker
        _packages:
          - "kubeadm-{{ k8s_rollback_version }}"
          - "kubelet-{{ k8s_rollback_version }}"
        _crio_package: "cri-o-{{ k8s_rollback_version }}"

    - name: Mark downgrade_workers completed
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        status_update:
          stages:
            downgrade_workers:
              status: completed
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Display downgrade_workers completion
      ansible.builtin.debug:
        msg: "Packages downgraded to {{ k8s_rollback_version }} on all {{ all_worker_nodes | length }} workers."
