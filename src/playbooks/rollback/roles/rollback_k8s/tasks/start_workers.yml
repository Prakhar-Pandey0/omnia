---
# ── Stage 7b: Start worker nodes ──────────────────────────────────
# Reload systemd, restart CRI-O, start kubelet, wait Ready, uncordon.

- name: Skip start_workers if already completed
  ansible.builtin.debug:
    msg: "start_workers already completed — skipping."
  when: (rollback_status.stages.start_workers.status | default('pending')) == 'completed'

- name: Start workers
  when: (rollback_status.stages.start_workers.status | default('pending')) != 'completed'
  block:
    - name: Mark start_workers in_progress
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        status_update:
          stages:
            start_workers:
              status: in_progress
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Start kubelet on each worker
      ansible.builtin.include_tasks: start_single_node.yml
      loop: "{{ all_worker_nodes }}"
      loop_control:
        loop_var: _node
        label: "{{ _node }}"

    # ── Uncordon all workers ───────────────────────────────────────
    - name: Uncordon worker nodes
      ansible.builtin.command:
        cmd: "kubectl --server=https://{{ first_cp_ip }}:6443 uncordon {{ node_ips[item] }}"
      delegate_to: "{{ groups_cp_first | first }}"
      register: _uncordon_result
      changed_when: true
      loop: "{{ all_worker_nodes }}"
      loop_control:
        label: "{{ item }}"

    - name: Mark start_workers completed
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        status_update:
          stages:
            start_workers:
              status: completed
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Display start_workers completion
      ansible.builtin.debug:
        msg: >-
          All {{ all_worker_nodes | length }} workers started, uncordoned,
          and Ready at v{{ k8s_rollback_version }}.
