---
# ── Stage 3: Restore etcd snapshot on all control planes ───────────
# Uses etcdutl (etcd >= 3.6) to restore the snapshot on each CP with
# the correct --name and --initial-cluster parameters.

- name: Skip restore_etcd if already completed
  ansible.builtin.debug:
    msg: "restore_etcd already completed — skipping."
  when: (rollback_status.stages.restore_etcd.status | default('pending')) == 'completed'

- name: Restore etcd
  when: (rollback_status.stages.restore_etcd.status | default('pending')) != 'completed'
  block:
    - name: Mark restore_etcd in_progress
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        status_update:
          stages:
            restore_etcd:
              status: in_progress
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    # ── Load etcd members from backup ──────────────────────────────
    - name: Read etcd members file
      ansible.builtin.slurp:
        src: "{{ etcd_members_file }}"
      delegate_to: "{{ first_cp_node }}"
      register: _etcd_members_slurp

    - name: Parse etcd members
      ansible.builtin.set_fact:
        etcd_members: "{{ _etcd_members_slurp.content | b64decode | from_json }}"

    # ── Build initial-cluster string from members ──────────────────
    - name: Build initial-cluster string
      ansible.builtin.set_fact:
        etcd_initial_cluster: >-
          {{ etcd_members.members
             | map(attribute='name')
             | zip(etcd_members.members | map(attribute='peerURLs') | map('first'))
             | map('join', '=')
             | join(',') }}

    # ── Restore snapshot on each CP ────────────────────────────────
    - name: Restore etcd snapshot on each control plane
      ansible.builtin.include_tasks: restore_etcd_single_cp.yml
      loop: "{{ all_cp_nodes }}"
      loop_control:
        loop_var: _cp_node
        label: "{{ _cp_node }}"

    # ── Mark restore_etcd completed ────────────────────────────────
    - name: Mark restore_etcd completed
      ansible.builtin.include_tasks:
        file: update_status.yml
      vars:
        status_update:
          stages:
            restore_etcd:
              status: completed
              timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Display restore_etcd completion
      ansible.builtin.debug:
        msg: "etcd snapshot restored on all {{ all_cp_nodes | length }} control planes."
