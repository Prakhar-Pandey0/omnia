---
# ── Ensure kube_vip is in inventory for delegation ─────────────────
- name: Ensure kube_vip host is present for delegation
  ansible.builtin.add_host:
    name: "{{ kube_vip }}"
    ansible_host: "{{ kube_vip }}"
    ansible_connection: ssh
    ansible_user: root
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    groups: kube_vip_group

# ══════════════════════════════════════════════════════════════════════════════
# Build node inventory from upgrade_status.nodes (nodes that were actually upgraded)
# This ensures rollback targets the same nodes that were part of the upgrade
# ══════════════════════════════════════════════════════════════════════════════

- name: Display upgrade status nodes info
  ansible.builtin.debug:
    msg: "{{ nodes_info_banner }}"
  vars:
    nodes_info_banner:
      - "════════════════════════════════════════════════════════════════════════════════"
      - "[ROLLBACK] BUILDING NODE INVENTORY FROM UPGRADE STATUS"
      - "════════════════════════════════════════════════════════════════════════════════"
      - ""
      - "Using nodes from upgrade_status.yml (nodes that were part of the upgrade)"
      - "Total nodes in upgrade status: {{ upgrade_status.nodes | length }}"
      - ""
      - "════════════════════════════════════════════════════════════════════════════════"

# ── Build node lists from upgrade_status.nodes ───────────────────────
- name: Build first control plane list from upgrade_status
  ansible.builtin.set_fact:
    groups_cp_first: >-
      {{ upgrade_status.nodes | dict2items
         | selectattr('value.role', 'equalto', 'control_plane_first')
         | map(attribute='key') | list }}

- name: Build additional control plane list from upgrade_status
  ansible.builtin.set_fact:
    groups_cp: >-
      {{ upgrade_status.nodes | dict2items
         | selectattr('value.role', 'equalto', 'control_plane')
         | map(attribute='key') | list }}

- name: Build worker list from upgrade_status
  ansible.builtin.set_fact:
    groups_worker: >-
      {{ upgrade_status.nodes | dict2items
         | selectattr('value.role', 'equalto', 'worker')
         | map(attribute='key') | list }}

- name: Build all nodes list
  ansible.builtin.set_fact:
    all_cp_nodes: "{{ groups_cp_first + groups_cp }}"
    all_worker_nodes: "{{ groups_worker }}"
    all_rollback_nodes: "{{ groups_cp_first + groups_cp + groups_worker }}"

# ── Build node IP map from upgrade_status.nodes ──────────────────────
- name: Build node name-to-IP mapping from upgrade_status
  ansible.builtin.set_fact:
    node_ips: >-
      {{ node_ips | default({}) | combine({
           item.key: item.value.ip
         }) }}
  loop: "{{ upgrade_status.nodes | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

# ── Display rollback node inventory ──────────────────────────────────
- name: Display rollback node inventory
  ansible.builtin.debug:
    msg: "{{ inventory_banner }}"
  vars:
    inventory_banner:
      - "════════════════════════════════════════════════════════════════════════════════"
      - "[ROLLBACK] NODE INVENTORY"
      - "════════════════════════════════════════════════════════════════════════════════"
      - ""
      - "Total nodes for rollback: {{ all_rollback_nodes | length }}"
      - ""
      - "Control plane (first): {{ groups_cp_first | length }} node(s)"
      - "{% for node in groups_cp_first %}  - {{ node }} ({{ node_ips[node] }})\n{% endfor %}"
      - ""
      - "Control plane (additional): {{ groups_cp | length }} node(s)"
      - "{% for node in groups_cp %}  - {{ node }} ({{ node_ips[node] }})\n{% endfor %}"
      - ""
      - "Workers: {{ groups_worker | length }} node(s)"
      - "{% for node in groups_worker %}  - {{ node }} ({{ node_ips[node] }})\n{% endfor %}"
      - ""
      - "════════════════════════════════════════════════════════════════════════════════"

# ── Validate SSH connectivity to all rollback nodes ──────────────────
- name: Display SSH connectivity check message
  ansible.builtin.debug:
    msg: "Checking SSH connectivity to {{ all_rollback_nodes | length }} rollback nodes..."

- name: Check SSH connectivity to all rollback nodes
  ansible.builtin.wait_for:
    host: "{{ node_ips[item] }}"
    port: 22
    timeout: 10
    state: started
  loop: "{{ all_rollback_nodes }}"
  loop_control:
    label: "{{ item }} ({{ node_ips[item] }})"
  register: ssh_check_results
  ignore_errors: true

- name: Build list of nodes with SSH failures
  ansible.builtin.set_fact:
    ssh_failed_nodes: >-
      {{ ssh_check_results.results
         | selectattr('failed', 'defined')
         | selectattr('failed', 'equalto', true)
         | map(attribute='item')
         | list }}

- name: Display SSH check results
  ansible.builtin.debug:
    msg: "{{ ssh_results_banner }}"
  vars:
    ssh_results_banner:
      - "════════════════════════════════════════════════════════════════════════════════"
      - "[SSH] CONNECTIVITY CHECK RESULTS"
      - "════════════════════════════════════════════════════════════════════════════════"
      - ""
      - "Nodes with SSH accessible: {{ all_rollback_nodes | difference(ssh_failed_nodes) | length }}"
      - "Nodes with SSH failed: {{ ssh_failed_nodes | length }}"
      - "{% if ssh_failed_nodes | length > 0 %}  Failed nodes: {{ ssh_failed_nodes | join(', ') }}{% endif %}"
      - ""
      - "════════════════════════════════════════════════════════════════════════════════"

- name: Fail if any node has SSH connectivity failure
  ansible.builtin.fail:
    msg: |
      ════════════════════════════════════════════════════════════════════════════════
      [ERROR] SSH CONNECTIVITY FAILURE
      ════════════════════════════════════════════════════════════════════════════════
      The following nodes failed SSH connectivity check:
      {% for node in ssh_failed_nodes %}
        - {{ node }} ({{ node_ips[node] }})
      {% endfor %}

      Cannot proceed with rollback. Please ensure:
        1. All nodes are powered on and accessible
        2. SSH service is running on all nodes
        3. Network connectivity exists between control node and target nodes
        4. SSH keys are properly configured

      Fix the connectivity issues and re-run the rollback.
      ════════════════════════════════════════════════════════════════════════════════
  when: ssh_failed_nodes | length > 0

- name: Display all nodes SSH accessible
  ansible.builtin.debug:
    msg: "[OK] SSH connectivity verified for all {{ all_rollback_nodes | length }} rollback nodes"

# ── Add all nodes to Ansible inventory ──────────────────────────────
- name: Add K8s nodes to inventory
  ansible.builtin.include_tasks:
    file: add_nodes_to_inventory.yml

# ── Try to load existing rollback status ────────────────────────────
- name: Try to load existing rollback status file
  when: rollback_status is not defined
  block:
    - name: Check if rollback status file exists
      ansible.builtin.stat:
        path: "{{ rollback_status_file }}"
      delegate_to: "{{ first_cp_node }}"
      register: _rb_status_file_stat

    - name: Read rollback status file (only if it exists)
      ansible.builtin.slurp:
        src: "{{ rollback_status_file }}"
      delegate_to: "{{ first_cp_node }}"
      register: _existing_rb_status_slurp
      when: _rb_status_file_stat.stat.exists | default(false)

    - name: Parse existing rollback status
      ansible.builtin.set_fact:
        rollback_status: "{{ _parsed_rb_status }}"
      vars:
        _parsed_rb_status: "{{ (_existing_rb_status_slurp.content | b64decode | from_yaml) | default({}, true) }}"
      when:
        - _rb_status_file_stat.stat.exists | default(false)
        - _existing_rb_status_slurp is defined
        - (_existing_rb_status_slurp.content | default('') | length) > 0
        - _parsed_rb_status is mapping
        - _parsed_rb_status.rollback is defined

    - name: Debug loaded rollback status
      ansible.builtin.debug:
        msg: "Loaded existing rollback status from {{ rollback_status_file }}"
      when:
        - rollback_status is defined
        - rollback_status is mapping
        - rollback_status.rollback is defined

# ── Normalize existing rollback status ───────────────────────────────
- name: Initialize normalized rollback nodes map
  ansible.builtin.set_fact:
    normalized_rb_nodes: {}
  when:
    - rollback_status is defined
    - rollback_status.nodes is defined

- name: Normalize rollback node order and ensure crio_restart step exists
  ansible.builtin.set_fact:
    normalized_rb_nodes: >-
      {{ normalized_rb_nodes | combine({
           item: (
             rollback_status.nodes[item]
             | combine({
                 'steps': (
                   rollback_status.nodes[item].steps
                   | default({}, true)
                   | combine({
                       'crio_restart': (
                         rollback_status.nodes[item].steps.crio_restart
                         | default({'status': 'pending', 'timestamp': None, 'error': None})
                       )
                     }, recursive=True)
                 )
               }, recursive=True)
           )
         }, recursive=True) }}
  loop: "{{ all_rollback_nodes }}"
  loop_control:
    label: "{{ item }}"
  when:
    - rollback_status is defined
    - rollback_status.nodes is defined
    - rollback_status.nodes[item] is defined

- name: Apply normalized rollback nodes map
  ansible.builtin.set_fact:
    rollback_status: "{{ rollback_status | combine({'nodes': normalized_rb_nodes}, recursive=True) }}"
  when:
    - rollback_status is defined
    - rollback_status.nodes is defined
    - normalized_rb_nodes is defined

# ── Initialize rollback status for new rollback ─────────────────────
- name: Initialize rollback status
  when:
    - rollback_status is not defined or
      (rollback_status is defined and rollback_status.keys() | length == 0) or
      (rollback_status is defined and rollback_status.rollback is not defined)
  block:
    - name: Build initial node rollback status entries
      ansible.builtin.set_fact:
        initial_rb_nodes: >-
          {{ initial_rb_nodes | default({}) | combine({
               item.0: {
                 'role': item.1,
                 'ip': node_ips[item.0],
                 'version_before': k8s_current_version,
                 'version_current': k8s_current_version,
                 'status': 'pending',
                 'steps': (
                   {
                     'stop_kubelet': {'status': 'pending', 'timestamp': None, 'error': None},
                     'restore_etcd': {'status': 'pending', 'timestamp': None, 'error': None},
                     'restore_k8s_configs': {'status': 'pending', 'timestamp': None, 'error': None},
                     'downgrade_packages': {'status': 'pending', 'timestamp': None, 'error': None},
                     'crio_restart': {'status': 'pending', 'timestamp': None, 'error': None},
                     'start_kubelet': {'status': 'pending', 'timestamp': None, 'error': None},
                     'validation': {'status': 'pending', 'timestamp': None, 'error': None},
                     'etcd_health_check': {'status': 'pending', 'timestamp': None, 'error': None}
                   }
                   if item.1 in ['control_plane_first', 'control_plane']
                   else {
                     'stop_kubelet': {'status': 'pending', 'timestamp': None, 'error': None},
                     'downgrade_packages': {'status': 'pending', 'timestamp': None, 'error': None},
                     'crio_restart': {'status': 'pending', 'timestamp': None, 'error': None},
                     'start_kubelet': {'status': 'pending', 'timestamp': None, 'error': None},
                     'validation': {'status': 'pending', 'timestamp': None, 'error': None}
                   }
                 )
               }
             }) }}
      loop: >-
        {{ (groups_cp_first | zip_longest([], fillvalue='control_plane_first'))
         + (groups_cp | zip_longest([], fillvalue='control_plane'))
         + (groups_worker | zip_longest([], fillvalue='worker')) }}
      loop_control:
        label: "{{ item.0 }}"

    - name: Set initial rollback_status
      ansible.builtin.set_fact:
        rollback_status:
          rollback:
            from_version: "{{ k8s_current_version }}"
            target_version: "{{ k8s_rollback_version }}"
            status: in_progress
            started_at: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"
            completed_at:
          stages:
            preflight:
              status: pending
              timestamp:
            stop_cluster:
              status: pending
              timestamp:
            cleanup_metallb_ips:
              status: pending
              timestamp:
            restore_etcd:
              status: pending
              timestamp:
            restore_k8s_configs:
              status: pending
              timestamp:
            downgrade_cp:
              status: pending
              timestamp:
            start_control_plane:
              status: pending
              timestamp:
            fix_vip:
              status: pending
              timestamp:
            downgrade_workers:
              status: pending
              timestamp:
            start_workers:
              status: pending
              timestamp:
            post_validation:
              status: pending
              timestamp:
            restart_network_pods:
              status: pending
              timestamp:
            cleanup_stale_volume_attachments:
              status: pending
              timestamp:
            restore_bss_cloud_init:
              status: pending
              timestamp:
          nodes: "{{ initial_rb_nodes }}"

    - name: Write initial rollback status file locally
      ansible.builtin.copy:
        content: "{{ rollback_status | to_json }}"
        dest: "{{ rollback_status_temp_json }}"
        mode: "0644"
      changed_when: true

    - name: Convert JSON to YAML
      ansible.builtin.shell:
        cmd: >-
          python3 -c "import json, yaml;
          f = open('{{ rollback_status_temp_json }}');
          data = json.load(f); f.close();
          f = open('{{ rollback_status_temp_yml }}', 'w');
          yaml.dump(data, f, default_flow_style=False, sort_keys=False);
          f.close()"
      changed_when: true

    - name: Copy rollback status file to NFS
      ansible.builtin.copy:
        src: "{{ rollback_status_temp_yml }}"
        dest: "{{ rollback_status_file }}"
        mode: "0644"
      delegate_to: "{{ first_cp_node }}"

    - name: Verify rollback status file was created
      ansible.builtin.stat:
        path: "{{ rollback_status_file }}"
      delegate_to: "{{ first_cp_node }}"
      register: _rb_status_verify

    - name: Fail if rollback status file was not created
      ansible.builtin.fail:
        msg: "Failed to create rollback status file: {{ rollback_status_file }}"
      when: not (_rb_status_verify.stat.exists | default(false))

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ rollback_status_temp_json }}"
        - "{{ rollback_status_temp_yml }}"
      changed_when: false
