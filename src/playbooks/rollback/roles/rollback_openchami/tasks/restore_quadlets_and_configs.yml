# ============================================================================
# restore_quadlets_and_configs.yml — Restore v2.1 Quadlets, Configs, RPMs
# ============================================================================
# Reverses the upgrade steps:
#   1. Remove v2.2-only quadlet files (coresmd-coredhcp, coresmd-coredns)
#   2. Restore ALL v2.1 quadlet files from backup (including coresmd.container)
#   3. Restore v2.1 openchami.target from backup (references coresmd.service)
#   4. Restore v2.1 configs (coredhcp.yaml, Corefile, configs_vars.yaml)
#   5. Restore v2.1 RPMs (openchami + ochami CLI) from backup
#      NOTE: backup may contain both v2.1 AND v2.2 RPMs — filter needed
#   5a. Re-remove v2.2 quadlets and re-restore configs after RPM install
#   6. Reload systemd daemon
#
# Backup structure (created by omnia.sh --upgrade):
#   {{ rollback_backup_dir }}/openchami/
#     quadlets/              - all v2.1 .container quadlet files
#     openchami.target       - v2.1 systemd target (references coresmd.service)
#     openchami_data/        - full copy of /opt/omnia/openchami/
# ============================================================================

- name: Restore v2.1 quadlets, configs, and RPMs
  block:
    # ── 1. Remove v2.2-only quadlet files ───────────────────────────────
    # These did not exist in v2.1 and must be removed so systemd doesn't
    # try to start them.
    - name: Remove v2.2-only quadlet files (coresmd-coredhcp, coresmd-coredns)
      ansible.builtin.file:
        path: "{{ systemd_quadlet_dir }}/{{ item }}"
        state: absent
      loop: "{{ rollback_v22_only_quadlets }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── 2. Restore ALL v2.1 quadlet files from backup ───────────────────
    # The backup contains all .container files as they were before upgrade.
    # This restores v2.1 image tags and the single coresmd.container file.
    # We use the OIM host-side backup path because this task is delegated.
    - name: Compute OIM host-side quadlets backup path
      ansible.builtin.set_fact:
        rollback_oim_host_quadlets: >-
          {{ rollback_oim_host_backup_dir }}/{{ backup_quadlets_subpath }}

    - name: List backed-up quadlet container files
      ansible.builtin.find:
        paths: "{{ rollback_oim_host_quadlets }}"
        patterns: "*.container"
      register: rollback_quadlet_files
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: List backed-up quadlet network files
      ansible.builtin.find:
        paths: "{{ rollback_oim_host_quadlets }}"
        patterns: "*.network"
      register: rollback_network_files
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Display backed-up quadlet files found
      ansible.builtin.debug:
        verbosity: 1
        msg: >-
          Found {{ rollback_quadlet_files.files | length }} container files and
          {{ rollback_network_files.files | default([]) | length }} network files in backup:
          Containers: {{ rollback_quadlet_files.files | map(attribute='path') | map('basename') | list }}
          Networks: {{ rollback_network_files.files | default([]) | map(attribute='path') | map('basename') | list }}

    # Restore network files FIRST - these must exist before containers can use them
    - name: Restore each v2.1 network quadlet file to systemd quadlet directory
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ systemd_quadlet_dir }}/{{ item.path | basename }}"
        remote_src: true
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      loop: "{{ rollback_network_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      when: rollback_network_files.files | default([]) | length > 0

    - name: Restore each v2.1 container quadlet file to systemd quadlet directory
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ systemd_quadlet_dir }}/{{ item.path | basename }}"
        remote_src: true
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      loop: "{{ rollback_quadlet_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── 3. Restore v2.1 openchami.target from backup ───────────────────
    # The v2.1 target references coresmd.service (single container),
    # NOT coresmd-coredhcp.service + coresmd-coredns.service.
    - name: Compute OIM host-side openchami.target backup path
      ansible.builtin.set_fact:
        rollback_oim_host_target: >-
          {{ rollback_oim_host_backup_dir }}/{{ backup_target_subpath }}

    - name: Restore v2.1 openchami.target
      ansible.builtin.copy:
        src: "{{ rollback_oim_host_target }}"
        dest: "{{ openchami_target_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── 4. Restore v2.1 configs from /etc/openchami backup ──────────────
    # The entire /etc/openchami directory was backed up during upgrade by
    # backup_openchami.yml. Restore it in full to get all config files
    # (coredhcp.yaml, Corefile, openchami.env, certs, etc.) back to their
    # pre-upgrade state.
    - name: Compute OIM host-side /etc/openchami backup path
      ansible.builtin.set_fact:
        rollback_oim_host_etc_openchami: >-
          {{ rollback_oim_host_backup_dir }}/{{ backup_etc_openchami_subpath }}
        rollback_oim_host_data: >-
          {{ rollback_oim_host_backup_dir }}/{{ backup_openchami_data_subpath }}

    - name: Check if /etc/openchami backup exists on OIM host
      ansible.builtin.stat:
        path: "{{ rollback_oim_host_etc_openchami }}"
      register: rollback_etc_openchami_backup_stat
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Restore entire /etc/openchami from backup
      ansible.builtin.shell: |
        set -o pipefail
        cp -a {{ rollback_oim_host_etc_openchami }}/. {{ openchami_config_dir | regex_replace('/configs$', '') }}/
      when: rollback_etc_openchami_backup_stat.stat.exists | default(false)
      changed_when: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display /etc/openchami restore status
      ansible.builtin.debug:
        verbosity: 1
        msg: >-
          /etc/openchami: {{ 'restored from backup' if rollback_etc_openchami_backup_stat.stat.exists
          | default(false) else 'backup NOT found — configs may be in v2.2 state' }}

    # --- configs_vars.yaml ---
    # This file lives at /opt/omnia/openchami/configs_vars.yaml and IS
    # included in the openchami_data backup.
    - name: Check if backed-up configs_vars.yaml exists in openchami_data
      ansible.builtin.stat:
        path: "{{ rollback_oim_host_data }}/configs_vars.yaml"
      register: rollback_configvars_stat
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Restore configs_vars.yaml from backup
      ansible.builtin.copy:
        src: "{{ rollback_oim_host_data }}/configs_vars.yaml"
        dest: "{{ rollback_oim_shared_path }}/omnia/openchami/configs_vars.yaml"
        remote_src: true
        owner: root
        group: root
        mode: "{{ file_permissions_644 }}"
      when: rollback_configvars_stat.stat.exists | default(false)
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── 5. Restore v2.1 RPMs from backup ────────────────────────────────
    # IMPORTANT: The backup openchami_data/ contains BOTH v2.1 AND v2.2
    # RPMs (the upgrade downloads v2.2 RPMs before creating the backup).
    # Installing all RPMs causes v2.2 to win (processed last → upgrades
    # the just-downgraded v2.1), re-creating v2.2 quadlet files and
    # overwriting configs with RPM defaults.
    #
    # Fix: Read openchami_backup_manifest.yml which records the exact
    # source (v2.1) and target (v2.2) RPM filenames. Install ONLY the
    # source RPMs.
    - name: Read openchami backup manifest for source RPM versions
      ansible.builtin.slurp:
        src: "{{ rollback_oim_host_backup_dir }}/openchami_backup_manifest.yml"
      register: rollback_ochami_manifest_raw
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Parse openchami backup manifest
      ansible.builtin.set_fact:
        rollback_ochami_manifest: >-
          {{ (rollback_ochami_manifest_raw.content | b64decode | from_yaml)
             if rollback_ochami_manifest_raw is not failed
                and rollback_ochami_manifest_raw.content is defined
             else {} }}

    - name: Set v2.1 RPM filenames from manifest source_rpms
      ansible.builtin.set_fact:
        rollback_v21_rpm_names: >-
          {{ [
            rollback_ochami_manifest.source_rpms.openchami | default(''),
            rollback_ochami_manifest.source_rpms.ochami_cli | default('')
          ] | select | list }}
      when: rollback_ochami_manifest.source_rpms is defined

    - name: Find backed-up openchami RPMs
      ansible.builtin.find:
        paths: "{{ rollback_oim_host_data }}"
        patterns: "*.rpm"
        recurse: true
      register: rollback_rpm_files
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Filter RPMs to v2.1 only (match manifest source_rpms)
      ansible.builtin.set_fact:
        rollback_v21_rpms: >-
          {%- set result = [] -%}
          {%- for rpm in rollback_rpm_files.files | default([]) -%}
            {%- if rpm.path | basename in (rollback_v21_rpm_names | default([])) -%}
              {%- set _ = result.append(rpm.path) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ result }}

    - name: Display RPMs selected for rollback
      ansible.builtin.debug:
        verbosity: 1
        msg: >-
          All RPMs in backup: {{ rollback_rpm_files.files | default([]) | map(attribute='path') | map('basename') | list }}.
          Manifest source_rpms: {{ rollback_v21_rpm_names | default([]) }}.
          Selected for install: {{ rollback_v21_rpms | default([]) | map('basename') | list }}

    - name: Reinstall v2.1 RPMs from backup (downgrade)
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: present
        disable_gpg_check: true
        allow_downgrade: true
      loop: "{{ rollback_v21_rpms | default([]) }}"
      loop_control:
        label: "{{ item | basename }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    # ── 5a. Re-remove v2.2 quadlets and re-restore configs after RPM ───
    # Defense in depth: RPM post-install scripts may still create files.
    # Re-apply backup state to guarantee v2.1 quadlets and configs.
    - name: Re-remove v2.2-only quadlets after RPM reinstall
      ansible.builtin.file:
        path: "{{ systemd_quadlet_dir }}/{{ item }}"
        state: absent
      loop: "{{ rollback_v22_only_quadlets }}"
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Re-restore v2.1 quadlets after RPM reinstall
      ansible.builtin.shell: |
        set -o pipefail
        cp -a {{ rollback_oim_host_quadlets }}/*.container {{ systemd_quadlet_dir }}/
        cp -a {{ rollback_oim_host_quadlets }}/*.network {{ systemd_quadlet_dir }}/ 2>/dev/null || true
      changed_when: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Re-restore /etc/openchami after RPM reinstall
      ansible.builtin.shell: |
        set -o pipefail
        cp -a {{ rollback_oim_host_etc_openchami }}/. {{ openchami_config_dir | regex_replace('/configs$', '') }}/
      when: rollback_etc_openchami_backup_stat.stat.exists | default(false)
      changed_when: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    # ── 6. Reload systemd daemon ────────────────────────────────────────
    # Apply all quadlet and target changes before starting services.
    - name: Reload systemd daemon to apply restored quadlets and target
      ansible.builtin.systemd:
        daemon_reload: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display quadlet and config restore summary
      ansible.builtin.debug:
        msg:
          - "{{ rollback_messages.restore.quadlets_success }}"
          - "Container quadlet files restored: {{ rollback_quadlet_files.files | length }}"
          - "Network quadlet files restored: {{ rollback_network_files.files | default([]) | length }}"
          - "v2.2-only quadlets removed: {{ rollback_v22_only_quadlets | join(', ') }}"
          - "openchami.target: restored from backup (references coresmd.service)"
          - "/etc/openchami: {{ 'restored from backup' if rollback_etc_openchami_backup_stat.stat.exists | default(false) else 'backup NOT found' }}"
          - "configs_vars.yaml: {{ 'restored' if rollback_configvars_stat.stat.exists | default(false) else 'not in backup' }}"
          - "RPMs restored (v2.1 only): {{ rollback_v21_rpms | default([]) | map('basename') | list }}"
