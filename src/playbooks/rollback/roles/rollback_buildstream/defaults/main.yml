---
# ============================================================================
# rollback_buildstream — Default Variables
# ============================================================================
# All variables prefixed with buildstream_orchestrator_ to avoid collisions.
# Lowest priority — easily overridden by group_vars, host_vars, or extra-vars.
# ============================================================================

# Manifest paths
buildstream_orchestrator_manifest_dir: /opt/omnia/.data
buildstream_orchestrator_rollback_manifest: "{{ buildstream_orchestrator_manifest_dir }}/rollback_manifest.yml"

# Component identification
buildstream_orchestrator_component_name: build_stream

# Service names (as generated by quadlet)
buildstream_orchestrator_bs_service: omnia_build_stream.service
buildstream_orchestrator_pg_service: omnia_postgres.service

# Container names
buildstream_orchestrator_bs_container: omnia_build_stream
buildstream_orchestrator_pg_container: omnia_postgres

# BuildStream image version (upgrade was 1.0 → 1.1; rollback removes 1.1)
buildstream_orchestrator_bs_image: "docker.io/dellhpcomniaaisolution/omnia_build_stream"
buildstream_orchestrator_bs_version: "1.1"

# Quadlet directory
buildstream_orchestrator_quadlet_dir: /etc/containers/systemd

# Database
buildstream_orchestrator_pg_user: "{{ hostvars['localhost']['postgres_user'] | default('admin') }}"
buildstream_orchestrator_pg_db: build_stream_db

# Alembic migration — v2.1 was at 005, v2.2 added 006 + 007
# Rollback target is 005 (2 steps back)
buildstream_orchestrator_migration_target: "005"
buildstream_orchestrator_migration_v22_head: "007"
# Alembic working directory inside container
buildstream_orchestrator_alembic_workdir: /opt/omnia/build_stream/infra/db

# Health check
buildstream_orchestrator_bs_host_ip: "{{ hostvars['localhost']['build_stream_host_ip'] | default('127.0.0.1') }}"
buildstream_orchestrator_bs_port: "{{ hostvars['localhost']['build_stream_port'] | default('8010') }}"
buildstream_orchestrator_health_retries: 10
buildstream_orchestrator_health_delay: 3

# Postgres readiness
buildstream_orchestrator_pg_ready_retries: 10
buildstream_orchestrator_pg_ready_delay: 5

# Watcher service
buildstream_orchestrator_watcher_service: playbook_watcher.service
buildstream_orchestrator_watcher_service_file: /etc/systemd/system/playbook_watcher.service

# omnia.target
buildstream_orchestrator_omnia_target: /etc/systemd/system/omnia.target

# Cleanup (Uninstall) — remove container images after uninstall
buildstream_orchestrator_cleanup_images: true

# GitLab
buildstream_orchestrator_gitlab_ctl_command: gitlab-ctl
