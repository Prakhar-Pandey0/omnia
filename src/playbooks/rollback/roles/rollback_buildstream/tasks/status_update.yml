---
# ============================================================================
# status_update.yml — Phase 9: Post-Rollback Status Update
# ============================================================================
# Re-reads rollback manifest, marks build_stream as completed, and displays
# a rollback summary from the Jinja2 template.
# ============================================================================

- name: "Phase 9 | Re-read rollback manifest"
  ansible.builtin.slurp:
    src: "{{ buildstream_orchestrator_rollback_manifest }}"
  register: _raw_manifest_final

- name: "Phase 9 | Parse manifest"
  ansible.builtin.set_fact:
    _rollback_manifest_final: "{{ _raw_manifest_final.content | b64decode | from_yaml }}"

- name: "Phase 9 | Set rollback status"
  ansible.builtin.set_fact:
    _rollback_final_status: "{{ 'failed' if (_rollback_failed | default(false) | bool) else 'completed' }}"

- name: "Phase 9 | Update manifest with final status"
  ansible.builtin.copy:
    content: >-
      {{ _rollback_manifest_final | combine({
           'component_status': _rollback_manifest_final.component_status | combine({
             buildstream_orchestrator_component_name: _rollback_final_status
           })
         }) | to_nice_yaml }}
    dest: "{{ buildstream_orchestrator_rollback_manifest }}"
    mode: '0644'

- name: "Phase 9 | Display rollback summary"
  ansible.builtin.pause:
    seconds: 1
    prompt: "{{ lookup('template', 'rollback_summary.j2') }}"

- name: "Phase 9 | Display rollback status"
  ansible.builtin.pause:
    seconds: 1
    prompt: "[ROLLBACK] Component '{{ buildstream_orchestrator_component_name }}' — status changed to: {{ _rollback_final_status }}"
