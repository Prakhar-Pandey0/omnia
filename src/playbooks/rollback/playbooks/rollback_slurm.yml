---

# ============================================================================
# Play 1: Pre-flight — manifest gating, BuildStream terminal gate
# ============================================================================
- name: Rollback Slurm feature updates
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    rollback_manifest_path: /opt/omnia/.data/rollback_manifest.yml
    upgrade_manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    component_name: slurm
  tasks:
    - name: Check if rollback manifest exists
      ansible.builtin.stat:
        path: "{{ rollback_manifest_path }}"
      register: manifest_stat

    - name: Fail if rollback manifest not found
      ansible.builtin.fail:
        msg: >-
          Rollback manifest not found at '{{ rollback_manifest_path }}'.
          Run the full rollback.yml playbook, or ensure the manifest exists
          before running rollback.
      when: not manifest_stat.stat.exists

    - name: Read rollback_manifest.yml
      ansible.builtin.include_vars:
        file: "{{ rollback_manifest_path }}"
        name: rollback_manifest

    - name: Read upgrade_manifest.yml
      ansible.builtin.include_vars:
        file: "{{ upgrade_manifest_path }}"
        name: upgrade_manifest
      failed_when: false

    - name: Set upgrade_manifest to empty dict if not found
      ansible.builtin.set_fact:
        slurm_skip: false
        upgrade_manifest: "{{ hostvars['localhost']['upgrade_manifest'] }}"

    - name: Read software_config.json
      ansible.builtin.include_vars:
        file: "{{ rollback_manifest.backup_dir }}/input/project_default/software_config.json"
        name: software_config

    - name: Determine slurm_skip status
      ansible.builtin.set_fact:
        slurm_skip: true
        cacheable: true
      when: >
        (rollback_manifest.component_status.slurm | default('pending') == 'completed')
        or (software_config.softwares | selectattr('name', 'equalto', 'slurm_custom') | list | length == 0)
        or (build_stream_terminal | default(false) | bool)
        or (upgrade_manifest.component_status.slurm | default('pending') not in ['completed', 'in-progress', 'failed'])

    - name: "Handle BuildStream terminal gate (C-24)"
      when: slurm_skip
      block:
        - name: "Mark as skipped — BuildStream terminal gate active"
          ansible.builtin.copy:
            content: >-
              {{ rollback_manifest | combine({
                   'component_status': rollback_manifest.component_status | combine({
                     component_name: 'skipped'
                   })
                 }) | to_nice_yaml }}
            dest: "{{ rollback_manifest_path }}"
            mode: '0644'

        - name: "Skip — BuildStream terminal gate active"
          ansible.builtin.meta: end_play

    - name: Block when slurm is already completed
      when: not slurm_skip
      block:
        - name: Set slurm rollback status to in-progress
          ansible.builtin.copy:
            content: >-
              {{ rollback_manifest | combine({
                  'component_status': rollback_manifest.component_status | combine({
                    component_name: 'in-progress'
                  })
                }) | to_nice_yaml }}
            dest: "{{ rollback_manifest_path }}"
            mode: '0644'

        - name: "Display rollback status in-progress — {{ component_name }}"
          ansible.builtin.debug:
            msg: "[ROLLBACK] Component '{{ component_name }}' — status changed to: in-progress"

        - name: Check for existing reboot state file
          ansible.builtin.stat:
            path: /opt/omnia/.data/slurm_rollback_reboot_state.yml
          register: _reboot_state_stat

        - name: Load reboot state from previous run
          ansible.builtin.include_vars:
            file: /opt/omnia/.data/slurm_rollback_reboot_state.yml
            name: _reboot_state
          when: _reboot_state_stat.stat.exists | default(false)

        - name: Set previously successful reboot list
          ansible.builtin.set_fact:
            slurm_previously_rebooted: "{{ _reboot_state.successfully_rebooted | default([], true) }}"
          when: _reboot_state_stat.stat.exists | default(false)

        - name: Initialize previously rebooted list (no prior state)
          ansible.builtin.set_fact:
            slurm_previously_rebooted: []
          when: not (_reboot_state_stat.stat.exists | default(false))

# ============================================================================
# Create OIM host group (needed for cloud-init/BSS update on OIM)
# ============================================================================
- name: Create OIM host group for cloud-init/BSS update
  ansible.builtin.import_playbook: ../../utils/create_container_group.yml
  vars:
    oim_group: true

# ============================================================================
# Play 2: Update cloud-init and BSS from backup openchami_data
# ============================================================================
- name: Rollback cloud-init and BSS for slurm functional groups
  hosts: oim
  connection: ssh
  gather_facts: false
  vars:
    rollback_manifest_path: /opt/omnia/.data/rollback_manifest.yml
  tasks:
    - name: Skip if slurm upgrade not needed
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['slurm_skip'] | default(false) | bool

    - name: Read rollback_manifest.yml
      ansible.builtin.include_vars:
        file: "{{ rollback_manifest_path }}"
        name: rollback_manifest

    - name: Read software_config.json
      ansible.builtin.include_vars:
        file: "{{ rollback_manifest.backup_dir }}/input/project_default/software_config.json"
        name: software_config

    - name: Notify slurm not configured and end play
      when: >-
        (software_config.softwares | selectattr('name', 'equalto', 'slurm_custom') | list | length) == 0
      block:
        - name: Display message
          ansible.builtin.debug:
            msg: "Slurm is not configured in software_config.json. Skipping Slurm rollback."

        - name: Add skipped to rollback_manifest
          ansible.builtin.copy:
            content: >-
              {{ rollback_manifest | combine({
                      'component_status': rollback_manifest.component_status | combine({
                        'slurm': 'skipped'
                      })
                    }) | to_nice_yaml }}
            dest: "{{ rollback_manifest_path }}"
            mode: '0644'
          delegate_to: localhost

        - name: End play
          ansible.builtin.meta: end_play

    - name: Include omnia_config
      ansible.builtin.include_vars:
        file: "{{ rollback_manifest.backup_dir }}/input/project_default/provision_config.yml"
        name: provision_config

    - name: Read pxe_mapping_file
      community.general.read_csv:
        path: "{{ rollback_manifest.backup_dir }}/input/project_default/{{ provision_config.pxe_mapping_file_path | basename }}"
      register: pxe_mapping
      delegate_to: localhost

    - name: Filter rows first
      ansible.builtin.set_fact:
        slurm_filtered_rows: >-
          {{ pxe_mapping.list
            | selectattr('FUNCTIONAL_GROUP_NAME', 'match', '^(slurm|login)')
                | list }}

    - name: Build dict
      ansible.builtin.set_fact:
        slurm_host_group_map: >-
          {{ dict(
              slurm_filtered_rows | map(attribute='HOSTNAME')
              | zip(slurm_filtered_rows | map(attribute='FUNCTIONAL_GROUP_NAME'))
          ) }}

    - name: End play if not slurm nodes in pxe_mapping
      ansible.builtin.meta: end_play
      when: slurm_host_group_map | default({}, true) | length == 0

    - name: Get the backup directory
      ansible.builtin.set_fact:
        openchami_work_dir: >-
          {{
            rollback_manifest.backup_dir
            | replace('/opt', hostvars['localhost']['oim_shared_path'])
          }}/openchami/openchami_data/workdir

    - name: Pause to display warning
      ansible.builtin.pause:
        seconds: 10
        prompt: "{{ slurm_rollback_banner }}"
      vars:
        slurm_rollback_banner: |
          [ROLLBACK] SLURM CLUSTER — PRE-ROLLBACK NOTICE
          ==============================================
          1. NODE REBOOT    — All Slurm/login nodes will reboot.
          2. NFS MOUNTS     — New NFS mounts(Ex: VAST) added during upgrade will NOT be retained on rollback.
          3. SLURM CONF     - Slurm configuration files will be restored to their original state.

    - name: Read oim_metadata for oim_node_name (standalone fallback)
      ansible.builtin.include_vars:
        file: /opt/omnia/.data/oim_metadata.yml
        name: _oim_meta
      when: hostvars['localhost']['oim_node_name'] is not defined

    - name: Set oim_node_name from oim_metadata if not provided by parent playbook
      ansible.builtin.set_fact:
        oim_node_name: "{{ _oim_meta.oim_node_name }}"
      delegate_to: localhost
      delegate_facts: true
      when: hostvars['localhost']['oim_node_name'] is not defined

    - name: Refresh OpenCHAMI access token
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../../common/tasks/common/openchami_auth.yml"
      vars:
        oim_node_name: "{{ hostvars['localhost']['oim_node_name'] }}"

    - name: Update cloud-init and BSS for slurm
      environment: "{{ hostvars['oim']['ochami_env'] }}"
      block:
        - name: Include update_cloud_init_bss role
          ansible.builtin.include_role:
            name: "{{ playbook_dir }}/../../utils/roles/update_cloud_init_bss"
          vars:
            functional_group_name: "{{ item }}"
            bss_file_path: "{{ openchami_work_dir }}/boot/bss-{{ item }}.yaml"
            cloud_init_file_path: "{{ openchami_work_dir }}/cloud-init/ci-group-{{ item }}.yaml"
            ci_defaults_file_path: "{{ openchami_work_dir }}/cloud-init/ci-defaults.yaml"
            ci_common_file_path: "{{ openchami_work_dir }}/cloud-init/ci-group-common.yaml"
            hostname_file_path: "{{ openchami_work_dir }}/nodes/hostname.yaml"
            update_cloud_init: true
            update_ci_defaults: true
            update_ci_common: true
            update_hostname: true
          loop: "{{ slurm_host_group_map.values() | list | unique }}"

    - name: Include slurm rollback role
      ansible.builtin.include_role:
        name: "{{ playbook_dir }}/../roles/rollback_slurm"
      tags: slurm

- name: Reboot Slurm nodes and validate services
  hosts: slurm_*, login_*
  gather_facts: false
  serial: 100%
  strategy: host_pinned
  vars:
    default_reboot_timeout: 1200
    ssh_timeout: 60
    reboot_time_map:
      login_compiler_node_x86_64: 1800
      login_compiler_node_aarch64: 1800
  tasks:
    - name: Skip if slurm upgrade not needed
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['slurm_skip'] | default(false) | bool

    - name: Set reboot timeout based on node type
      ansible.builtin.set_fact:
        reboot_timeout: "{{ reboot_time_map.get(group_names[0], default_reboot_timeout) }}"

    - name: Initialize state
      ansible.builtin.set_fact:
        node_status:
          hostname: "{{ inventory_hostname }}"
          reboot: false
          ssh: false
          sinfo: false
          unreachable: false

    - name: Check SSH connectivity
      ansible.builtin.wait_for_connection:
        delay: 0
        timeout: 10
      register: ssh_check
      ignore_errors: true
      ignore_unreachable: true

    - name: Mark node as unreachable if checks fail
      ansible.builtin.set_fact:
        node_status: "{{ node_status | combine({'unreachable': true}) }}"
      when:
        - ssh_check is failed

    - name: Stop further execution
      ansible.builtin.meta: end_host
      when: ssh_check is failed

    - name: Skip reboot — node successfully rebooted in previous run
      when: inventory_hostname in (hostvars['localhost']['slurm_previously_rebooted'] | default([], true))
      block:
        - name: Mark node as previously completed
          ansible.builtin.set_fact:
            node_status: "{{ node_status | combine({'reboot': true, 'ssh': true, 'sinfo': true}) }}"
        - name: End host — already successfully rebooted
          ansible.builtin.meta: end_host

    # ---- REBOOT ----
    - name: Remove stale SSH host key before reboot
      ansible.builtin.known_hosts:
        name: "{{ inventory_hostname }}"
        state: absent
      delegate_to: localhost

    - name: Trigger reboot message
      ansible.builtin.debug:
        msg: "Triggering reboot for {{ inventory_hostname }}"

    - name: Reboot node
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        # test_command: "sinfo"
      register: reboot_result
      ignore_errors: true
      ignore_unreachable: true
      # check_mode: true # for debug

    - name: Debug reboot result
      ansible.builtin.debug:
        var: reboot_result

    - name: Mark reboot
      ansible.builtin.set_fact:
        node_status: "{{ node_status | combine({'reboot': true}) }}"
      when: reboot_result is succeeded

    # ---- WAIT FOR SSH ----
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: "{{ ssh_timeout }}"
      register: ssh_result
      ignore_errors: true

    - name: Update SSH state
      ansible.builtin.set_fact:
        node_status: "{{ node_status | combine({'ssh': (ssh_result is succeeded)}) }}"

    # ---- WAIT FOR CLOUD-INIT ----
    - name: Wait for cloud-init
      ansible.builtin.command:
        cmd: cloud-init status --wait
      register: ci_wait
      failed_when: false
      changed_when: ci_wait.rc in [0, 2]
      timeout: "{{ reboot_timeout }}"
      ignore_errors: true
      when: node_status.ssh

    - name: Print cloud-init status
      ansible.builtin.debug:
        var: ci_wait
      when: node_status.ssh and ci_wait is defined

    # ---- CHECK SLURM ----
    - name: Check slurm services
      ansible.builtin.command: sinfo
      register: svc
      changed_when: false
      failed_when: false
      retries: 5
      delay: 15
      until: svc.rc == 0
      when: node_status.ssh or reboot_result is succeeded

    - name: Capture service status
      ansible.builtin.set_fact:
        node_status: "{{ node_status | combine({'sinfo': (svc is defined and svc.rc == 0)}) }}"
      when: node_status.ssh or reboot_result is succeeded

- name: Rollback Slurm cluster
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    rollback_manifest_path: /opt/omnia/.data/rollback_manifest.yml
    component_name: slurm
  tasks:
    - name: Skip if slurm rollback not needed
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['slurm_skip'] | default(false) | bool

    - name: Set slurm nodes from inventory
      ansible.builtin.set_fact:
        slurm_nodes: >-
          {{
            groups | dict2items
            | selectattr('key', 'match', '^(slurm_.*|login_.*)$')
            | map(attribute='value')
            | flatten | unique | list
          }}

    - name: Debug slurm nodes
      ansible.builtin.debug:
        var: slurm_nodes

    - name: Read rollback_manifest.yml
      ansible.builtin.include_vars:
        file: "{{ rollback_manifest_path }}"
        name: rollback_manifest

    - name: Handle skipped case
      when: slurm_nodes | length == 0
      block:
        - name: Add skipped to rollback_manifest
          ansible.builtin.copy:
            content: >-
              {{ rollback_manifest | combine({
                      'component_status': rollback_manifest.component_status | combine({
                        'slurm': 'skipped'
                      })
                    }) | to_nice_yaml }}
            dest: "{{ rollback_manifest_path }}"
            mode: '0644'

        - name: End play if no slurm nodes found in inventory
          ansible.builtin.meta: end_play

    - name: Set filtered nodes
      ansible.builtin.set_fact:
        slurm_rollback_failed: false
        filtered_nodes: "{{ slurm_nodes | map('extract', hostvars, 'node_status') }}"

    - name: Unreachable filter
      ansible.builtin.set_fact:
        unreachable_nodes: "{{ filtered_nodes | selectattr('unreachable', 'equalto', true) | list }}"
        filtered_nodes: "{{ filtered_nodes | selectattr('unreachable', 'equalto', false) | list }}"

    - name: Reboot filter
      ansible.builtin.set_fact:
        reboot_nodes: "{{ filtered_nodes | selectattr('reboot', 'equalto', false) | list }}"
        filtered_nodes: "{{ filtered_nodes | selectattr('reboot', 'equalto', true) | list }}"

    - name: SSH filter
      ansible.builtin.set_fact:
        ssh_nodes: "{{ filtered_nodes | selectattr('ssh', 'equalto', false) | list }}"
        filtered_nodes: "{{ filtered_nodes | selectattr('ssh', 'equalto', true) | list }}"

    - name: Sinfo filter
      ansible.builtin.set_fact:
        sinfo_nodes: "{{ filtered_nodes | selectattr('sinfo', 'equalto', false) | list }}"
        filtered_nodes: "{{ filtered_nodes | selectattr('sinfo', 'equalto', true) | list }}"

    - name: Set failure and success
      ansible.builtin.set_fact:
        failure_nodes: "{{ unreachable_nodes + reboot_nodes + ssh_nodes + sinfo_nodes }}"
        success_nodes: "{{ filtered_nodes }}"

    - name: Write reboot state file
      ansible.builtin.copy:
        content: >-
          {{ {'successfully_rebooted': success_nodes | map(attribute='hostname') | list,
              'failed': failure_nodes | map(attribute='hostname') | list} | to_nice_yaml }}
        dest: /opt/omnia/.data/slurm_rollback_reboot_state.yml
        mode: '0644'

    - name: Set slurm rollback failed
      ansible.builtin.set_fact:
        slurm_rollback_failed: "{{ failure_nodes | length > 0 }}"

    - name: Generate and display failure report
      when: slurm_rollback_failed
      block:
        - name: Fail with failure report
          ansible.builtin.pause:
            prompt: "{{ failure_report }}"
            seconds: 5
          vars:
            failure_report: |
              ================================================================
              SLURM CLUSTER ROLLBACK STATUS SUMMARY
              ================================================================

              Total Nodes: {{ slurm_nodes | length }}
              Successful booted slurm nodes: {{ success_nodes | length }}
              {% if unreachable_nodes | length > 0 %}

              -> UNREACHABLE NODES ({{ unreachable_nodes | length }})
              ─────────────────────────────────────────────────────────────────
              {{ unreachable_nodes | map(attribute='hostname') | join(', ') }}
              {% endif %}
              {% if reboot_nodes | length > 0 %}

              -> REBOOT FAILED NODES ({{ reboot_nodes | length }})
              ─────────────────────────────────────────────────────────────────
              {{ reboot_nodes | map(attribute='hostname') | join(', ') }}
              {% endif %}
              {% if ssh_nodes | length > 0 %}

              -> SSH FAILURES ({{ ssh_nodes | length }})
              ─────────────────────────────────────────────────────────────────
              {{ ssh_nodes | map(attribute='hostname') | join(', ') }}
              {% endif %}
              {% if sinfo_nodes | length > 0 %}

              -> SINFO FAILURES ({{ sinfo_nodes | length }})
              ─────────────────────────────────────────────────────────────────
              {{ sinfo_nodes | map(attribute='hostname') | join(', ') }}
              {% endif %}

              -> NEXT STEPS
              ─────────────────────────────────────────────────────────────────
              {% if unreachable_nodes | length > 0 %}
              UNREACHABLE NODES:
                - Check network connectivity: ping {{ unreachable_nodes[0].hostname }}
                - Check firewall rules and SSH port (22) accessibility
                - Manually power cycle if necessary
                - Re-run rollback playbook after fixing connectivity

              {% endif %}
              {% if reboot_nodes | length > 0 %}
              REBOOT FAILURES:
                - SSH into node and check: journalctl -xe
                - Verify disk space: df -h
                - Check for hung processes: ps aux | grep -i defunct
                - Manually reboot: shutdown -r now

              {% endif %}
              {% if ssh_nodes | length > 0 %}
              SSH CONNECTIVITY ISSUES:
                - Verify SSH service is running: systemctl status sshd

              {% endif %}
              {% if sinfo_nodes | length > 0 %}
              SLURM SERVICE FAILURES:
                - Check Slurm daemon status: systemctl status <slurm_service>
                - Review Slurm logs: journalctl -u <slurm_service> -n 100
                - Restart Slurm daemon: systemctl restart <slurm_service>
                - Verify Slurm config: sinfo -R

              {% endif %}

        - name: Fail with failure report
          ansible.builtin.fail:
            msg: "[ROLLBACK] Slurm rollback failed. Review the report above and re-run after remediation."

    - name: Generate and display success report
      ansible.builtin.pause:
        seconds: 1
        prompt: |
          ============================================================
          [ROLLBACK] SLURM ROLLBACK — ALL NODES VERIFIED SUCCESSFULLY
          ============================================================

          Verified: {{ success_nodes | length }} / {{ slurm_nodes | length }} nodes
            ✓ Reboot complete | SSH active | Slurm (sinfo) responding on all nodes

          Cluster is ready for workload submission!
          ============================================================
      when: not slurm_rollback_failed

    - name: Remove reboot state file after successful rollback
      ansible.builtin.file:
        path: /opt/omnia/.data/slurm_rollback_reboot_state.yml
        state: absent
      when: not slurm_rollback_failed

    - name: Mark slurm rollback as completed
      ansible.builtin.copy:
        content: >-
          {{ rollback_manifest | combine({
               'component_status': rollback_manifest.component_status | combine({
                 component_name: 'completed'
               })
             }) | to_nice_yaml }}
        dest: "{{ rollback_manifest_path }}"
        mode: '0644'

    - name: "Display rollback status completed — {{ component_name }}"
      ansible.builtin.debug:
        msg: "[ROLLBACK] Component '{{ component_name }}' — status changed to: completed"
