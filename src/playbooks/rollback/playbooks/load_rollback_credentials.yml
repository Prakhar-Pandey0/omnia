# ============================================================================
# load_rollback_credentials.yml — Decrypt and set credential facts for rollback
# ============================================================================
# Mirrors the upgrade pattern (get_config_credentials.yml) but is read-only:
# no interactive prompts, no re-encryption.  Searches for the credentials key
# in:  1) input_project_dir   2) backup_dir/input/project_default
#
# After this play the following facts are available on localhost:
#   provision_password, gitlab_root_password, postgres_user (from quadlet),
#   and all other fields from omnia_config_credentials.yml.
# ============================================================================

- name: Load rollback credentials
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    _input_dir: "{{ hostvars['localhost']['input_project_dir'] | default('/opt/omnia/input/project_default') }}"
    _backup_dir: >-
      {{ hostvars['localhost']['rollback_manifest']['backup_dir'] |
      default(hostvars['localhost']['oim_metadata']['upgrade_backup_dir'] | default('')) }}
  tasks:

    # ── Locate credentials key ────────────────────────────────────────────
    - name: Check for credentials key in input dir
      ansible.builtin.stat:
        path: "{{ _input_dir }}/.omnia_config_credentials_key"
      register: _creds_key_input

    - name: Check for credentials key in backup dir
      ansible.builtin.stat:
        path: "{{ _backup_dir }}/input/project_default/.omnia_config_credentials_key"
      register: _creds_key_backup
      when:
        - not (_creds_key_input.stat.exists | default(false))
        - _backup_dir | length > 0

    - name: Determine credentials directory
      ansible.builtin.set_fact:
        _creds_dir: >-
          {{ _input_dir
             if (_creds_key_input.stat.exists | default(false))
             else (_backup_dir ~ '/input/project_default'
                   if (_creds_key_backup.stat.exists | default(false))
                   else '') }}

    # ── Decrypt and set facts ─────────────────────────────────────────────
    - name: Decrypt and load credentials
      when: _creds_dir | trim != ''
      block:
        - name: Check if credentials file exists
          ansible.builtin.stat:
            path: "{{ _creds_dir | trim }}/omnia_config_credentials.yml"
          register: _creds_file_stat

        - name: Check if credentials file is vault-encrypted
          ansible.builtin.command:
            cmd: "head -1 {{ _creds_dir | trim }}/omnia_config_credentials.yml"
          register: _creds_head
          changed_when: false
          no_log: true
          when: _creds_file_stat.stat.exists | default(false)

        - name: Decrypt vault-encrypted credentials file
          ansible.builtin.shell:
            cmd: >
              ansible-vault decrypt
              "{{ _creds_dir | trim }}/omnia_config_credentials.yml"
              --vault-password-file "{{ _creds_dir | trim }}/.omnia_config_credentials_key"
              --output -
          register: _creds_raw
          changed_when: false
          no_log: true
          when:
            - _creds_file_stat.stat.exists | default(false)
            - "'$ANSIBLE_VAULT;' in (_creds_head.stdout | default(''))"

        - name: Read plaintext credentials file
          ansible.builtin.slurp:
            src: "{{ _creds_dir | trim }}/omnia_config_credentials.yml"
          register: _creds_plain
          no_log: true
          when:
            - _creds_file_stat.stat.exists | default(false)
            - "'$ANSIBLE_VAULT;' not in (_creds_head.stdout | default(''))"

        - name: Parse credentials
          ansible.builtin.set_fact:
            _credentials_dict: >-
              {{ (_creds_raw.stdout | from_yaml)
                 if (_creds_raw.stdout is defined)
                 else ((_creds_plain.content | b64decode | from_yaml)
                       if (_creds_plain.content is defined)
                       else {}) }}
          no_log: true

        - name: Set credential facts (matches upgrade restore_omnia_config_credentials.yml + credential utility)
          ansible.builtin.set_fact:
            provision_password: "{{ _credentials_dict.provision_password | default('') }}"
            bmc_username: "{{ _credentials_dict.bmc_username | default('') }}"
            bmc_password: "{{ _credentials_dict.bmc_password | default('') }}"
            s3_access_id: "{{ _credentials_dict.s3_access_id | default('') }}"
            s3_secret_key: "{{ _credentials_dict.s3_secret_key | default(_credentials_dict.minio_s3_password | default('')) }}"
            minio_s3_password: "{{ _credentials_dict.minio_s3_password | default('') }}"
            pulp_password: "{{ _credentials_dict.pulp_password | default('') }}"
            docker_username: "{{ _credentials_dict.docker_username | default('') }}"
            docker_password: "{{ _credentials_dict.docker_password | default('') }}"
            slurm_db_password: "{{ _credentials_dict.slurm_db_password | default('') }}"
            openldap_db_username: "{{ _credentials_dict.openldap_db_username | default('') }}"
            openldap_db_password: "{{ _credentials_dict.openldap_db_password | default('') }}"
            mysqldb_user: "{{ _credentials_dict.mysqldb_user | default('') }}"
            mysqldb_password: "{{ _credentials_dict.mysqldb_password | default('') }}"
            mysqldb_root_password: "{{ _credentials_dict.mysqldb_root_password | default('') }}"
            csi_username: "{{ _credentials_dict.csi_username | default('') }}"
            csi_password: "{{ _credentials_dict.csi_password | default('') }}"
            ldms_sampler_password: "{{ _credentials_dict.ldms_sampler_password | default('') }}"
            postgres_user: "{{ _credentials_dict.postgres_user | default('admin') }}"
            postgres_password: "{{ _credentials_dict.postgres_password | default('') }}"
            gitlab_root_password: "{{ _credentials_dict.gitlab_root_password | default('') }}"
            ome_username: "{{ _credentials_dict.ome_username | default('') }}"
            ome_password: "{{ _credentials_dict.ome_password | default('') }}"
            ufm_username: "{{ _credentials_dict.ufm_username | default('') }}"
            ufm_password: "{{ _credentials_dict.ufm_password | default('') }}"
          no_log: true

        - name: Credentials loaded successfully
          ansible.builtin.debug:
            msg: "Rollback credentials loaded from {{ _creds_dir | trim }}"

    # ── Warn if missing ───────────────────────────────────────────────────
    - name: Warn if credentials unavailable
      ansible.builtin.debug:
        msg: >-
          WARNING: .omnia_config_credentials_key not found in input dir or backup.
          provision_password and other credentials unavailable.
          Components requiring SSH access (GitLab) will be skipped.
      when: _creds_dir | trim == ''
