---
# Upgrade existing BuildStream installation (services were enabled in 2.1)
# Reuses prepare_oim/roles/deploy_containers/{postgres,build_stream} for deployment

- name: Display upgrade start banner
  ansible.builtin.debug:
    msg:
      - "============================================================"
      - "  Upgrading Existing BuildStream Installation"
      - "============================================================"
      - "BuildStream was enabled in 2.1 — performing in-place upgrade"

# ══════════════════════════════════════════════════════════════════
# Step 1: Backup existing configuration and database
# ══════════════════════════════════════════════════════════════════

- name: Create BuildStream backup directory
  ansible.builtin.file:
    path: "{{ hostvars['localhost']['backup_path_from_oim'] }}/buildstream"
    state: directory
    mode: '0755'

- name: Backup BuildStream quadlet
  ansible.builtin.copy:
    src: "{{ quadlet_dir }}/omnia_build_stream.container"
    dest: "{{ hostvars['localhost']['backup_path_from_oim'] }}/buildstream/omnia_build_stream.container.bak"
    remote_src: true
    mode: '0644'
  failed_when: false

- name: Backup Postgres quadlet
  ansible.builtin.copy:
    src: "{{ quadlet_dir }}/omnia_postgres.container"
    dest: "{{ hostvars['localhost']['backup_path_from_oim'] }}/buildstream/omnia_postgres.container.bak"
    remote_src: true
    mode: '0644'
  failed_when: false

- name: Backup Postgres database
  ansible.builtin.shell: |
    set -o pipefail
    podman exec omnia_postgres pg_dump -U {{ hostvars['localhost']['postgres_user'] }} \
      {{ postgres_db_name }} > {{ hostvars['localhost']['backup_path_from_oim'] }}/buildstream/buildstream_db_backup.sql
  register: pg_backup
  failed_when: false
  changed_when: pg_backup.rc == 0

- name: Backup BuildStream source directory
  ansible.builtin.copy:
    src: "{{ oim_shared_path | default('/opt') }}/omnia/build_stream"
    dest: "{{ hostvars['localhost']['backup_path_from_oim'] }}/buildstream/"
    remote_src: true
    mode: preserve
  failed_when: false

# ══════════════════════════════════════════════════════════════════
# Step 2: Re-deploy Postgres via prepare_oim role (idempotent)
# ══════════════════════════════════════════════════════════════════

- name: Deploy Postgres container (reuse build_stream role)  # noqa:role-name[path]
  ansible.builtin.include_role:
    name: "{{ playbook_dir }}/../../../build_stream/roles/postgres"

# ══════════════════════════════════════════════════════════════════
# Step 3: Refresh automation venv (2.1 venv may lack 2.2 deps)
# ══════════════════════════════════════════════════════════════════

- name: Remove stale automation venv so deploy role recreates it
  ansible.builtin.file:
    path: /opt/omnia/automation/.venv
    state: absent

# ══════════════════════════════════════════════════════════════════
# Step 4: Re-deploy BuildStream via prepare_oim role
# (handles: stop, SSL, JWT, quadlet, start, Alembic, firewall, health)
# ══════════════════════════════════════════════════════════════════

- name: Deploy BuildStream container (reuse build_stream role)  # noqa:role-name[path]
  ansible.builtin.include_role:
    name: "{{ playbook_dir }}/../../../build_stream/roles/deploy_bsm"
