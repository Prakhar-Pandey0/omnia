# ────────────────────────────────────────────────────────────────────────
# Collect a single CI/CD pipeline file action for the batched upgrade commit.
# Called in a loop from gitlab_config_upgrade.yml with loop_var: _ci_file_name
#
# Instead of committing each file individually, this task reads the file
# content and checks whether it already exists in the repo, then appends
# a create/update action to the _upgrade_commit_actions list.  The caller
# makes a single commit with all collected actions.
#
# Required variables (set by caller):
#   _ci_file_name              — filename (e.g. .gitlab-ci-build.yml)
#   gitlab_role_path           — path to hosted_gitlab role
#   gitlab_external_url_computed — GitLab base URL
#   gitlab_project_id          — numeric project ID
#   gitlab_root_token          — API personal access token
#   gitlab_default_branch      — target branch (e.g. main)
#   _upgrade_commit_actions    — list accumulator (initialized by caller)
# ────────────────────────────────────────────────────────────────────────
---

- name: Read 2.2 version of CI file
  ansible.builtin.slurp:
    src: "{{ gitlab_role_path }}/files/{{ _ci_file_name }}"
  register: _ci_file_content

- name: Build API URL for CI file check
  ansible.builtin.set_fact:
    _ci_file_api_url: >-
      {{ gitlab_external_url_computed }}/api/v4/projects/{{ gitlab_project_id
      }}/repository/files/{{ _ci_file_name | urlencode }}?ref={{ gitlab_default_branch }}

- name: Check if CI file exists in repository
  ansible.builtin.uri:
    url: "{{ _ci_file_api_url }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_root_token }}"
    validate_certs: false
    status_code: [200, 404]
  register: _ci_file_check
  no_log: true

- name: Collect CI file action for batched commit
  ansible.builtin.set_fact:
    _upgrade_commit_actions: >-
      {{ _upgrade_commit_actions | default([]) + [{
        'action': 'update' if _ci_file_check.status == 200 else 'create',
        'file_path': _ci_file_name,
        'content': _ci_file_content.content | b64decode,
        'encoding': 'text'
      }] }}
