---
# ============================================================================
# Migrate from old 2.1 StatefulSet to operator-managed CRs
# PVC relabeling preserves data on the existing PV.
# NOTE: This path involves DOWNTIME (single-node → operator migration).
# ============================================================================

# Only runs when victoria_migration_type == 'statefulset_to_operator'
# old_sts_found and actual_old_statefulset are set by detect_victoria_state.yml

- name: Execute StatefulSet migration
  block:
    # ── Stop write path ──
    - name: Check if old vmagent deployment exists
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} get deployment {{ old_vmagent_deployment }} --no-headers 2>/dev/null && echo "found" || echo "not_found"
      register: old_agent_check
      changed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Scale down old vmagent (stop writes)
      ansible.builtin.command:
        cmd: kubectl -n {{ telemetry_namespace }} scale deployment {{ old_vmagent_deployment }} --replicas=0
      when: "'found' in old_agent_check.stdout"
      changed_when: true
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Wait for old vmagent pods to terminate
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n {{ telemetry_namespace }} get pods -l {{ old_vmagent_pod_label }} --no-headers 2>/dev/null | wc -l
      register: agent_pod_count
      until: (agent_pod_count.stdout | trim | int) == 0
      retries: 60
      delay: 2
      changed_when: false
      when: "'found' in old_agent_check.stdout"
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    # ── Flush vmstorage data before shutdown ──
    # Create snapshots on each vmstorage pod to force pending data/indexdb flush.
    # This prevents corrupted parts.json from in-flight merges during shutdown.
    - name: Get old vmstorage pod names
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n {{ telemetry_namespace }} get pods -l {{ old_vm_pod_label }} --no-headers 2>/dev/null \
          | grep -i "storage\|vmstorage" | awk '{print $1}'
      register: old_vmstorage_pods
      changed_when: false
      failed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Force snapshot on each vmstorage pod (flush pending writes)
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} exec {{ item }} -- \
          wget -q -O- --no-check-certificate "https://localhost:8482/snapshot/create" 2>/dev/null || \
        kubectl -n {{ telemetry_namespace }} exec {{ item }} -- \
          wget -q -O- "http://localhost:8482/snapshot/create" 2>/dev/null || true
      loop: "{{ old_vmstorage_pods.stdout_lines | default([]) }}"
      changed_when: false
      failed_when: false
      when: old_vmstorage_pods.stdout_lines | default([]) | length > 0
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Wait for background merges to settle after writes stopped
      ansible.builtin.pause:
        seconds: 30
        prompt: "{{ vmstorage_merge_wait_msg }}"

    # ── Ensure sufficient graceful shutdown period ──
    # Old StatefulSet may have default 30s which is too short for indexdb flush
    - name: Patch old StatefulSet terminationGracePeriodSeconds to 120s
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} patch statefulset {{ actual_old_statefulset }} \
          -p '{"spec":{"template":{"spec":{"terminationGracePeriodSeconds":120}}}}'
      changed_when: true
      failed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    # ── Graceful shutdown of old StatefulSet ──
    - name: Scale down old StatefulSet
      ansible.builtin.command:
        cmd: kubectl -n {{ telemetry_namespace }} scale statefulset {{ actual_old_statefulset }} --replicas=0
      changed_when: true
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Wait for scale down to complete
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} get statefulset {{ actual_old_statefulset }} -o jsonpath='{.spec.replicas}'
      register: sts_replicas
      until: sts_replicas.stdout | trim == '0'
      retries: 60
      delay: 2
      changed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Wait for old Victoria pods to terminate
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n {{ telemetry_namespace }} get pods -l {{ old_vm_pod_label }} --no-headers 2>/dev/null | wc -l
      register: sts_pod_count
      until: (sts_pod_count.stdout | trim | int) == 0
      retries: 90
      delay: 2
      changed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Wait for storage cache flush after pod termination
      ansible.builtin.pause:
        seconds: 15
        prompt: "{{ storage_cache_flush_msg }}"

    # ── PVC relabeling (data preservation via PV rebind) ──
    - name: Get all old PVCs from StatefulSet (using specific StatefulSet label)
      ansible.builtin.command:
        cmd: kubectl -n {{ telemetry_namespace }} get pvc -l {{ old_vm_pod_label }} -o jsonpath='{.items[*].metadata.name}'
      register: old_pvc_list
      changed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Display PVCs to migrate
      ansible.builtin.debug:
        msg: "{{ victoria_migrating_pvcs }}"

    - name: Delete old StatefulSet (orphan cascade — preserves PVCs)
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} delete statefulset {{ actual_old_statefulset }} --cascade=orphan --timeout=60s
      register: old_sts_delete
      changed_when: true
      failed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Verify old StatefulSet was deleted
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} get statefulset {{ actual_old_statefulset }} --no-headers 2>/dev/null && echo "exists" || echo "not_exists"
      register: old_sts_check_after_delete
      changed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Force delete old StatefulSet if still exists
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} delete statefulset {{ actual_old_statefulset }} --force --grace-period=0 --cascade=orphan
      register: old_sts_force_delete
      changed_when: true
      failed_when: false
      when: old_sts_check_after_delete.stdout | trim == 'exists'
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Re-verify old StatefulSet after force delete
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} get statefulset {{ actual_old_statefulset }} --no-headers 2>/dev/null && echo "exists" || echo "not_exists"
      register: old_sts_check_after_force_delete
      changed_when: false
      when: old_sts_check_after_delete.stdout | trim == 'exists'
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      until: "'not_exists' in old_sts_check_after_force_delete.stdout"
      retries: 10
      delay: 30

    - name: Fail if old StatefulSet still exists after force delete
      ansible.builtin.fail:
        msg: "{{ victoria_sts_force_delete_failed }}"
      when: (old_sts_check_after_force_delete.stdout | default('not_exists') | trim) == 'exists'

    - name: Relabel each PVC
      ansible.builtin.include_tasks: relabel_pvc.yml
      loop: "{{ old_pvc_list.stdout.split() | select() | list }}"
      loop_control:
        loop_var: old_pvc_item
      when: old_pvc_list.stdout | trim | length > 0

    - name: Find orphaned old pods (left by --cascade=orphan delete)
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n {{ telemetry_namespace }} get pods \
          -l "app in (vminsert,vmselect,vmstorage)" --no-headers 2>/dev/null | awk '{print $1}'
      register: orphaned_pods
      changed_when: false
      failed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Delete orphaned old pods
      ansible.builtin.command:
        cmd: kubectl -n {{ telemetry_namespace }} delete pod {{ item }}
      loop: "{{ orphaned_pods.stdout_lines | default([]) }}"
      changed_when: true
      failed_when: false
      when: orphaned_pods.stdout_lines | default([]) | length > 0
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    # ── Capture LoadBalancer IPs before deletion ──
    # Preserve existing IPs to prevent MetalLB from assigning new ones
    # Only applicable for statefulset_to_operator migration path
    - name: Get vminsert LoadBalancer IP
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} get svc vminsert -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo ""
      register: old_vminsert_ip
      changed_when: false
      failed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Get vmselect LoadBalancer IP
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} get svc vmselect -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo ""
      register: old_vmselect_ip
      changed_when: false
      failed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Set LoadBalancer IP facts for preservation
      ansible.builtin.set_fact:
        preserved_vminsert_ip: "{{ old_vminsert_ip.stdout | trim }}"
        preserved_vmselect_ip: "{{ old_vmselect_ip.stdout | trim }}"

    - name: Display preserved LoadBalancer IPs
      ansible.builtin.debug:
        msg:
          - "Preserving vminsert IP: {{ preserved_vminsert_ip if preserved_vminsert_ip else 'None' }}"
          - "Preserving vmselect IP: {{ preserved_vmselect_ip if preserved_vmselect_ip else 'None' }}"

    # ── Cleanup old pre-operator services and deployments ──
    # The operator creates new services with different names (e.g. vminsert-victoria-cluster),
    # so the old standalone services become stale and waste LoadBalancer IPs.
    # Old services MUST be deleted BEFORE applying VMCluster CR so MetalLB can
    # assign the same IPs to the new operator-managed services via loadBalancerIP.
    - name: Find old pre-operator services
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n {{ telemetry_namespace }} get svc --no-headers 2>/dev/null \
          | awk '{print $1}' \
          | grep -xE 'vminsert|vmselect|vmstorage|vmagent' || true
      register: old_services
      changed_when: false
      failed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Delete old pre-operator services
      ansible.builtin.command:
        cmd: kubectl -n {{ telemetry_namespace }} delete svc {{ item }} --timeout=30s
      loop: "{{ old_services.stdout_lines | default([]) | select() | list }}"
      changed_when: true
      failed_when: false
      when: old_services.stdout_lines | default([]) | select() | list | length > 0
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Delete old vmagent deployment (replaced by operator-managed VMAgent)
      ansible.builtin.shell: |
        kubectl -n {{ telemetry_namespace }} get deployment {{ old_vmagent_deployment }} --no-headers 2>/dev/null && \
        kubectl -n {{ telemetry_namespace }} delete deployment {{ old_vmagent_deployment }} --timeout=60s || true
      changed_when: true
      failed_when: false
      delegate_to: "{{ kube_vip }}"
      connection: ssh

    - name: Display old resource cleanup summary
      ansible.builtin.debug:
        msg: "{{ victoria_old_svc_cleanup_summary }}"
        verbosity: 2
