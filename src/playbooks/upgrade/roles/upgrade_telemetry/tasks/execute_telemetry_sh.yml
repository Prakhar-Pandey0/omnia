---
# execute_telemetry_sh_upgrade.yml
# Execute the telemetry.sh script on the kube_vip node.
# This script redeploys and applies all telemetry deployment files
# (Helm charts for operators + kubectl apply -k for kustomize resources).
# After execution, wait for all telemetry pods to come up and generate a report.
#
# Required variables (set by calling playbook):
#   - kube_vip
#   - k8s_client_mount_path
#   - telemetry_script_path, telemetry_kustomization_dir (from role vars)

- name: Verify telemetry deployment artifacts on kube_vip
  block:
    - name: Verify telemetry.sh exists on kube_vip
      ansible.builtin.stat:
        path: "{{ telemetry_script_path }}"
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: telemetry_sh_stat

    - name: Fail if telemetry.sh is missing
      ansible.builtin.fail:
        msg: "{{ telemetry_sh_missing_msg }}"
      when: not (telemetry_sh_stat.stat.exists | default(false))

    - name: Verify kustomization.yaml exists in deployments directory
      ansible.builtin.stat:
        path: "{{ telemetry_kustomization_dir }}/kustomization.yaml"
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: kustomization_stat

    - name: Fail if kustomization.yaml is missing
      ansible.builtin.fail:
        msg: "{{ kustomization_missing_msg }}"
      when: not (kustomization_stat.stat.exists | default(false))

- name: Execute telemetry.sh and validate deployment
  block:
    # ── Pre-patch: Increase terminationGracePeriodSeconds for MySQL graceful shutdown ──
    - name: Patch idrac-telemetry StatefulSet for MySQL safety on NFS
      ansible.builtin.include_tasks: patch_idrac_termination_grace_period.yml

    - name: Display telemetry pods before upgrade
      ansible.builtin.command:
        cmd: kubectl get pods -n {{ telemetry_namespace }}
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: pods_before_upgrade
      changed_when: false

    - name: Display pods output
      ansible.builtin.debug:
        msg: "{{ pods_before_upgrade.stdout_lines }}"

    # ── Execute telemetry.sh ──
    - name: Execute telemetry.sh on kube_vip
      ansible.builtin.command:
        cmd: bash {{ telemetry_script_path }}
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: telemetry_sh_result
      changed_when: true
      timeout: 900
      failed_when: false
      retries: 2
      delay: 30
      until: >
        telemetry_sh_result.rc == 0 or
        (telemetry_sh_result.stderr is not search('Failed to find required executable') and
         telemetry_sh_result.stderr is not search('podman.*not found'))

    - name: Check if telemetry.sh failed due to Helm errors
      ansible.builtin.set_fact:
        telemetry_sh_helm_error: >-
          {{ telemetry_sh_result.stderr is search('cannot re-use a name') or
             telemetry_sh_result.stderr is search('INSTALLATION FAILED') }}
      when: telemetry_sh_result.rc != 0

    - name: Display Helm error but continue (StatefulSet already updated via patch)
      ansible.builtin.debug:
        msg: "{{ telemetry_sh_helm_skip_msg }}"
      when:
        - telemetry_sh_result.rc != 0
        - telemetry_sh_helm_error | default(false)

    - name: Fail telemetry.sh for non-Helm errors
      ansible.builtin.fail:
        msg: "{{ telemetry_sh_non_helm_error_msg }}"
      when:
        - telemetry_sh_result.rc != 0
        - not (telemetry_sh_helm_error | default(false))

    - name: Display telemetry.sh output
      ansible.builtin.debug:
        msg: "{{ telemetry_sh_result.stdout_lines }}"

    # ── Restore original replica count after upgrade ──
    - name: Scale idrac-telemetry back to original replica count
      ansible.builtin.command:
        cmd: kubectl scale statefulset idrac-telemetry -n {{ telemetry_namespace }} --replicas={{ idrac_replica_count.stdout }}
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: restore_replicas_result
      changed_when: true
      when:
        - idrac_sts_check.rc == 0
        - idrac_replica_count.stdout | int > 0

    - name: Wait for replica scale to complete
      ansible.builtin.command:
        cmd: kubectl rollout status statefulset idrac-telemetry -n {{ telemetry_namespace }} --timeout=300s
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      changed_when: false
      failed_when: false
      register: rollout_scale_result
      retries: "{{ idrac_rollout_retries }}"
      delay: "{{ idrac_rollout_delay }}"
      until: rollout_scale_result.rc == 0
      when:
        - idrac_sts_check.rc == 0
        - idrac_replica_count.stdout | int > 0
        - restore_replicas_result.changed | default(false)

    - name: Fail if idrac-telemetry rollout did not complete after retries
      ansible.builtin.fail:
        msg: "{{ idrac_rollout_fail_msg }}"
      when:
        - rollout_scale_result is defined
        - rollout_scale_result.rc | default(0) != 0

    - name: Display replica restore status
      ansible.builtin.debug:
        msg: "{{ idrac_replica_restore_msg }}"
      when:
        - idrac_sts_check.rc == 0
        - idrac_replica_count.stdout | int > 0

    - name: Wait for all telemetry pods to be ready
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          kubectl get pods -n {{ telemetry_namespace }} --no-headers \
            | grep -v 'Completed' \
            | awk '{print $3}' \
            | grep -v 'Running' \
            | wc -l
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: pods_not_ready
      until: pods_not_ready.stdout | int == 0
      retries: "{{ pod_wait_retries }}"
      delay: "{{ pod_wait_delay }}"
      changed_when: false
      failed_when: false

    # ── Post-deployment validation: Check for MySQL issues ──
    - name: Check idrac-telemetry pod container status after deployment
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          kubectl get pods -n {{ telemetry_namespace }} -l app=idrac-telemetry \
            --no-headers \
            -o custom-columns=NAME:.metadata.name,PHASE:.status.phase,CONTAINER_STATUSES:.status.containerStatuses[*].state.waiting.reason \
            2>/dev/null || true
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: idrac_pod_status_check
      changed_when: false
      failed_when: false

    - name: Display idrac-telemetry pod status
      ansible.builtin.debug:
        msg: "idrac-telemetry pod status: {{ idrac_pod_status_check.stdout }}"
      when: idrac_pod_status_check.stdout | default('') != ""

    - name: Fail if idrac-telemetry MySQL container is in CrashLoopBackOff
      ansible.builtin.fail:
        msg: "{{ mysql_crash_error_msg }}"
      when:
        - idrac_pod_status_check.stdout | default('') != ""
        - "'CrashLoopBackOff' in idrac_pod_status_check.stdout"

    - name: Generate telemetry pod status report
      ansible.builtin.command:
        cmd: kubectl get pods -n {{ telemetry_namespace }} -o wide
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: pod_status_report
      changed_when: false

    - name: Display telemetry pod status report
      ansible.builtin.debug:
        msg: "{{ pod_status_report.stdout_lines }}"

    - name: Generate telemetry services report
      ansible.builtin.command:
        cmd: kubectl get svc -n {{ telemetry_namespace }}
      delegate_to: "{{ kube_vip }}"
      connection: ssh
      register: svc_status_report
      changed_when: false

    - name: Display telemetry services report
      ansible.builtin.debug:
        msg: "{{ svc_status_report.stdout_lines }}"

    - name: Fail if some pods are not ready
      ansible.builtin.fail:
        msg: "{{ pods_not_ready_detailed_msg }}"
      when: pods_not_ready.stdout | int > 0

    - name: Display telemetry.sh success
      ansible.builtin.debug:
        msg: "{{ telemetry_sh_success_msg }}"

  rescue:
    - name: Display actual failing task details
      ansible.builtin.debug:
        msg:
          - "Telemetry deployment failed during post-deployment validation."
          - "Failed task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure reason: {{ ansible_failed_result.msg | default(ansible_failed_result.stderr | default('unknown')) }}"
          - "telemetry.sh rc: {{ telemetry_sh_result.rc | default('N/A') }}"

    - name: Fail the telemetry upgrade
      ansible.builtin.fail:
        msg: >-
          Telemetry deployment failed at task '{{ ansible_failed_task.name | default('unknown') }}':
          {{ ansible_failed_result.msg | default(ansible_failed_result.stderr | default('See error details above.')) }}
