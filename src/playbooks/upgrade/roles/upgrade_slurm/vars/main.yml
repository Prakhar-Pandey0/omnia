---

mounted_dir_perm: "0755"
default_client_mount_options: "nosuid,rw,sync,hard,intr"
slurm_nfs_fail_msg: "Failed to mount NFS share. Please check if the NFS server is reachable or NFS is configured properly."
oim_metadata_path: "/opt/omnia/.data/oim_metadata.yml"
backup_slurm_nfs_contents: true # To create a copy of all slurm contents on the nfs share
input_project_dir: "{{ hostvars['localhost']['input_project_dir'] | default('/opt/omnia/input/project_default') }}"
oim_nfs_fail_msg: "Failed to mount NFS on oim"
hpc_tools_tracking_files:
  - /hpc_tools/.done_cuda
  - /hpc_tools/cuda/bin/nvcc
