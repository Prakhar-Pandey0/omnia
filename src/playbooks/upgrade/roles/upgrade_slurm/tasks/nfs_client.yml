---
## Mount an entry on the OIM node.
- name: Resolve mount_params profile if specified
  ansible.builtin.set_fact:
    resolved_mount_profile: "{{ storage_config.mount_params[item.mount_params] | default({}, true) }}"
  when: item.mount_params is defined and item.mount_params in storage_config.mount_params

- name: Initialize client mount path (new schema)
  ansible.builtin.set_fact:
    mount_point: "{{ item.mount_point }}"
    source: "{{ item.source }}"
    fs_type: "{{ item.fs_type | default(resolved_mount_profile.fs_type | default('nfs')) }}"
    mnt_opts: "{{ item.mnt_opts | default(resolved_mount_profile.mnt_opts | default('defaults')) }}"
    dump_freq: "{{ item.dump_freq | default(resolved_mount_profile.dump_freq | default('0')) }}"
    fsck_pass: "{{ item.fsck_pass | default(resolved_mount_profile.fsck_pass | default('0')) }}"

- name: Create the directory for mounting on OIM
  ansible.builtin.file:
    path: "{{ mount_point }}"
    state: directory
    mode: "0644"
  register: dir_check
  ignore_errors: true

- name: Fallback to tcp nfs if rdma
  ansible.builtin.set_fact:
    mnt_opts: "nosuid,rw,sync,hard"
  when: "'rdma' in mnt_opts"

- name: Mount NFS share on OIM with fstab entry
  block:
    - name: Add/ensure fstab entry via mount module
      ansible.posix.mount:
        src: "{{ source }}"
        path: "{{ mount_point }}"
        opts: "{{ mnt_opts }}"
        state: mounted
        fstype: "{{ fs_type }}"

    - name: Mount current share explicitly for immediate availability # noqa: command-instead-of-module
      ansible.builtin.command: >
        mount -t {{ fs_type }} -o {{ mnt_opts }} {{ source }} {{ mount_point }}
      register: oim_mount_result
      changed_when: oim_mount_result.rc == 0
      failed_when: oim_mount_result.rc != 0

  rescue:
    - name: Remove from fstab on failure
      ansible.posix.mount:
        path: "{{ mount_point }}"
        state: absent_from_fstab

    - name: Fail if OIM mount failed
      ansible.builtin.fail:
        msg: "{{ oim_nfs_fail_msg }}"
