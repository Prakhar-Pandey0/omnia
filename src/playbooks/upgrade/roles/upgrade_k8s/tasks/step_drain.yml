---
- name: Get all PDBs in cluster
  ansible.builtin.command:
    cmd: kubectl get pdb -A -o json
  delegate_to: "{{ kube_vip }}"
  register: _pdb_list
  changed_when: false
  failed_when: false

- name: Parse PDB list and backup numeric minAvailable values
  ansible.builtin.set_fact:
    _pdbs_with_minavailable: >-
      {{
        (
          _pdb_list.stdout
          | from_json
          | json_query(
              'items[?spec.minAvailable].{
                name: metadata.name,
                namespace: metadata.namespace,
                minAvailable: spec.minAvailable,
                matchLabels: spec.selector.matchLabels
              }'
            )
        )
        | selectattr('minAvailable', 'number')
        | list
      }}
  when: _pdb_list.rc == 0

- name: Debug PDB inputs
  ansible.builtin.debug:
    msg:
      node_ip: "{{ node_ip }}"
      pdbs_found: "{{ _pdbs_with_minavailable | default([]) }}"

- name: Initialize pdb patch list
  ansible.builtin.set_fact:
    _pdbs_to_patch: []

- name: Build label selector string for each PDB
  ansible.builtin.set_fact:
    _pdb_label_selectors: >-
      {{
        _pdb_label_selectors | default({})
        | combine({
            item.namespace ~ '/' ~ item.name:
              (
                item.matchLabels | default({}, true)
                | dictsort
                | map('join', '=')
                | join(',')
              )
          })
      }}
  loop: "{{ _pdbs_with_minavailable }}"
  loop_control:
    label: "{{ item.namespace }}/{{ item.name }}"

- name: Find pods matching each PDB on node
  ansible.builtin.command:
    cmd: >-
      kubectl get pods
      -n {{ item.namespace }}
      --field-selector spec.nodeName={{ node_ip }}
      -l "{{ _pdb_label_selectors[item.namespace ~ '/' ~ item.name] }}"
      -o json
  delegate_to: "{{ kube_vip }}"
  register: _matching_pods
  loop: "{{ _pdbs_with_minavailable }}"
  loop_control:
    label: "{{ item.namespace }}/{{ item.name }}"
  changed_when: false
  failed_when: false

- name: Debug kubectl pod query results
  ansible.builtin.debug:
    msg:
      pdb: "{{ item.item.namespace }}/{{ item.item.name }}"
      rc: "{{ item.rc }}"
      stdout_snippet: "{{ (item.stdout | default(''))[:200] }}"
      stderr: "{{ item.stderr | default('') }}"
  loop: "{{ _matching_pods.results }}"
  loop_control:
    label: "{{ item.item.namespace }}/{{ item.item.name }}"

- name: Build list of PDBs requiring temporary patch
  ansible.builtin.set_fact:
    _pdbs_to_patch: "{{ _pdbs_to_patch + [pdb_patch_item] }}"
  vars:
    pods_on_node_count: >-
      {{
        (
          item.stdout
          | default('{"items":[]}')
          | from_json
        )["items"]
        | length
        | int
      }}

    original_min: >-
      {{
        item.item.minAvailable
        | int
      }}

    new_min_available: >-
      {{
        [
          (
            original_min | int
          ) - (
            pods_on_node_count | int
          ),
          0
        ] | max
      }}

    pdb_patch_item:
      name: "{{ item.item.name }}"
      namespace: "{{ item.item.namespace }}"
      original_minAvailable: "{{ original_min }}"
      new_minAvailable: "{{ new_min_available }}"
      pods_on_node: "{{ pods_on_node_count }}"

  loop: "{{ _matching_pods.results }}"
  loop_control:
    label: "{{ item.item.namespace }}/{{ item.item.name }}"
  when:
    - item.rc == 0
    - pods_on_node_count | int > 0

- name: Debug PDB patch list
  ansible.builtin.debug:
    var: _pdbs_to_patch

- name: Temporarily reduce PDB minAvailable to allow drain
  ansible.builtin.command:
    cmd: >-
      kubectl patch pdb {{ item.name }}
      -n {{ item.namespace }}
      --type merge
      -p '{"spec":{"minAvailable":{{ item.new_minAvailable }}}}'
  delegate_to: "{{ kube_vip }}"
  loop: "{{ _pdbs_to_patch }}"
  loop_control:
    label: >-
      {{ item.namespace }}/{{ item.name }}
      ({{ item.original_minAvailable }}
      -> {{ item.new_minAvailable }},
      {{ item.pods_on_node }} pods)
  register: _pdb_patch
  changed_when: true
  failed_when: false
  when:
    - _pdbs_to_patch is defined
    - _pdbs_to_patch | length > 0

- name: Drain node - {{ current_node_name }}
  ansible.builtin.command:
    cmd: >-
      kubectl drain {{ node_ip }}
      --ignore-daemonsets
      --delete-emptydir-data
      --timeout=300s
  delegate_to: "{{ kube_vip }}"
  register: drain_result
  changed_when: true

- name: Restore PDB minAvailable to original values
  ansible.builtin.command:
    cmd: >-
      kubectl patch pdb {{ item.name }}
      -n {{ item.namespace }}
      --type merge
      -p '{"spec":{"minAvailable":{{ item.original_minAvailable }}}}'
  delegate_to: "{{ kube_vip }}"
  loop: "{{ _pdbs_to_patch }}"
  loop_control:
    label: "{{ item.namespace }}/{{ item.name }}"
  changed_when: true
  failed_when: false
  when:
    - _pdbs_to_patch is defined
    - _pdbs_to_patch | length > 0
