---
# ============================================================================
# PowerScale CSI Driver Upgrade Execution
# ============================================================================
# Purpose: Execute PowerScale CSI driver upgrade and validate
#
# This task file:
#   - Runs the upgrade command using csi-install.sh
#   - Waits for controller pods to become ready
#   - Waits for node daemonset to become ready
#   - Verifies all StorageClasses are intact
#   - Verifies all PVCs are intact
# ============================================================================

# ───────────────────────────────────────────────────────────────────────────
# Step 1: Run PowerScale CSI driver upgrade
# ───────────────────────────────────────────────────────────────────────────
- name: Display PowerScale upgrade start message
  ansible.builtin.debug:
    msg: "{{ msg_powerscale_upgrade_start }}"

- name: Execute PowerScale CSI driver upgrade
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      cd {{ powerscale_cluster_version_dir }}/dell-csi-helm-installer
      ./csi-install.sh \
        --namespace {{ powerscale_namespace }} \
        --values {{ powerscale_cluster_values_file }} \
        --skip-verify \
        --upgrade 2>&1 | tee /tmp/powerscale_upgrade_{{ powerscale_target_version }}.log
    executable: /bin/bash
  register: powerscale_upgrade_result
  changed_when: true
  async: 600
  poll: 0

- name: Wait for PowerScale upgrade to complete
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.async_status:
    jid: "{{ powerscale_upgrade_result.ansible_job_id }}"
  register: powerscale_upgrade_job
  until: powerscale_upgrade_job.finished
  retries: 60
  delay: 10
  failed_when: false

- name: Check if upgrade command succeeded
  ansible.builtin.fail:
    msg: "{{ msg_powerscale_upgrade_failed }}"
  when: powerscale_upgrade_job.rc | default(1) != 0

- name: Display upgrade success message
  ansible.builtin.debug:
    msg: "{{ msg_powerscale_upgrade_success }}"

# ───────────────────────────────────────────────────────────────────────────
# Step 2: Wait for controller pods to become ready
# ───────────────────────────────────────────────────────────────────────────
- name: Wait for PowerScale controller pods to be ready
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get pods -n {{ powerscale_namespace }} -l app=isilon-controller -o json | \
        jq -r '.items[] | select(.status.phase=="Running" and
        (.status.conditions[] | select(.type=="Ready" and .status=="True"))) | .metadata.name' | wc -l
    executable: /bin/bash
  register: powerscale_controller_ready_count
  until: powerscale_controller_ready_count.stdout | int >= 1
  retries: 30
  delay: 10
  changed_when: false

- name: Display controller pods status
  ansible.builtin.debug:
    msg: "PowerScale controller pods ready: {{ powerscale_controller_ready_count.stdout }}"

# ───────────────────────────────────────────────────────────────────────────
# Step 3: Wait for node daemonset to become ready
# ───────────────────────────────────────────────────────────────────────────
- name: Get PowerScale node daemonset status
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: kubectl get daemonset isilon-node -n {{ powerscale_namespace }} -o json
  register: powerscale_node_ds_status
  changed_when: false

- name: Parse daemonset status
  ansible.builtin.set_fact:
    powerscale_ds_desired: "{{ (powerscale_node_ds_status.stdout | from_json).status.desiredNumberScheduled }}"
    powerscale_ds_ready: "{{ (powerscale_node_ds_status.stdout | from_json).status.numberReady }}"

- name: Wait for PowerScale node daemonset to be ready
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: kubectl get daemonset isilon-node -n {{ powerscale_namespace }} -o json
  register: powerscale_node_ds_wait
  until: >
    (powerscale_node_ds_wait.stdout | from_json).status.numberReady ==
    (powerscale_node_ds_wait.stdout | from_json).status.desiredNumberScheduled
  retries: 30
  delay: 10
  changed_when: false

- name: Display node daemonset status
  ansible.builtin.debug:
    msg: "PowerScale node daemonset ready: {{ powerscale_ds_ready }}/{{ powerscale_ds_desired }}"

# ───────────────────────────────────────────────────────────────────────────
# Step 4: Verify StorageClasses are intact
# ───────────────────────────────────────────────────────────────────────────
- name: Get all StorageClasses
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: kubectl get sc -o json
  register: storageclasses_json
  changed_when: false

- name: Parse StorageClasses
  ansible.builtin.set_fact:
    storageclasses_list: "{{ storageclasses_json.stdout | from_json }}"

- name: Check if PowerScale StorageClass exists
  ansible.builtin.set_fact:
    powerscale_sc_exists: "{{ storageclasses_list['items'] | selectattr('provisioner', 'equalto', 'csi-isilon.dellemc.com') | list | length > 0 }}"

- name: Fail if PowerScale StorageClass not found
  ansible.builtin.fail:
    msg: "{{ msg_powerscale_no_storageclasses }}"
  when: not powerscale_sc_exists

- name: Display StorageClass verification message
  ansible.builtin.debug:
    msg: "PowerScale StorageClass verified"

# ───────────────────────────────────────────────────────────────────────────
# Step 5: Verify PVCs are intact
# ───────────────────────────────────────────────────────────────────────────
- name: Get default StorageClass name
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: kubectl get sc -o jsonpath='{.items[?(@.metadata.annotations.storageclass\.kubernetes\.io/is-default-class=="true")].metadata.name}'
  register: default_sc_name
  changed_when: false
  failed_when: false

- name: Get all PVCs
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: kubectl get pvc -A -o json
  register: pvcs_json
  changed_when: false

- name: Parse PVCs
  ansible.builtin.set_fact:
    pvcs_list: "{{ pvcs_json.stdout | from_json }}"

- name: Check PVCs using PowerScale StorageClass
  ansible.builtin.set_fact:
    powerscale_pvcs: "{{ pvcs_list['items'] | selectattr('spec.storageClassName', 'equalto', default_sc_name.stdout) | list }}"
  when: default_sc_name.stdout != ""

- name: Check PVCs using default PowerScale StorageClass if name detection failed
  ansible.builtin.set_fact:
    powerscale_pvcs: "{{ pvcs_list['items'] | selectattr('spec.storageClassName', 'equalto', 'ps01') | list }}"
  when: default_sc_name.stdout == ""

- name: Verify all PVCs are in Bound state
  ansible.builtin.set_fact:
    all_pvcs_bound: "{{ powerscale_pvcs | selectattr('status.phase', 'equalto', 'Bound') | list | length == powerscale_pvcs | length }}"
  when: powerscale_pvcs | length > 0

- name: Display PVC verification message
  ansible.builtin.debug:
    msg: "Verified {{ powerscale_pvcs | length }} PVCs using PowerScale StorageClass are in Bound state"
  when: powerscale_pvcs | length > 0

- name: Display no PVCs message
  ansible.builtin.debug:
    msg: "No PVCs using PowerScale StorageClass found"
  when: powerscale_pvcs | length == 0

# ───────────────────────────────────────────────────────────────────────────
# Step 6: Verify upgraded version
# ───────────────────────────────────────────────────────────────────────────
- name: Get upgraded PowerScale driver version
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get pods -n {{ powerscale_namespace }} -l app=isilon-controller \
        -o jsonpath='{.items[0].spec.containers[?(@.name=="driver")].image}' | \
        grep -oP 'v\d+\.\d+\.\d+' || echo "unknown"
    executable: /bin/bash
  register: powerscale_upgraded_version
  changed_when: false
  failed_when: false

- name: Display upgraded version
  ansible.builtin.debug:
    msg: "PowerScale CSI driver upgraded to version: {{ powerscale_upgraded_version.stdout }}"

# ───────────────────────────────────────────────────────────────────────────
# Step 7: Display upgrade completion summary
# ───────────────────────────────────────────────────────────────────────────
- name: Display PowerScale upgrade completion summary
  ansible.builtin.debug:
    msg:
      - "PowerScale CSI driver upgrade completed successfully"
      - "  From version: {{ powerscale_current_version }}"
      - "  To version: {{ powerscale_upgraded_version.stdout }}"
      - "  Namespace: {{ powerscale_namespace }}"
      - "  Controller pods ready: {{ powerscale_controller_ready_count.stdout }}"
      - "  Node daemonset ready: {{ powerscale_ds_ready }}/{{ powerscale_ds_desired }}"
