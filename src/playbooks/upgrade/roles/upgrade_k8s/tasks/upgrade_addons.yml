# ── PowerScale CSI Driver upgrade (ABORT on failure) ──────────────

- name: Skip PowerScale upgrade if not installed
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════════════════════
      WARNING: PowerScale CSI Driver NOT INSTALLED
      ═══════════════════════════════════════════════════════════════════════════

      PowerScale CSI Driver was not installed in the previous Omnia version.
      The upgrade playbook will NOT install PowerScale CSI Driver.
      Proceeding with Kubernetes upgrade only.

      ═══════════════════════════════════════════════════════════════════════════
  when: (upgrade_status.addon_upgrade.powerscale.status | default('pending')) == 'not_installed'

- name: Pause after PowerScale pre-upgrade validation
  ansible.builtin.pause:
    seconds: 15

- name: Skip PowerScale upgrade if not installed
  ansible.builtin.include_tasks: update_addon_step.yml
  vars:
    addon_name: powerscale
    addon_status_update:
      status: skipped
      reason: not_installed
      timestamp: "{{ ansible_date_time.iso8601 }}"
  when: (upgrade_status.addon_upgrade.powerscale.status | default('pending')) == 'not_installed'

- name: Starting PowerScale upgrade
  ansible.builtin.debug:
    msg: "Starting PowerScale addon upgrade from {{ powerscale_from_version | default('unknown') }} to {{ powerscale_target_version }}..."
  when: (upgrade_status.addon_upgrade.powerscale.status | default('pending')) not in ['completed', 'not_installed', 'skipped']

- name: Mark PowerScale in_progress
  ansible.builtin.include_tasks: update_addon_step.yml
  vars:
    addon_name: powerscale
    addon_status_update:
      status: in_progress
      from_version: "{{ powerscale_from_version | default('unknown') }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"
  when: (upgrade_status.addon_upgrade.powerscale.status | default('pending')) not in ['completed', 'not_installed', 'skipped']

- name: Upgrade PowerScale CSI Driver
  when: (upgrade_status.addon_upgrade.powerscale.status | default('pending')) not in ['completed', 'not_installed', 'skipped']
  block:
    - name: Execute PowerScale pre-upgrade validation
      ansible.builtin.include_tasks: powerscale_prepare_upgrade.yml

    - name: Execute PowerScale backup
      ansible.builtin.include_tasks: powerscale_backup_folder.yml

    - name: Execute PowerScale upgrade
      ansible.builtin.include_tasks: upgrade_powerscale.yml

    - name: Mark PowerScale completed
      ansible.builtin.include_tasks: update_addon_step.yml
      vars:
        addon_name: powerscale
        addon_status_update:
          status: completed
          from_version: "{{ powerscale_from_version | default('unknown') }}"
          to_version: "{{ powerscale_target_version }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          error:
  rescue:
    - name: Mark PowerScale failed
      ansible.builtin.include_tasks: update_addon_step.yml
      vars:
        addon_name: powerscale
        addon_status_update:
          status: failed
          timestamp: "{{ ansible_date_time.iso8601 }}"

    - name: ABORT — PowerScale upgrade failed
      ansible.builtin.fail:
        msg: "{{ msg_addon_powerscale_failed }}"

# ── Run addon validation ──────────────────────────────────────────
- name: Validate addons
  ansible.builtin.include_tasks: step_addon_validation.yml

- name: Mark addon upgrade completed
  ansible.builtin.include_tasks: update_node_step.yml
  vars:
    status_update:
      addon_upgrade:
        status: completed
        completed_at: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"
