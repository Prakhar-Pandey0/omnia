---
- name: Detect current addon versions
  ansible.builtin.include_tasks: detect_addon_versions.yml

- name: Mark addon upgrade in_progress
  ansible.builtin.include_tasks: update_node_step.yml
  vars:
    status_update:
      addon_upgrade:
        status: in_progress
        started_at: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

# ── Calico upgrade (ABORT on failure) ──────────────────────────────
- name: Starting Calico upgrade
  ansible.builtin.debug:
    msg: "Starting Calico addon upgrade from {{ calico_from_version | default('unknown') }} to {{ calico_target_version }}..."
  when: (upgrade_status.addon_upgrade.calico.status | default('pending')) != 'completed'

- name: Mark Calico in_progress
  ansible.builtin.include_tasks: update_addon_step.yml
  vars:
    addon_name: calico
    addon_status_update:
      status: in_progress
      current_version: "{{ calico_current_version }}"
      from_version: "{{ calico_from_version | default('unknown') }}"
      target_version: "{{ calico_target_version }}"
      timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"
  when: (upgrade_status.addon_upgrade.calico.status | default('pending')) != 'completed'

- name: Upgrade Calico
  when: (upgrade_status.addon_upgrade.calico.status | default('pending')) != 'completed'
  block:
    - name: Execute Calico upgrade
      ansible.builtin.include_tasks: step_calico_upgrade.yml

    - name: Mark Calico completed
      ansible.builtin.include_tasks: update_addon_step.yml
      vars:
        addon_name: calico
        addon_status_update:
          status: completed
          current_version: "{{ calico_target_version }}"
          from_version: "{{ calico_from_version | default('unknown') }}"
          to_version: "{{ calico_target_version }}"
          timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"
          error:
  rescue:
    - name: Mark Calico failed
      ansible.builtin.include_tasks: update_addon_step.yml
      vars:
        addon_name: calico
        addon_status_update:
          status: failed
          timestamp: "{{ now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    - name: ABORT — Calico upgrade failed
      ansible.builtin.fail:
        msg: "{{ msg_addon_calico_failed }}"

