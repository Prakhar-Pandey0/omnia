---

# ============================================================================
# transform_powerscale_values.yml - Transform PowerScale CSI values.yaml (2.1 to 2.2)
# ============================================================================
# Dynamically determines PowerScale versions from software_config.json files.
# Downloads target version values.yaml template from GitHub and merges v2.1 settings.
# Only runs if csi_driver_powerscale was configured in v2.1.
# Versions are read from:
#   - v2.1 version: {{ backup_location }}/software_config.json
#   - v2.2 version: {{ input_project_dir }}/software_config.json
# ============================================================================

- name: Check if PowerScale CSI driver was configured in v2.1
  ansible.builtin.stat:
    path: "{{ backup_location }}/software_config.json"
  register: backup_software_config_stat

- name: Read v2.1 software_config.json to check for PowerScale
  ansible.builtin.slurp:
    src: "{{ backup_location }}/software_config.json"
  register: backup_software_config_content
  when: backup_software_config_stat.stat.exists

- name: Parse v2.1 software_config.json
  ansible.builtin.set_fact:
    backup_software_config: "{{ backup_software_config_content.content | b64decode | from_json }}"
  when: backup_software_config_stat.stat.exists

- name: Check if csi_driver_powerscale exists in v2.1
  ansible.builtin.set_fact:
    powerscale_configured_in_v21: >-
      {{ backup_software_config.softwares
         | selectattr('name', 'equalto', 'csi_driver_powerscale')
         | list | length > 0 }}
    powerscale_v21_entry: >-
      {{ backup_software_config.softwares
         | selectattr('name', 'equalto', 'csi_driver_powerscale')
         | list | first | default({}) }}
  when: backup_software_config_stat.stat.exists

- name: Set powerscale_configured_in_v21 to false if software_config missing
  ansible.builtin.set_fact:
    powerscale_configured_in_v21: false
    powerscale_v21_entry: {}
  when: not backup_software_config_stat.stat.exists

- name: Transform PowerScale values.yaml if configured
  when: powerscale_configured_in_v21 | bool
  block:
    - name: Extract v2.1 PowerScale version from backup software_config.json
      ansible.builtin.set_fact:
        powerscale_v21_version: "{{ powerscale_v21_entry.version | default('') }}"

    - name: Fail if v2.1 PowerScale entry exists but version is missing
      ansible.builtin.fail:
        msg: "{{ msg_powerscale_v21_version_missing }}"
      when:
        - powerscale_v21_entry | length > 0
        - powerscale_v21_version == ''

    - name: Read v2.2 software_config.json to get target PowerScale version
      ansible.builtin.slurp:
        src: "{{ input_project_dir }}/software_config.json"
      register: v22_software_config_content

    - name: Parse v2.2 software_config.json
      ansible.builtin.set_fact:
        v22_software_config: "{{ v22_software_config_content.content | b64decode | from_json }}"

    - name: Extract v2.2 PowerScale entry
      ansible.builtin.set_fact:
        powerscale_v22_entry: >-
          {{ v22_software_config.softwares
             | selectattr('name', 'equalto', 'csi_driver_powerscale')
             | list | first | default({}) }}

    - name: Extract v2.2 PowerScale version from software_config.json
      ansible.builtin.set_fact:
        powerscale_v22_version: "{{ powerscale_v22_entry.version | default('') }}"

    - name: Fail if v2.2 PowerScale entry exists but version is missing
      ansible.builtin.fail:
        msg: "{{ msg_powerscale_v22_version_missing }}"
      when:
        - powerscale_v22_entry | length > 0
        - powerscale_v22_version == ''

    - name: Display PowerScale version upgrade path
      ansible.builtin.debug:
        msg: "PowerScale CSI driver upgrade: {{ powerscale_v21_version }} to {{ powerscale_v22_version }}"

    - name: Read backup omnia_config.yml for values_path
      ansible.builtin.slurp:
        src: "{{ backup_location }}/omnia_config.yml"
      register: backup_omnia_config_slurp

    - name: Parse backup omnia_config.yml
      ansible.builtin.set_fact:
        backup_omnia_config: "{{ backup_omnia_config_slurp.content | b64decode | from_yaml }}"

    - name: Fetch PowerScale values_path from backup omnia_config
      ansible.builtin.set_fact:
        powerscale_values_path: >-
          {{ backup_omnia_config.service_k8s_cluster
             | selectattr('csi_powerscale_driver_values_file_path', 'defined')
             | map(attribute='csi_powerscale_driver_values_file_path')
             | select('ne', '')
             | first | default('') }}

    - name: Fetch PowerScale secret_path from backup omnia_config
      ansible.builtin.set_fact:
        powerscale_secret_path: >-
          {{ backup_omnia_config.service_k8s_cluster
             | selectattr('csi_powerscale_driver_secret_file_path', 'defined')
             | map(attribute='csi_powerscale_driver_secret_file_path')
             | select('ne', '')
             | first | default('') }}

    - name: Display PowerScale values_path from backup omnia_config
      ansible.builtin.debug:
        msg: "PowerScale values_path from backup omnia_config: {{ powerscale_values_path }}"

    - name: Display PowerScale secret_path from backup omnia_config
      ansible.builtin.debug:
        msg: "PowerScale secret_path from backup omnia_config: {{ powerscale_secret_path }}"

    - name: Extract values file name from backup omnia_config powerscale_values_path
      ansible.builtin.set_fact:
        powerscale_values_filename: "{{ powerscale_values_path | basename | default('values.yaml') }}"
      when: powerscale_values_path | length > 0

    - name: Extract secret file name from backup omnia_config powerscale_secret_path
      ansible.builtin.set_fact:
        powerscale_secret_filename: "{{ powerscale_secret_path | basename | default('secret.yaml') }}"
      when: powerscale_secret_path | length > 0

    - name: Set default secret filename if path not configured
      ansible.builtin.set_fact:
        powerscale_secret_filename: "secret.yaml"
      when: powerscale_secret_path | default('') | length == 0

    - name: Display extracted PowerScale values file name
      ansible.builtin.debug:
        msg: "PowerScale values file name from backup omnia_config: {{ powerscale_values_filename }}"

    - name: Display extracted PowerScale secret file name
      ansible.builtin.debug:
        msg: "PowerScale secret file name from backup omnia_config: {{ powerscale_secret_filename }}"

    - name: Build dynamic GitHub URL for target version values.yaml
      ansible.builtin.set_fact:
        powerscale_target_values_url: "{{ powerscale_values_github_url_template | replace('{version}', powerscale_v22_version | regex_replace('^v', '')) }}"

    - name: Check if v2.1 values file exists in backup
      ansible.builtin.stat:
        path: "{{ backup_location }}/{{ powerscale_values_filename }}"
      register: v21_values_stat

    - name: Fail if v2.1 values file not found
      ansible.builtin.fail:
        msg: "{{ msg_backup_powerscale_values_missing }}"
      when: not v21_values_stat.stat.exists

    - name: Download target version values.yaml template from GitHub
      ansible.builtin.get_url:
        url: "{{ powerscale_target_values_url }}"
        dest: "{{ input_project_dir }}/{{ powerscale_values_filename }}"
        mode: "{{ default_file_mode }}"
      register: download_target_values

    - name: Merge v2.1 settings into v2.2 values file
      ansible.builtin.script:
        cmd: >-
          ../scripts/merge_powerscale_values.py
          "{{ backup_location }}/{{ powerscale_values_filename }}"
          "{{ input_project_dir }}/{{ powerscale_values_filename }}"
          "{{ input_project_dir }}/{{ powerscale_values_filename }}"
      register: merge_values_result
      changed_when: merge_values_result.rc == 0

    - name: Display merge summary
      ansible.builtin.debug:
        msg: "{{ merge_values_result.stderr_lines | default([]) }}"
      when: merge_values_result.stderr_lines | default([]) | length > 0

    - name: Check if v2.1 secret file exists in backup
      ansible.builtin.stat:
        path: "{{ backup_location }}/{{ powerscale_secret_filename }}"
      register: v21_secret_stat

    - name: Copy secret file from v2.1 backup
      ansible.builtin.copy:
        src: "{{ backup_location }}/{{ powerscale_secret_filename }}"
        dest: "{{ input_project_dir }}/{{ powerscale_secret_filename }}"
        mode: "0600"
      when: v21_secret_stat.stat.exists

    - name: Display PowerScale values.yaml transformation summary
      ansible.builtin.debug:
        msg: "{{ msg_powerscale_values_transform_summary }}"

  rescue:
    - name: Handle PowerScale values.yaml transformation failure
      ansible.builtin.fail:
        msg: "{{ msg_powerscale_values_transform_failed }}"

- name: Skip PowerScale transformation if not configured
  ansible.builtin.debug:
    msg: "PowerScale CSI driver not configured in v2.1 - skipping values.yaml transformation"
  when: not (powerscale_configured_in_v21 | bool)
