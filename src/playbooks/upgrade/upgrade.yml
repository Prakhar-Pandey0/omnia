# ============================================================================
# upgrade.yml — User-Facing Playbook #2
# ============================================================================
# Tag-based upgrade orchestrator per ESpec §4.3.2.
# Supports --tags for selective execution of upgrade sub-flows.
#
# Usage:
#   cd /omnia/upgrade
#   ansible-playbook upgrade.yml                     # Full upgrade
#   ansible-playbook upgrade.yml --tags oim          # OIM only
#   ansible-playbook upgrade.yml --tags k8s          # K8s only
#   ansible-playbook upgrade.yml --tags provision
#   ansible-playbook upgrade.yml --tags "k8s,telemetry"
#
# IMPORTANT: Must be invoked from the parent directory containing upgrade/,
# rollback/, and playbooks/ folders. Internal playbooks are imported via
# relative paths (e.g., playbooks/upgrade_oim.yml).
#
# TAG ORDER: oim → build_stream → local_repo → build_image → provision → k8s → telemetry → slurm
#
# VERSION POLICY:
#   oim_metadata.yml is read-only for upgrade/rollback flows. Manifest
#   fields are derived directly from it:
#     previous_omnia_version  →  source_version
#     omnia_version           →  target_version
#     upgrade_backup_dir      →  backup_dir
#
# LOCK POLICY:
#   - upgrade_in_progress.lock may be pre-created by omnia.sh --upgrade.
#     If present, the playbook proceeds (does NOT fail).
#   - rollback_in_progress.lock signals a rollback is active. Upgrade MUST
#     fail if this lock exists.
#   - If no lock exists, the playbook creates upgrade_in_progress.lock.
# ============================================================================

# ──────────────────────────────────────────────────────────────────────
# Play 0: Pre-flight — acquire lock, init manifest, validate tags
# ──────────────────────────────────────────────────────────────────────
- name: Pre-flight — validate tag dependencies and component state
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    metadata_path: /opt/omnia/.data/oim_metadata.yml
    upgrade_lock_path: /opt/omnia/.data/upgrade_in_progress.lock
    rollback_lock_path: /opt/omnia/.data/rollback_in_progress.lock
    all_components: [oim, build_stream, local_repo, build_image, provision, k8s, telemetry, slurm]
    tag_dependencies:
      build_stream: [oim]
      build_image: [oim]
      provision: [oim, build_image]
      k8s: [oim, provision, local_repo, build_image]
      telemetry: [oim, k8s]
      slurm: [oim, local_repo, build_image, provision]
  tasks:
    # ═══════════════════════════════════════════════════════════════
    # PHASE 1: READ-ONLY GUARDS (no state mutation allowed here)
    # ═══════════════════════════════════════════════════════════════

    # ─── Guard 1: Rollback lock check ───
    - name: Check for active rollback lock
      ansible.builtin.stat:
        path: "{{ rollback_lock_path }}"
      register: rollback_lock_stat

    - name: Read rollback lock contents (if any)
      ansible.builtin.slurp:
        src: "{{ rollback_lock_path }}"
      register: rollback_lock_raw
      when: rollback_lock_stat.stat.exists
      failed_when: false

    - name: Abort if a rollback is in progress
      ansible.builtin.fail:
        msg: |
          A rollback is currently in progress. Cannot start an upgrade.
          Lock file: {{ rollback_lock_path }}
          Lock contents:
          {{ (rollback_lock_raw.content | b64decode) if (rollback_lock_raw.content is defined) else '(unreadable)' }}
          Wait for the rollback to finish, or if no process is actually
          running (e.g., previous run crashed), manually remove the lock:
            rm {{ rollback_lock_path }}
      when: rollback_lock_stat.stat.exists

    # ─── Guard 2: Manifest read + completed-upgrade check ───
    - name: Check for upgrade_manifest.yml
      ansible.builtin.stat:
        path: "{{ manifest_path }}"
      register: manifest_stat

    - name: Read existing upgrade_manifest.yml (for guard check)
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: existing_manifest_raw
      when: manifest_stat.stat.exists

    - name: Parse existing manifest (for guard check)
      ansible.builtin.set_fact:
        existing_manifest: "{{ existing_manifest_raw.content | b64decode | from_yaml }}"
      when: manifest_stat.stat.exists

    - name: Abort if upgrade already completed
      ansible.builtin.fail:
        msg: |
          The previous upgrade already completed successfully (upgrade_status: completed).
          Upgrade ID: {{ existing_manifest.upgrade_id | default('N/A') }}
          Source: {{ existing_manifest.source_version | default('N/A') }} → Target: {{ existing_manifest.target_version | default('N/A') }}
          Re-running upgrade after successful completion is not allowed.
          If you need to force a new upgrade cycle:
            cd /omnia/upgrade
            ansible-playbook upgrade.yml -e force_upgrade=true
      when:
        - manifest_stat.stat.exists
        - existing_manifest.upgrade_status | default('') == 'completed'
        - not (force_upgrade | default(false) | bool)

    # ═══════════════════════════════════════════════════════════════
    # PHASE 2: STATE MUTATION (only reached if all guards passed)
    # ═══════════════════════════════════════════════════════════════

    - name: Ensure .data directory exists
      ansible.builtin.file:
        path: /opt/omnia/.data
        state: directory
        mode: "0755"

    # ─── Create upgrade lock only if it doesn't already exist ───
    # (omnia.sh --upgrade may have already created it; that's expected.)
    - name: Check for existing upgrade lock
      ansible.builtin.stat:
        path: "{{ upgrade_lock_path }}"
      register: upgrade_lock_stat

    - name: Create upgrade lock file (only if absent)
      ansible.builtin.copy:
        content: |
          operation: upgrade
          pid: {{ ansible_pid | default('unknown') }}
          started_at: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
          host: "{{ inventory_hostname }}"
          created_by: ansible-playbook
        dest: "{{ upgrade_lock_path }}"
        mode: "0644"
      when: not upgrade_lock_stat.stat.exists
    # ─────────────────────────────────────────────────────────────

    # ─── Read oim_metadata.yml and derive manifest fields directly ───
    - name: Read oim_metadata.yml
      ansible.builtin.slurp:
        src: "{{ metadata_path }}"
      register: raw_metadata
      when: not manifest_stat.stat.exists

    - name: Parse oim_metadata.yml
      ansible.builtin.set_fact:
        oim_metadata: "{{ raw_metadata.content | b64decode | from_yaml }}"
      when: not manifest_stat.stat.exists

    - name: Initialize upgrade_manifest.yml if absent
      ansible.builtin.copy:
        content: |
          upgrade_id: "upgrade-{{ 9999 | random }}"
          source_version: "{{ oim_metadata.previous_omnia_version }}"
          target_version: "{{ oim_metadata.omnia_version }}"
          upgrade_status: "in-progress"
          approval_status: "pending"
          backup_dir: "{{ oim_metadata.upgrade_backup_dir }}"
          component_status:
            oim: "pending"
            build_stream: "pending"
            local_repo: "pending"
            build_image: "pending"
            provision: "pending"
            k8s: "pending"
            telemetry: "pending"
            slurm: "pending"
        dest: "{{ manifest_path }}"
        mode: "0644"
      when: not manifest_stat.stat.exists

    - name: Read upgrade_manifest.yml (final canonical version)
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ raw_manifest.content | b64decode | from_yaml }}"

    # ─── Archive stale rollback_manifest.yml in pre-flight ───
    # If a rollback manifest exists from a prior cycle, archive it so
    # this upgrade starts with a clean slate.
    - name: Check for stale rollback_manifest.yml (pre-flight)
      ansible.builtin.stat:
        path: /opt/omnia/.data/rollback_manifest.yml
      register: preflight_rollback_stat

    - name: Ensure archive directory exists (pre-flight)
      ansible.builtin.file:
        path: /opt/omnia/.data/archive
        state: directory
        mode: '0755'
      when: preflight_rollback_stat.stat.exists

    - name: Read stale rollback manifest for archive naming
      ansible.builtin.slurp:
        src: /opt/omnia/.data/rollback_manifest.yml
      register: preflight_rollback_raw
      when: preflight_rollback_stat.stat.exists

    - name: Parse stale rollback manifest
      ansible.builtin.set_fact:
        preflight_rollback: "{{ preflight_rollback_raw.content | b64decode | from_yaml }}"
      when: preflight_rollback_stat.stat.exists

    - name: Archive stale rollback_manifest.yml (pre-flight)
      ansible.builtin.copy:
        src: /opt/omnia/.data/rollback_manifest.yml
        dest: "/opt/omnia/.data/archive/rollback_manifest.{{ preflight_rollback.rollback_id | default('prev') }}.archived.yml"
        remote_src: true
        mode: '0644'
      when: preflight_rollback_stat.stat.exists

    - name: Remove stale rollback_manifest.yml (pre-flight)
      ansible.builtin.file:
        path: /opt/omnia/.data/rollback_manifest.yml
        state: absent
      when: preflight_rollback_stat.stat.exists

    - name: Resolve requested tags (handle Ansible 'all' default)
      ansible.builtin.set_fact:
        requested_tags: >-
          {{ all_components
             if (ansible_run_tags is not defined or 'all' in (ansible_run_tags | list))
             else ansible_run_tags | list }}

    - name: Validate tag dependency order
      ansible.builtin.fail:
        msg: >
          Tag '{{ item }}' requires {{ tag_dependencies[item] | join(', ') }}
          to have been completed first.
      loop: "{{ requested_tags }}"
      when:
        - item in tag_dependencies
        - tag_dependencies[item] | difference(requested_tags) | length > 0
        - >-
          tag_dependencies[item] | reject('in',
          (manifest.component_status | default({}, true))
          | dict2items | selectattr('value', 'in', ['completed', 'skipped'])
          | map(attribute='key') | list) | list | length > 0

    - name: Report already-upgraded components (will be skipped)
      ansible.builtin.debug:
        msg: "Component '{{ item }}' already completed — will be skipped."
      loop: "{{ requested_tags }}"
      when:
        - manifest.component_status is defined
        - item in manifest.component_status
        - manifest.component_status[item] in ['completed', 'skipped']

# Note: import_playbook does NOT honor play-level when:; the conditional
# must be inside the imported playbook itself. tags: always ensures it
# runs even with --tags <component>.
- name: Include input project directory
  ansible.builtin.import_playbook: ../utils/include_input_dir.yml
  tags: always
  vars:
    openchami_vars_suppport: false
    omnia_metadata_support: true

- name: Create OIM group for SSH connection
  ansible.builtin.import_playbook: ../utils/create_container_group.yml
  tags: always
  vars:
    oim_group: true

# ──────────────────────────────────────────────────────────────────────
# BuildStream Terminal Gate (C-24): Read build_stream_config.yml and
# set build_stream_terminal fact. When enable_build_stream=true AND
# build_stream tag completes, downstream tags (local_repo, build_image,
# provision, k8s, telemetry, slurm) are skipped — the GitLab pipeline handles
# those responsibilities.
#
# Tag order: oim → build_stream → local_repo → build_image → provision → k8s → telemetry → slurm
# ──────────────────────────────────────────────────────────────────────
- name: Evaluate BuildStream terminal gate
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Read build_stream_config.yml
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/build_stream_config.yml"
        name: build_stream_config
      failed_when: false

    - name: Determine BuildStream terminal gate
      ansible.builtin.set_fact:
        build_stream_terminal: "{{ build_stream_config.enable_build_stream | default(false) | bool }}"

    - name: Report BuildStream terminal gate activation
      ansible.builtin.debug:
        msg: >
          BuildStream is ENABLED (enable_build_stream=true).
          Tags local_repo, build_image, provision, k8s, telemetry, slurm
          will be SKIPPED after build_stream completes. User must trigger
          GitLab pipeline manually post-upgrade.
      when: build_stream_terminal | bool

# ──────────────────────────────────────────────────────────────────────
# Detect K8s and Slurm configuration — check if services are enabled
# ──────────────────────────────────────────────────────────────────────
- name: Detect K8s and Slurm configuration
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Read software_config.json
      ansible.builtin.slurp:
        src: "{{ input_project_dir }}/software_config.json"
      register: _software_config_slurp

    - name: Parse software_config.json
      ansible.builtin.set_fact:
        _software_config: "{{ _software_config_slurp.content | b64decode | from_json }}"

    - name: Check if service_k8s is configured
      ansible.builtin.set_fact:
        k8s_upgrade_enabled: "{{ _software_config.softwares | selectattr('name', 'equalto', 'service_k8s') | list | length > 0 }}"
        cacheable: true

    - name: Check if slurm_custom is configured
      ansible.builtin.set_fact:
        slurm_upgrade_enabled: "{{ _software_config.softwares | selectattr('name', 'equalto', 'slurm_custom') | list | length > 0 }}"
        cacheable: true

# ──────────────────────────────────────────────────────────────────────
# Operator Approval — shows upgrade plan and waits for confirmation.
# Tracks approval_status in upgrade_manifest.yml so re-runs skip it.
# Bypass with: -e skip_approval=true (for CI/CD automation)
# ──────────────────────────────────────────────────────────────────────
- name: Operator approval for upgrade
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
  tasks:
    - name: Read upgrade_manifest.yml for approval check
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: approval_raw_manifest

    - name: Parse manifest for approval check
      ansible.builtin.set_fact:
        approval_manifest: "{{ approval_raw_manifest.content | b64decode | from_yaml }}"

    # ── Approval prompt when BuildStream is ENABLED ──
    - name: Show BuildStream-enabled upgrade plan and wait for operator confirmation
      ansible.builtin.pause:
        prompt: |2
          ══════════════════════════════════════════════════════════════
                     OMNIA UPGRADE — OPERATOR APPROVAL REQUIRED
                           (BuildStream Mode — Enabled)
          ══════════════════════════════════════════════════════════════

          ── Version Transition ───────────────────────────────────────
            Current Omnia version : {{ approval_manifest.source_version | default('2.1.0.0') }}
            Target  Omnia version : {{ approval_manifest.target_version | default('2.2.0.0') }}

          ── Upgrade Execution Plan (BuildStream Enabled) ─────────────
            1. oim           → Upgrade OpenCHAMI control-plane containers
                               on the Omnia Infrastructure Manager
            2. build_stream  → Enable or upgrade BuildStream + GitLab
                               services on OIM

            ── SKIPPED (handled by GitLab pipeline after upgrade) ──
            3. local_repo    → SKIPPED
            4. build_image   → SKIPPED
            5. provision     → SKIPPED
            6. k8s           → SKIPPED (fresh deployment via pipeline)
            7. telemetry     → SKIPPED (fresh deployment via pipeline)
            8. slurm         → SKIPPED (fresh deployment via pipeline)

          ── BuildStream Important Notes ────────────────────────────
            • BuildStream is intended for TEST BED clusters.
            • After upgrade, K8s and Slurm will be FRESH DEPLOYMENTS
              via the GitLab pipeline — existing cluster state will
              NOT be preserved.
            • NFS shares configured in storage_config.yml must be
              backed up and cleaned, OR provide new NFS share paths
              for K8s and Slurm workloads.
            • A new mapping file (pxe_mapping_file.csv) is required
              to preserve old cluster node-to-group assignments.
              Sample catalogs are available in: examples/catalog/

          ── Impact & Risk ────────────────────────────────────────────
            • OIM services will be restarted during OIM + BuildStream
              upgrade steps.
            • Do NOT reboot the OIM during the upgrade.
            • Existing K8s and Slurm clusters will be REPLACED by
              fresh deployments triggered from the GitLab pipeline.
            • All data on NFS shares must be backed up before
              triggering the GitLab pipeline.

          ── Pre-flight Checklist ─────────────────────────────────────
            [ ] prepare_upgrade.yml completed without errors
            [ ] NFS share data backed up or new NFS shares configured
                in storage_config.yml
            [ ] Stable internet connectivity verified on the OIM
            [ ] Maintenance window is active and stakeholders notified
            [ ] Sufficient disk space available for new images & packages

          ──────────────────────────────────────────────────────────────
            Press  ENTER       to PROCEED with the Omnia upgrade
            Press  Ctrl+C, A   to ABORT and exit safely
          ══════════════════════════════════════════════════════════════
      when:
        - not (skip_approval | default(false) | bool)
        - approval_manifest.approval_status | default('pending') != 'approved'
        - build_stream_terminal | default(false) | bool

    # ── Approval prompt when BuildStream is DISABLED (standard upgrade) ──
    - name: Show standard upgrade plan and wait for operator confirmation
      ansible.builtin.pause:
        prompt: |2
          ══════════════════════════════════════════════════════════════
                     OMNIA UPGRADE — OPERATOR APPROVAL REQUIRED
          ══════════════════════════════════════════════════════════════

          ── Version Transition ───────────────────────────────────────
            Current Omnia version : {{ approval_manifest.source_version | default('2.1.0.0') }}
            Target  Omnia version : {{ approval_manifest.target_version | default('2.2.0.0') }}

          ── Omnia Upgrade Execution Plan (in order) ──────────────────
            1. oim           → Upgrade OpenCHAMI control-plane containers
                               and Pulp container (3.80 → 3.113) on the OIM
            2. build_stream  → SKIPPED (not enabled in build_stream_config.yml)
            3. local_repo    → Synchronize Omnia 2.2 packages into the
                               local Pulp repository for cluster nodes
            4. build_image   → Rebuild compute OS images against
                               the new Omnia 2.2 package set
            5. provision     → Refresh Cloud-Init data and BSS boot
                               configurations to point at 2.2 images
            6. k8s           → {% if k8s_upgrade_enabled | default(false) %}Roll the Kubernetes cluster to the new
                               Omnia-supported version (control plane + nodes){% else %}SKIPPED (not configured in software_config.json){% endif %}

            7. telemetry     → Upgrade the Omnia telemetry stack
                               for kafka, victoria metrics, and other components
            8. slurm         → {% if slurm_upgrade_enabled | default(false) %}Upgrade the Slurm controller, slurm nodes
                               {% else %}SKIPPED (not configured in software_config.json){% endif %}

          ── Impact & Risk ────────────────────────────────────────────
            • Running Omnia services will be modified and briefly restarted.
            • Do NOT reboot the OIM during the upgrade
            • Compute workloads should be drained or completed beforehand.

          ── Pre-flight Checklist (REQUIRED) ──────────────────────────
            BEFORE proceeding, verify ALL of the following:

            • prepare_upgrade.yml completed without errors
            {% if k8s_upgrade_enabled | default(false) %}• Kubernetes cluster healthy (no failing pods, all PVCs
                bound, LoadBalancer services have external IPs)
            {% endif %}{% if slurm_upgrade_enabled | default(false) %}• Slurm cluster healthy (no failing jobs, all nodes ready)
            {% endif %}• Stable internet connectivity verified on the OIM
            • Maintenance window is active and stakeholders notified
            • Sufficient disk space available for new images & packages

          ──────────────────────────────────────────────────────────────
            CONFIRMATION REQUIRED:
            Type 'yes' to confirm all pre-flight checks are complete
            and PROCEED with the Omnia upgrade.

            Type anything else or press Ctrl+C to ABORT.
          ══════════════════════════════════════════════════════════════
      register: operator_confirmation
      when:
        - not (skip_approval | default(false) | bool)
        - approval_manifest.approval_status | default('pending') != 'approved'
        - not (build_stream_terminal | default(false) | bool)

    - name: Validate operator confirmation
      when:
        - not (skip_approval | default(false) | bool)
        - approval_manifest.approval_status | default('pending') != 'approved'
        - not (build_stream_terminal | default(false) | bool)
        - operator_confirmation.user_input | default('') | lower != 'yes'
      block:
        - name: Display abort message
          ansible.builtin.pause:
            seconds: 1
            prompt: |2
              ══════════════════════════════════════════════════════════════
                        UPGRADE ABORTED — CONFIRMATION REQUIRED
              ══════════════════════════════════════════════════════════════

              You did not type 'yes' to confirm that all pre-flight checks
              have been completed.

              To proceed with the upgrade, you MUST explicitly confirm by
              typing 'yes' when prompted.

              Please re-run the upgrade playbook and type 'yes' at the
              confirmation prompt:

                cd /omnia/upgrade
                ansible-playbook upgrade.yml

              ══════════════════════════════════════════════════════════════

        - name: Fail the playbook
          ansible.builtin.fail:
            msg: "Upgrade aborted: operator did not confirm pre-flight checks"

    - name: Update approval_status to approved in manifest
      ansible.builtin.copy:
        content: >-
          {{ approval_manifest | combine({'approval_status': 'approved'}) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: "0644"
      when:
        - approval_manifest.approval_status | default('pending') != 'approved'

    - name: Report approval skipped (already approved or skip_approval)
      ansible.builtin.debug:
        msg: "Operator approval already recorded or skipped — continuing upgrade."
      when:
        - (skip_approval | default(false) | bool) or
          (approval_manifest.approval_status | default('pending') == 'approved')

# ──────────────────────────────────────────────────────────────────────
# Set upgrade_mode to bypass upgrade_checkup guard within credential utility.
# Set default omnia_run_tags (prepare_oim, local_repo, ufm_telemetry, vast_telemetry, ldms, idrac_telemetry).
# Conditionally add gitlab tag when build_stream is enabled.
# ──────────────────────────────────────────────────────────────────────
- name: Set upgrade mode flag and dynamic run tags for credential utility
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Enable upgrade_mode to bypass credential utility guard
      ansible.builtin.set_fact:
        upgrade_mode: true
        cacheable: true

    - name: Set default dynamic run tags
      ansible.builtin.set_fact:
        omnia_run_tags: >-
          {{
            (
              ansible_run_tags | default([]) | list +
              ['prepare_oim', 'local_repo', 'ufm_telemetry', 'vast_telemetry', 'ldms', 'idrac_telemetry']
            ) | unique
          }}
        cacheable: true

    - name: Add gitlab tag when build_stream is enabled
      ansible.builtin.set_fact:
        omnia_run_tags: >-
          {{
            (
              omnia_run_tags | default([]) | list +
              ['build_stream', 'gitlab']
            ) | unique
          }}
        cacheable: true
      when: build_stream_config.enable_build_stream | default(false) | bool

- name: Invoke validate_config.yml to perform L1 and L2 validations
  ansible.builtin.import_playbook: ../input_validation/validate_config.yml
  tags: always

# ──────────────────────────────────────────────────────────────────────
# Global pre-flight validations — topology checks that MUST pass
# before any component upgrade begins. Catches unsupported changes
# (e.g., BuildStream enabled→disabled) to prevent partial upgrades.
# ──────────────────────────────────────────────────────────────────────
- name: Global pre-flight validations (fail-fast topology checks)
  ansible.builtin.import_playbook: playbooks/upgrade_validations.yml
  tags: always

- name: Load Omnia credential utility
  ansible.builtin.import_playbook: ../utils/credential_utility/get_config_credentials.yml
  tags: always

# ──────────────────────────────────────────────────────────────────────
# Sub-flow imports (each sub-flow reads upgrade_manifest.yml and
# skips if its component_status is already 'completed')
# ──────────────────────────────────────────────────────────────────────
- name: Upgrade OIM tasks (includes OpenCHAMI and Pulp)
  ansible.builtin.import_playbook: playbooks/upgrade_oim.yml
  tags: [oim]

- name: BuildStream upgrade / enablement (terminal gate)
  ansible.builtin.import_playbook: playbooks/upgrade_build_stream.yml
  tags: [build_stream]

- name: Local repo staging
  ansible.builtin.import_playbook: playbooks/upgrade_local_repo.yml
  tags: [local_repo]

- name: Build images
  ansible.builtin.import_playbook: playbooks/upgrade_build_image.yml
  tags: [build_image]

- name: Generate and apply provision files (Cloud-Init & BSS)
  ansible.builtin.import_playbook: playbooks/upgrade_provision.yml
  tags: [provision]

- name: Upgrade Kubernetes cluster
  ansible.builtin.import_playbook: playbooks/upgrade_k8s.yml
  tags: [k8s]

- name: Upgrade Telemetry components
  ansible.builtin.import_playbook: playbooks/upgrade_telemetry.yml
  tags: [telemetry]

- name: Upgrade Slurm cluster
  ansible.builtin.import_playbook: playbooks/upgrade_slurm.yml
  tags: [slurm]

# ──────────────────────────────────────────────────────────────────────
# Post-upgrade: update upgrade_manifest.yml + clear upgrade lock
# (oim_metadata.yml is intentionally NOT modified)
# ──────────────────────────────────────────────────────────────────────
- name: Finalize upgrade state
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    rollback_manifest_path: /opt/omnia/.data/rollback_manifest.yml
    archive_dir: /opt/omnia/.data/archive
    upgrade_lock_path: /opt/omnia/.data/upgrade_in_progress.lock
    all_components: [oim, build_stream, local_repo, build_image, provision, k8s, telemetry, slurm]
  tasks:
    - name: Read current upgrade_manifest.yml
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ raw_manifest.content | b64decode | from_yaml }}"

    # ── Identify tags skipped by BuildStream terminal gate ──
    - name: Identify BuildStream-skipped components
      ansible.builtin.set_fact:
        bs_skipped_tags: "{{ ['local_repo', 'build_image', 'provision', 'k8s', 'telemetry', 'slurm']
                             if (hostvars['localhost']['build_stream_terminal'] | default(false) | bool
                                 and manifest.component_status.build_stream | default('pending') == 'completed')
                             else [] }}"

    - name: Resolve requested tags for finalize
      ansible.builtin.set_fact:
        finalize_requested_tags: >-
          {{ all_components
             if (ansible_run_tags is not defined or 'all' in (ansible_run_tags | list))
             else ansible_run_tags | list | intersect(all_components) }}

    - name: Build cleaned component_status (only update requested tags)
      ansible.builtin.set_fact:
        cleaned_component_status: >-
          {%- set result = {} -%}
          {%- for key, val in manifest.component_status.items() -%}
          {%-   if key in bs_skipped_tags and val == 'pending' -%}
          {%-     set _ = result.update({key: 'skipped'}) -%}
          {%-   elif key in finalize_requested_tags -%}
          {%-     set _ = result.update({key: val if val in ['completed', 'skipped'] else 'completed'}) -%}
          {%-   else -%}
          {%-     set _ = result.update({key: val}) -%}
          {%-   endif -%}
          {%- endfor -%}
          {{ result }}

    - name: Determine upgrade_status based on component_status
      ansible.builtin.set_fact:
        new_status: >-
          {{ 'completed'
             if (cleaned_component_status.values() | reject('in', ['completed', 'skipped']) | list | length == 0)
             else 'in-progress' }}

    - name: Write upgrade_manifest.yml with cleaned component_status and updated upgrade_status
      ansible.builtin.copy:
        content: "{{ manifest | combine(manifest_updates) | to_nice_yaml }}"
        dest: "{{ manifest_path }}"
        mode: "0644"
      vars:
        manifest_updates:
          component_status: "{{ cleaned_component_status }}"
          upgrade_status: "{{ new_status }}"

    # NOTE: oim_metadata.yml is intentionally NOT modified by upgrade or
    # rollback flows. It is read-only and reflects the cluster's installed
    # version baseline only.

    # ─── Archive stale rollback_manifest.yml on successful upgrade ───
    - name: Check for stale rollback_manifest.yml
      ansible.builtin.stat:
        path: "{{ rollback_manifest_path }}"
      register: stale_rollback_stat
      when: new_status == 'completed'

    - name: Ensure archive directory exists
      ansible.builtin.file:
        path: "{{ archive_dir }}"
        state: directory
        mode: '0755'
      when:
        - new_status == 'completed'
        - stale_rollback_stat.stat is defined
        - stale_rollback_stat.stat.exists

    - name: Archive stale rollback_manifest.yml
      ansible.builtin.copy:
        src: "{{ rollback_manifest_path }}"
        dest: "{{ archive_dir }}/rollback_manifest.{{ manifest.upgrade_id | default('prev') }}.archived.yml"
        remote_src: true
        mode: '0644'
      when:
        - new_status == 'completed'
        - stale_rollback_stat.stat is defined
        - stale_rollback_stat.stat.exists

    - name: Remove stale rollback_manifest.yml
      ansible.builtin.file:
        path: "{{ rollback_manifest_path }}"
        state: absent
      when:
        - new_status == 'completed'
        - stale_rollback_stat.stat is defined
        - stale_rollback_stat.stat.exists

    - name: Remove upgrade guard lock (only when fully completed)
      ansible.builtin.file:
        path: "{{ upgrade_lock_path }}"
        state: absent
      when: new_status == 'completed'

    - name: Display BuildStream post-upgrade next steps
      ansible.builtin.debug:
        msg:
          - "══════════════════════════════════════════════════════════════"
          - "       BUILDSTREAM ENABLED — POST-UPGRADE NEXT STEPS"
          - "══════════════════════════════════════════════════════════════"
          - ""
          - "  OIM and BuildStream upgrade/enablement is complete."
          - "  Components local_repo, build_image, provision, k8s,"
          - "  telemetry, and slurm were SKIPPED — these will be"
          - "  handled by the GitLab pipeline."
          - ""
          - "  ── 1. PXE MAPPING FILE ──────────────────────────────────"
          - ""
          - "  The pre-upgrade pxe_mapping_file.csv is available at:"
          - "    /opt/omnia/backups/upgrade/version_{{ manifest.source_version }}/input/project_default/pxe_mapping_file.csv"
          - ""
          - "  The current pxe_mapping_file.csv has been aligned to the"
          - "  Omnia 2.2 format. If you need configurations from the 2.1"
          - "  version, retrieve them from the backup directory above and"
          - "  transform them to match the new 2.2 alignment."
          - ""
          - "  ── 2. CATALOG EXAMPLES ──────────────────────────────────"
          - ""
          - "  Example catalog files are available in the GitLab"
          - "  repository under the examples/catalog/ directory."
          - "  To start the pipeline, pick the appropriate catalog"
          - "  example and replace the contents of catalog_rhel.json"
          - "  with your chosen configuration."
          - ""
          - "  ── 3. NFS SHARE BACKUP ──────────────────────────────────"
          - ""
          - "  Ensure NFS shares configured in storage_config.yml"
          - "  are backed up and cleaned, OR provide new NFS share"
          - "  paths for K8s and Slurm workloads."
          - "  BuildStream pipeline will deploy K8s and Slurm as"
          - "  FRESH clusters — old data will NOT be preserved."
          - ""
          - "  ── 4. TRIGGER GITLAB PIPELINE ───────────────────────────"
          - ""
          - "  Navigate to GitLab UI → CI/CD → Pipelines"
          - "  Click 'Run Pipeline'."
          - "  The pipeline will handle:"
          - "    - Local repo sync"
          - "    - OS image building"
          - "    - Cloud-init/BSS provisioning"
          - "    - K8s cluster deployment (fresh)"
          - "    - Slurm cluster deployment (fresh)"
          - "    - Telemetry stack deployment"
          - ""
          - "  ── IMPORTANT WARNING ────────────────────────────────────"
          - "  BuildStream is intended for TEST BED clusters."
          - "  K8s and Slurm will be FRESH DEPLOYMENTS — all existing"
          - "  cluster state, jobs, and configurations will be replaced."
          - "══════════════════════════════════════════════════════════════"
      when:
        - hostvars['localhost']['build_stream_terminal'] | default(false) | bool

    - name: Display upgrade summary
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "       UPGRADE {{ new_status | upper }}"
          - "========================================="
          - "Upgrade ID: {{ manifest.upgrade_id | default('N/A') }}"
          - "Source: {{ manifest.source_version | default('N/A') }} → Target: {{ manifest.target_version | default('N/A') }}"
          - ""
          - "Component Status:"
          - "  oim:            {{ cleaned_component_status.oim | default('pending') }}"
          - "  build_stream:   {{ cleaned_component_status.build_stream | default('pending') }}"
          - "  local_repo:     {{ cleaned_component_status.local_repo | default('pending') }}"
          - "  build_image:    {{ cleaned_component_status.build_image | default('pending') }}"
          - "  provision:      {{ cleaned_component_status.provision | default('pending') }}"
          - "  k8s:            {{ cleaned_component_status.k8s | default('pending') }}"
          - "  telemetry:      {{ cleaned_component_status.telemetry | default('pending') }}"
          - "  slurm:          {{ cleaned_component_status.slurm | default('pending') }}"

# ──────────────────────────────────────────────────────────────────────
# Guaranteed terminal cleanup (C-30) — defense-in-depth against
# sub-playbook fatal errors that skip the finalize play above.
# ──────────────────────────────────────────────────────────────────────
- name: Guaranteed upgrade lock cleanup
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Ensure upgrade lock removed (terminal safety net)
      ansible.builtin.file:
        path: /opt/omnia/.data/upgrade_in_progress.lock
        state: absent
