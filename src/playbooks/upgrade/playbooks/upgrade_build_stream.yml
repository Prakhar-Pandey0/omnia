---
# ============================================================================
# upgrade_build_stream.yml — BuildStream Upgrade / Enablement (Terminal Gate)
# ============================================================================
# Per ESpec §4.6.4: Handles both upgrade_existing (in-place upgrade) and
# fresh_install (BuildStream on cluster where it was not enabled in 2.1).
#
# Reuses prepare_oim roles for:
#   - Credential loading (utils/credential_utility)
#   - OIM group creation (utils/create_container_group)
#   - Postgres deployment (prepare_oim/roles/deploy_containers/postgres)
#   - BuildStream deployment (prepare_oim/roles/deploy_containers/build_stream)
#
# Constraints: BS-01 through BS-08
# ============================================================================

# ══════════════════════════════════════════════════════════════════
# Play 1: Pre-flight — manifest, config, credentials (localhost)
# ══════════════════════════════════════════════════════════════════
- name: "Pre-flight: Load credentials and configuration"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    component_name: build_stream
    gitlab_role_path: "{{ playbook_dir }}/../../gitlab/roles/hosted_gitlab"
    upgrade_role_tasks: "{{ playbook_dir }}/../roles/upgrade_build_stream/tasks"
    example_catalog_path: "{{ playbook_dir }}/../../examples/catalog"
  tasks:
    # ── Set upgrade_mode to bypass upgrade_checkup in credential utility ──
    - name: Set upgrade_mode to bypass upgrade_checkup in imported playbooks
      ansible.builtin.set_fact:
        upgrade_mode: true
        cacheable: true

    # ── Set dynamic run tags for credential utility ──
    - name: Set dynamic run tags for build_stream
      ansible.builtin.set_fact:
        omnia_run_tags: "{{ ['prepare_oim'] }}"
        cacheable: true

    # ── Load build_stream_config.yml ──
    # ── Set input_project_dir with fallback ──
    - name: Set input_project_dir with fallback
      ansible.builtin.set_fact:
        input_project_dir: "{{ input_project_dir | default('/opt/omnia/input/project_default') }}"
        cacheable: true

    - name: Read build_stream_config.yml
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/build_stream_config.yml"
      failed_when: false

    - name: Set enable_build_stream fact
      ansible.builtin.set_fact:
        enable_build_stream: "{{ enable_build_stream | default(false) | bool }}"
        cacheable: true

    # ── Load storage_config.yml for s3_configurations (needed by credential utility) ──
    - name: Read storage_config.yml
      ansible.builtin.include_vars:
        file: "{{ input_project_dir }}/storage_config.yml"
      failed_when: false
      no_log: true

    - name: Default s3_configurations if not present (2.1 config format)
      ansible.builtin.set_fact:
        s3_configurations: "{{ s3_configurations | default({'provider': 'minio'}) }}"
        cacheable: true

    # ── Manifest read & idempotency guard ──
    - name: Read upgrade_manifest.yml
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ raw_manifest.content | b64decode | from_yaml }}"
        backup_dir: "{{ (raw_manifest.content | b64decode | from_yaml).backup_dir }}"
        cacheable: true

    - name: Load OIM metadata for path resolution
      ansible.builtin.include_vars:
        file: /opt/omnia/.data/oim_metadata.yml
        name: _oim_meta
      no_log: true

    - name: Set backup path variables for core and OIM perspectives
      ansible.builtin.set_fact:
        backup_path_from_core: "{{ backup_dir }}"
        backup_path_from_oim: "{{ backup_dir | regex_replace('^/opt/omnia', _oim_meta.oim_shared_path ~ '/omnia') }}"
        cacheable: true

    - name: Skip if build_stream already completed
      ansible.builtin.meta: end_play
      when: manifest.component_status[component_name] | default('pending') == 'completed'

    # ── Validate: disabling build_stream during upgrade is not supported ──
    - name: Read backup build_stream_config.yml (pre-upgrade state)
      ansible.builtin.slurp:
        src: "{{ backup_dir }}/input/project_default/build_stream_config.yml"
      register: _backup_bs_config_slurp
      failed_when: false

    - name: Parse backup build_stream_config.yml
      ansible.builtin.set_fact:
        _backup_enable_build_stream: "{{ (_backup_bs_config_slurp.content | b64decode | from_yaml).enable_build_stream | default(false) | bool }}"
      when: _backup_bs_config_slurp is not failed

    - name: Mark build_stream as skipped when not enabled
      ansible.builtin.copy:
        content: >-
          {{ manifest | combine({
               'component_status': manifest.component_status | combine({
                 component_name: 'skipped'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'
      when: not enable_build_stream | bool

    - name: Set skip and terminal gate flags when BuildStream is not enabled
      ansible.builtin.set_fact:
        build_stream_skip: true
        build_stream_terminal: false
        cacheable: true
      when: not enable_build_stream | bool

    - name: End play if BuildStream is not enabled
      ansible.builtin.meta: end_play
      when: not enable_build_stream | bool

    - name: Set skip flag to false when BuildStream is enabled
      ansible.builtin.set_fact:
        build_stream_skip: false
        cacheable: true

    # ── BS-01: Verify OIM upgrade complete ──
    - name: Validate OIM upgrade is complete
      ansible.builtin.fail:
        msg: "BuildStream requires OIM upgrade to be completed first. Current OIM status: {{ manifest.component_status.oim | default('pending') }}"
      when: manifest.component_status.oim | default('pending') != 'completed'

    - name: Load common GitLab configuration
      ansible.builtin.include_tasks:
        file: "{{ upgrade_role_tasks }}/gitlab_load_config.yml"

    - name: Map variables needed by deploy_containers roles
      ansible.builtin.set_fact:
        admin_nic_ip: "{{ build_stream_host_ip | default('localhost') }}"
        admin_nic: "{{ admin_nic | default('') }}"
        admin_net_addr: "{{ admin_net_addr | default('') }}"
        admin_netmask_bits: "{{ admin_netmask_bits | default('24') }}"
        minio_s3_username: "{{ s3_access_id | default('admin') }}"
        minio_s3_password: "{{ s3_secret_key | default('') }}"
        docker_username: "{{ docker_username | default('') }}"
        docker_password: "{{ docker_password | default('') }}"
        cacheable: true

    # ── Detect services on OIM host via SSH delegation ──
    - name: Check if BuildStream service exists on host (2.1 state detection)
      ansible.builtin.systemd_service:
        name: "omnia_build_stream.service"
      register: buildstream_service_2_1
      failed_when: false
      changed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Check if Postgres service exists on host (2.1 state detection)
      ansible.builtin.systemd_service:
        name: "omnia_postgres.service"
      register: postgres_service_2_1
      failed_when: false
      changed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Set service existence facts
      ansible.builtin.set_fact:
        buildstream_service_exists: "{{ buildstream_service_2_1.status is defined and buildstream_service_2_1.status.LoadState == 'loaded' }}"
        postgres_service_exists: "{{ postgres_service_2_1.status is defined and postgres_service_2_1.status.LoadState == 'loaded' }}"
        buildstream_service_active: "{{ buildstream_service_2_1.status is defined and buildstream_service_2_1.status.ActiveState == 'active' }}"
        postgres_service_active: "{{ postgres_service_2_1.status is defined and postgres_service_2_1.status.ActiveState == 'active' }}"
        cacheable: true

    - name: Determine upgrade path
      ansible.builtin.set_fact:
        upgrade_path: >-
          {{ 'upgrade_existing' if (buildstream_service_exists and
                                    postgres_service_exists)
             else 'fresh_install' }}
        cacheable: true

    - name: Display detected upgrade path
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "  BuildStream Upgrade — Path Detection"
          - "============================================================"
          - "Detected: {{ 'Upgrade existing installation' if upgrade_path == 'upgrade_existing' else 'Fresh install' }}"
          - "BuildStream: installed={{ buildstream_service_exists }}, active={{ buildstream_service_active }}"
          - "Postgres: installed={{ postgres_service_exists }}, active={{ postgres_service_active }}"
          - "============================================================"

    # ── Set manifest to in-progress ──
    - name: Read manifest
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest

    - name: Set build_stream upgrade status to in-progress
      ansible.builtin.copy:
        content: >-
          {{ (raw_manifest.content | b64decode | from_yaml) | combine({
               'component_status': (raw_manifest.content | b64decode | from_yaml).component_status | combine({
                 component_name: 'in-progress'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'

    - name: "Display upgrade status in-progress — {{ component_name }}"
      ansible.builtin.debug:
        msg: "[UPGRADE] Component '{{ component_name }}' — status changed to: in-progress"

# ══════════════════════════════════════════════════════════════════
# Play 2: Execute upgrade on OIM host (reuses prepare_oim roles)
# ══════════════════════════════════════════════════════════════════
- name: "Execute BuildStream upgrade on OIM host"
  hosts: oim
  connection: ssh
  gather_facts: true
  vars:
    component_name: build_stream
  tasks:
    - name: Skip BuildStream execution when not enabled
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['build_stream_skip'] | default(true) | bool

    - name: Execute BuildStream upgrade role
      ansible.builtin.include_role:
        name: "{{ playbook_dir }}/../roles/upgrade_build_stream"

# ══════════════════════════════════════════════════════════════════
# Play 3: GitLab Configuration Upgrade (upgrade_existing only)
# ══════════════════════════════════════════════════════════════════
- name: "Step 4: GitLab Configuration Upgrade (upgrade_existing)"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    component_name: build_stream
    gitlab_role_path: "{{ playbook_dir }}/../../gitlab/roles/hosted_gitlab"
    upgrade_role_tasks: "{{ playbook_dir }}/../roles/upgrade_build_stream/tasks"
    example_catalog_path: "{{ playbook_dir }}/../../examples/catalog"
    input_project_dir: "{{ hostvars['localhost']['input_project_dir'] | default('/opt/omnia-sharedpath/omnia/input/project_default') }}"
    backup_dir: "{{ hostvars['localhost']['backup_dir'] }}"
    gitlab_host: "{{ hostvars['localhost']['gitlab_host'] }}"
    gitlab_external_url_computed: "{{ hostvars['localhost']['gitlab_external_url_computed'] }}"
    build_stream_host_ip: "{{ hostvars['localhost']['build_stream_host_ip'] }}"
    build_stream_port: "{{ hostvars['localhost']['build_stream_port'] }}"
    provision_password: "{{ hostvars['localhost']['provision_password'] }}"
    gitlab_default_branch: "{{ hostvars['localhost']['gitlab_default_branch'] | default('main') }}"
  tasks:
    - name: Skip when not enabled or not upgrade_existing path
      ansible.builtin.meta: end_play
      when: >
        (hostvars['localhost']['build_stream_skip'] | default(true) | bool) or
        (hostvars['localhost']['upgrade_path'] | default('') != 'upgrade_existing')

    # Step 4: GitLab Configuration Upgrade (ESpec §4.6.4, BS-08)
    # Includes GL-PREREQ (host registration, token, pipeline gate)
    # followed by 4A.1–4A.7 (backup, reconfigure, CI files, runner, etc.)
    - name: Run GitLab configuration upgrade (upgrade_existing)
      ansible.builtin.include_tasks:
        file: "{{ upgrade_role_tasks }}/gitlab_config_upgrade.yml"

# ════════════════════════════════════════════════════════════════════════════
# PATH B: GitLab Fresh Install
# ════════════════════════════════════════════════════════════════════════════
# Runs ONLY when BuildStream was NOT enabled in 2.1 (fresh install).
# Imports the full gitlab.yml playbook which handles credential loading,
# prerequisite validation, and the hosted_gitlab role deployment.

- name: GitLab fresh install (fresh_install — upgrade_build_stream Step 4)
  ansible.builtin.import_playbook: ../../gitlab/gitlab.yml
  when:
    - not (hostvars['localhost']['build_stream_skip'] | default(true) | bool)
    - hostvars['localhost']['upgrade_path'] | default('') == 'fresh_install'

# ══════════════════════════════════════════════════════════════════
# Play 4: Mark completion and set terminal gate (localhost)
# ══════════════════════════════════════════════════════════════════
- name: "Mark build_stream completed and set terminal gate"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    manifest_path: /opt/omnia/.data/upgrade_manifest.yml
    component_name: build_stream
  tasks:
    - name: Skip post-completion if BuildStream was not enabled
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['build_stream_skip'] | default(true) | bool

    - name: Set terminal gate flag
      ansible.builtin.set_fact:
        build_stream_terminal: true
        cacheable: true

    - name: Re-read manifest for final update
      ansible.builtin.slurp:
        src: "{{ manifest_path }}"
      register: raw_manifest_final

    - name: Write build_stream completed to manifest
      ansible.builtin.copy:
        content: >-
          {{ (raw_manifest_final.content | b64decode | from_yaml) | combine({
               'component_status': (raw_manifest_final.content | b64decode | from_yaml).component_status | combine({
                 component_name: 'completed'
               })
             }) | to_nice_yaml }}
        dest: "{{ manifest_path }}"
        mode: '0644'

    - name: "Display upgrade status completed - {{ component_name }}"
      ansible.builtin.debug:
        msg: "[UPGRADE] Component '{{ component_name }}' — status changed to: completed"

    - name: "Post-upgrade instruction banner"
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "  BuildStream upgrade/enablement complete."
          - "  Upgrade path: {{ hostvars['localhost']['upgrade_path'] | default('unknown') | upper }}"
          - ""
          - "  NEXT STEP: Trigger the GitLab pipeline manually:"
          - "    1. Navigate to GitLab UI → CI/CD → Pipelines"
          - "    2. Click 'Run Pipeline' (always runs as fresh install)"
          - ""
          - "  The pipeline will handle:"
          - "    - Local repo sync"
          - "    - OS image building"
          - "    - BSS/cloud-init configuration"
          - "    - K8s and Slurm cluster deployment"
          - ""
          - "  Tags local_repo, build_image, provision, k8s,"
          - "  telemetry, and slurm have been SKIPPED in this upgrade run."
          - "============================================================"
        verbosity: 1
