---

- name: Set the functional_group_name
  ansible.builtin.set_fact:
    functional_group_name: "{{ item }}"

- name: Compute omnia and k8s naming suffix for image
  ansible.builtin.set_fact:
    naming_suffix: >-
      {{ '_omnia_' + hostvars['localhost']['oim_metadata']['omnia_version']
         if hostvars['localhost']['oim_metadata']['omnia_version'] | default('') | length > 0
         else '' }}{{ '_k8s_' + hostvars['localhost']['service_k8s_version']
         if (item is match('service_kube_')) and (hostvars['localhost']['service_k8s_version'] | default('') | length > 0)
         else '' }}

- name: Set kernel and initrd from validated images
  ansible.builtin.set_fact:
    kernel: "{{ validated_images[functional_group_name].kernel }}"
    initrd: "{{ validated_images[functional_group_name].initrd }}"

- name: Load bss template - {{ functional_group_name }}
  ansible.builtin.template:
    src: "{{ bss_template }}"
    dest: "{{ bss_dir }}/bss-{{ functional_group_name }}.yaml"
    mode: "{{ hostvars['localhost']['file_permissions_644'] }}"

- name: Delete boot configuration - {{ functional_group_name }}
  ansible.builtin.command: /usr/bin/ochami bss boot params delete --no-confirm -f yaml -d @{{ openchami_work_dir }}/boot/bss-{{ functional_group_name }}.yaml
  changed_when: true
  failed_when: false
  when: not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)

- name: Set boot configuration - {{ functional_group_name }}
  ansible.builtin.command: /usr/bin/ochami bss boot params set -f yaml -d @{{ openchami_work_dir }}/boot/bss-{{ functional_group_name }}.yaml
  changed_when: true
  when: not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)
