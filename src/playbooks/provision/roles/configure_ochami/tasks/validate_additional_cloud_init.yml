---
# Loads user-provided additional cloud-init config and sets facts for
# configure_cloud_init_additional.yml and create_groups_additional_fg.yml.
# Input validation (prohibited keys, allowed keys, types, FG names) is
# performed earlier in the L2 validation flow (provision_validation.py).
# This file only parses the YAML and sets enabled/data facts.

- name: Read additional_cloud_init_config_file path
  ansible.builtin.set_fact:
    additional_cloud_init_file_path: >-
      {{ hostvars['localhost']['additional_cloud_init_config_file'] | default('') | trim }}

- name: Set defaults when additional cloud-init is disabled
  ansible.builtin.set_fact:
    additional_cloud_init_enabled: false
    additional_cloud_init_common_enabled: false
    additional_cloud_init_groups_enabled: false
    additional_cloud_init_common_data: {}
    additional_cloud_init_groups_data: {}
    additional_cloud_init_fg_names: []
  when: additional_cloud_init_file_path == ''

- name: Create cloud-init directory
  ansible.builtin.file:
    path: "{{ cloud_init_dir }}"
    state: directory
    mode: "{{ hostvars['localhost']['dir_permissions_755'] }}"

- name: Load additional cloud-init config
  when: additional_cloud_init_file_path != ''
  block:
    - name: Set OIM-local path for additional cloud-init config
      ansible.builtin.set_fact:
        additional_cloud_init_oim_path: "{{ cloud_init_dir }}/additional_cloud_init.yml"

    - name: Copy additional cloud-init config file to OIM workdir
      ansible.builtin.copy:
        src: "{{ additional_cloud_init_file_path }}"
        dest: "{{ additional_cloud_init_oim_path }}"
        mode: "{{ hostvars['localhost']['file_permissions_644'] }}"

    - name: Load additional cloud-init config file
      ansible.builtin.slurp:
        src: "{{ additional_cloud_init_oim_path }}"
      register: _aci_file_content

    - name: Parse additional cloud-init config YAML
      ansible.builtin.set_fact:
        _aci_config: "{{ _aci_file_content.content | b64decode | from_yaml | default({}) }}"

    - name: Extract common and groups data
      ansible.builtin.set_fact:
        additional_cloud_init_common_data: "{{ _aci_config.common | default({}) }}"
        additional_cloud_init_groups_data: "{{ _aci_config.groups | default({}) }}"

    - name: Set enabled flags and FG name list
      ansible.builtin.set_fact:
        additional_cloud_init_common_enabled: "{{ additional_cloud_init_common_data | length > 0 }}"
        additional_cloud_init_groups_enabled: "{{ additional_cloud_init_groups_data | length > 0 }}"
        additional_cloud_init_fg_names: "{{ additional_cloud_init_groups_data.keys() | list }}"
        additional_cloud_init_enabled: >-
          {{ (additional_cloud_init_common_data | length > 0) or
             (additional_cloud_init_groups_data | length > 0) }}

    - name: Log additional cloud-init load result
      ansible.builtin.debug:
        msg: >-
          additional_cloud_init loaded.
          File: {{ additional_cloud_init_oim_path }}.
          Common enabled: {{ additional_cloud_init_common_enabled }}.
          Groups enabled: {{ additional_cloud_init_groups_enabled }}.
          FG names: {{ additional_cloud_init_fg_names }}.
