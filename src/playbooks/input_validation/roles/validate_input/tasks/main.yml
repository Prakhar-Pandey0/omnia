---
- name: Initialize list of tags
  ansible.builtin.set_fact:
    omnia_run_tags: "{{ ansible_run_tags | default([]) | list }}"
  when: omnia_run_tags is not defined

- name: Set validation messages
  ansible.builtin.set_fact:
    validation_success_msg: "{{ messages.validation_success }}"
    validation_error_msg: "{{ messages.validation_error }}"

- name: Run validation
  validate_input:
    omnia_base_dir: "{{ (input_dir + '/../') | ansible.builtin.realpath }}"
    project_name: "{{ project_name }}"
    tag_names: "{{ input_validate_tags }}"
    module_utils_path: "{{ (role_path + '/../../../../common/library/module_utils/') | ansible.builtin.realpath }}"
    csv_file_path: "{{ csv_file_path }}"
  register: validation_status
  when: (input_validate_tags | length) > 0 or csv_file_path is defined

- name: Validation passed
  ansible.builtin.debug:
    msg: "{{ validation_success_msg }}"
  when: validation_status.validation_failed is defined and not validation_status.validation_failed

- name: Failed due to validation failure
  ansible.builtin.fail:
    msg: >-
      {{ validation_error_msg }}
      {% if validation_status.errors is defined and validation_status.errors | length > 0 %}
      Errors: {{ validation_status.errors | join('; ') }}
      {% endif %}
      {% if validation_status.invalid_files is defined and validation_status.invalid_files | length > 0 %}
      Invalid files: {{ validation_status.invalid_files | join(', ') }}
      {% endif %}
      {% if validation_status.log_file is defined %}
      Log file: {{ validation_status.log_file }}
      {% endif %}
  when: validation_status.validation_failed is defined and validation_status.validation_failed
