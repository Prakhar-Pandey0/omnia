---

- name: Ensure discovery report directory exists
  ansible.builtin.file:
    path: "{{ discovery_report_dir }}"
    state: directory
    mode: '0755'

- name: Set timestamped discovery report output file path
  ansible.builtin.set_fact:
    discovery_report_output_file: "{{ discovery_report_dir }}/bmc_discovery_report_{{ pxe_mapping_timestamp }}.csv"

- name: Generate BMC discovery report
  generate_discovery_report:
    servers: "{{ discovered_servers }}"
    output_file: "{{ discovery_report_output_file }}"
  register: discovery_report_result

- name: Load build_stream_config to check if build_stream is enabled
  ansible.builtin.include_vars:
    file: "{{ input_project_dir | default(playbook_dir + '/../input') }}/build_stream_config.yml"
    name: build_stream_config_data
  failed_when: false

- name: Display discovery completion message (without BuildStream)
  when: not (build_stream_config_data.enable_build_stream | default(false) | bool)
  ansible.builtin.debug:
    msg:
      - "============================================================"
      - "OME Discovery Complete"
      - "============================================================"
      - "BMC PXE mapping file generated: {{ pxe_mapping_output_file }}"
      - "BMC discovery report generated: {{ discovery_report_output_file }}"
      - "  (Lists link status of BMC, Ethernet, and InfiniBand NICs for each server)"
      - "Total servers discovered: {{ discovered_servers | length }}"
      - ""
      - "Next Steps:"
      - "1. Review and edit the generated PXE mapping file:"
      - "     {{ pxe_mapping_output_file }}"
      - ""
      - "2. Review the discovery report for NIC link statuses:"
      - "     {{ discovery_report_output_file }}"
      - ""
      - "3. Update HOSTNAME, FUNCTIONAL_GROUP_NAME, GROUP_NAME as needed."
      - ""
      - "4. If fresh installation of Omnia, Run:"
      - "     ansible-playbook prepare_oim/prepare_oim.yml"
      - ""
      - "   If Slurm add node scenario, Run:"
      - "     ansible-playbook provision/provision.yml"
      - "============================================================"

- name: Display discovery completion message (with BuildStream)
  when: build_stream_config_data.enable_build_stream | default(false) | bool
  ansible.builtin.debug:
    msg:
      - "============================================================"
      - "OME Discovery Complete"
      - "============================================================"
      - "BMC PXE mapping file generated: {{ pxe_mapping_output_file }}"
      - "BMC discovery report generated: {{ discovery_report_output_file }}"
      - "  (Lists link status of BMC, Ethernet, and InfiniBand NICs for each server)"
      - "Total servers discovered: {{ discovered_servers | length }}"
      - ""
      - "Next Steps:"
      - "1. Review and edit the generated PXE mapping file:"
      - "     {{ pxe_mapping_output_file }}"
      - ""
      - "2. Review the discovery report for NIC link statuses:"
      - "     {{ discovery_report_output_file }}"
      - ""
      - "3. Update HOSTNAME, FUNCTIONAL_GROUP_NAME, GROUP_NAME as needed."
      - ""
      - "4. If GitLab server is not yet up, copy the generated file to"
      - "     /opt/omnia/input/project_default/pxe_mapping_file.csv in the omnia_core container"
      - ""
      - "5. If the GitLab server is up and running, copy the file to"
      - "     input/pxe_mapping_file.csv in the GitLab project and commit the changes"
      - "     after building the images using the build pipeline. Committing the PXE mapping"
      - "     file will automatically trigger the deploy pipeline and deploy the images on"
      - "     the nodes listed in the newly committed PXE mapping file."
      - "============================================================"
