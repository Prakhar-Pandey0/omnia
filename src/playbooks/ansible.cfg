[defaults]
log_path = /opt/omnia/log/core/playbooks/omnia.log
# Set the remote temporary directory to a shared path to avoid SELinux issues
remote_tmp = /opt/omnia/tmp/.ansible/tmp/
host_key_checking = false
forks = 5
timeout = 180
executable = /bin/bash
display_skipped_hosts = false
deprecation_warnings = false
show_task_path_on_failure = false
stdout_callback = omnia_default
callback_plugins = src/common/callback_plugins
library = src/common/library/modules
module_utils = src/common/library/module_utils

[persistent_connection]
command_timeout = 180
connect_timeout = 180

[ssh_connection]
retries = 3
ssh_args = -o ControlMaster=auto -o ControlPersist=60 -o ConnectTimeout=60
