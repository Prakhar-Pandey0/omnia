name: Gitleaks Scan
run-name: Gitleaks PR scan

on:
  push:
    branches:
      - main
      - staging
      - pub/build_stream
      - pub/telemetry
      - pub/q2_upgrade
      - gitleaks

  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    continue-on-error: true

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4)
          wget https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz
          tar -xzf gitleaks_${VERSION#v}_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Run Gitleaks scan
        run: |
          ./gitleaks detect --source . --log-opts="--all"
