---

- name: Set k8s_distro based on service_rke2_support
  ansible.builtin.set_fact:
    k8s_distro: "{{ 'rke2' if (hostvars['localhost']['service_rke2_support'] | default(false) | bool) else 'kubeadm' }}"
  when: hostvars['localhost']['service_k8s_support']

- name: Creating the configuration files required for kubeadm service_k8s in nfs share
  ansible.builtin.include_tasks: create_k8s_config_nfs.yml
  when:
    - hostvars['localhost']['service_k8s_support']
    - k8s_distro | default('kubeadm') == 'kubeadm'

- name: Creating the configuration files required for RKE2 service_k8s in nfs share
  ansible.builtin.include_tasks: create_rke2_config_nfs.yml
  when:
    - hostvars['localhost']['service_k8s_support']
    - k8s_distro | default('kubeadm') == 'rke2'

- name: Creating the configuration files required for compute RKE2 cluster in nfs share
  ansible.builtin.include_tasks: create_compute_rke2_config_nfs.yml
  when:
    - hostvars['localhost']['compute_rke2_support'] | default(false) | bool
