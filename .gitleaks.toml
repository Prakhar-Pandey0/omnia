title = "Gitleaks config for Omnia"

[allowlist]
  description = "Allowlist for known false positives in Ansible/infra repos"

  paths = [
    '''(^|/)examples/''',
    '''(^|/)docs/''',
    '''(^|/)molecule/''',
    '''(^|/)\.git/''',
  ]

  regexTarget = "match"
  regexes = [
    '''example[_-]?(password|secret|token|key)''',
    '''CHANGEME''',
    '''password:\s*"?\{\{.*\}\}"?''',
  ]
