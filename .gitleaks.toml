title = "Gitleaks config for Omnia"

[allowlist]
  description = "Ignore known false positives for infra repos"

  paths = [
    '''(^|/)examples/''',
    '''(^|/)docs/''',
  ]

  regexTarget = "match"
  regexes = [
    '''example[_-]?(password|secret|token|key)''',
    '''dummy[_-]?(password|secret|token|key)''',
    '''test[_-]?(password|secret|token|key)''',
    '''CHANGEME''',
    '''password:\s*"?\{\{.*\}\}"?'''
  ]
